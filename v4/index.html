        </div>
        ${isHidden ? '<div style="font-size:11px;color:var(--c-text-muted);padding:6px 10px;background:var(--c-surface-alt);border-radius:var(--radius-sm);margin-top:6px;line-height:1.5">📎 這張是原 PPT 隱藏投影片（授課時略過）。內容仍是有效知識，重要性可能較低、屬補充資料。</div>' : ''}
        <div class="slide-controls">
          <button onclick="window.__slidePrev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
          <div class="slide-counter">
            <span id="tb-slide-index">${idx + 1}</span> / ${slides.length}
            · <span style="color:${isHJH ? 'var(--c-hjh-fg)' : 'var(--c-text-muted)'};font-weight:${isHJH ? '700' : 'normal'}">#${esc(String(s.slide_num))}</span>
          </div>
          <button onclick="window.__slideNext()" ${idx === slides.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
        ${admin ? `
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-primary" style="flex:1 1 180px;min-height:unset;padding:8px 12px;font-size:13px" onclick="location.hash='#/textbook/move/${esc(tbId)}/${esc(topicId)}/${idx}'">📂 Move to another topic…</button>
            <button class="btn btn-secondary" style="min-height:unset;padding:8px 12px;font-size:13px" onclick="window.__toggleSlideExam('${esc(tbId)}','${esc(topicId)}',${idx})">${isExam ? 'Unmark exam' : 'Mark as exam'}</button>
            <button class="btn btn-ghost" style="min-height:unset;padding:8px 12px;font-size:13px" onclick="window.__toggleSlideHidden('${esc(tbId)}','${esc(topicId)}',${idx})">${isHidden ? '∅ Unmark supplementary' : '📎 Mark supplementary'}</button>
          </div>
        ` : ''}
        ${(s.text && s.text.length) ? `
          <div class="slide-ocr" ${isHJH ? 'style="background:var(--c-hjh-card-bg);border-color:var(--c-hjh-border)"' : ''}>
            <div class="ocr-label">${isHJH ? 'HJH · ' : ''}${isExam ? 'Exam · ' : ''}Captions</div>
            <ul><li>${textLines}</li></ul>
          </div>
        ` : ''}
        ${ocrFull ? `
          <details class="slide-ocr" style="margin-top:8px" ${highlight ? 'open' : ''}>
            <summary class="ocr-label" style="cursor:pointer">Raw OCR (full)${highlight ? ' — matches below' : ''}</summary>
            <div style="white-space:pre-wrap;margin-top:6px;font-size:13px;color:var(--c-text-muted)">${ocrFull}</div>
          </details>
        ` : ''}
      </div>
    `;
  }

  function bindSlideViewer(tbId, topicId, initialIdx, highlight) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    // All slides visible to everyone; hidden=true slides get a "補充 · PPT-hidden"
    // visual badge so readers know they were skipped in original lecture but still
    // contain knowledge. Filter removed per user policy: knowledge should be
    // accessible, not suppressed.
    const slides = (found.topic.slides || []);
    let idx = Math.max(0, Math.min(initialIdx || 0, slides.length - 1));
    highlight = highlight || '';

    function rerender() {
      el('tb-content').innerHTML = renderSlideViewerHTML(tbId, topicId, slides, idx, highlight);
      // Swipe gesture
      const frame = el('tb-content').querySelector('.slide-frame');
      if (frame) attachSwipe(frame);
    }

    function attachSwipe(node) {
      let x0 = null;
      node.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; });
      node.addEventListener('touchend', e => {
        if (x0 === null) return;
        const x1 = e.changedTouches[0].clientX;
        const dx = x1 - x0;
        if (dx < -40 && idx < slides.length - 1) { idx++; rerender(); }
        else if (dx > 40 && idx > 0) { idx--; rerender(); }
        x0 = null;
      });
    }

    window.__slidePrev = () => { if (idx > 0) { idx--; rerender(); } };
    window.__slideNext = () => { if (idx < slides.length - 1) { idx++; rerender(); } };
    document.onkeydown = (e) => {
      if (e.key === 'ArrowLeft')  window.__slidePrev();
      if (e.key === 'ArrowRight') window.__slideNext();
    };
    // Initial render
    const frame = el('tb-content').querySelector('.slide-frame');
    if (frame) attachSwipe(frame);
  }

  function renderTbMoveSlide(tbId, topicId, slideIdx, accent) {
    const found = findTopic(tbId, topicId);
    if (!found || !isAdmin()) return renderNotFound();
    const admin = true;
    // Use full slides array (admin sees hidden) so index is stable from viewer
    const srcSlides = admin ? (found.topic.slides || []) : (found.topic.slides || []).filter(s => !s.hidden);
    const slide = srcSlides[slideIdx];
    if (!slide) return renderNotFound();

    const ch = found.ch;
    const allTopics = [];
    (ch.sections || []).forEach((sec, si) => {
      (sec.topics || []).forEach((t, ti) => {
        if (t.id !== topicId) allTopics.push({ sec, t, si, ti });
      });
    });

    setHeader('Move slide', { label: found.topic.title, href: '#/textbook/t/' + tbId + '/' + topicId });

    const textPreview = (slide.text || []).slice(0, 3).map(esc).join(' · ');
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:18px;margin-bottom:8px">📂 Move slide to another topic</h2>

        renderMoveListInto(tbId, topicId, slideIdx, filtered);
      });
    }

  function renderMoveListInto(tbId, topicId, slideIdx, topics) {

  window.__confirmMoveSlide = function(tbId, topicId, slideIdx, targetTopicId) {
    const src = findTopic(tbId, topicId);
    const target = findTopic(tbId, targetTopicId);
    if (!src || !target) return showToast('Topic not found', 'error');
    const srcArr = src.topic.slides || [];
    const slide = srcArr[slideIdx];
    if (!slide) return showToast('Slide not found', 'error');
    if (!confirm('Move slide #' + slide.slide_num + ' to "' + target.topic.title + '"?\n\n(Slide appends to end of target topic. Reversible — you can move back anytime.)')) return;
    srcArr.splice(slideIdx, 1);
    target.topic.slides = target.topic.slides || [];
    target.topic.slides.push(slide);
    // Keep slide_count metadata in sync (used by topic list meta)
    src.topic.slide_count = srcArr.length;
    target.topic.slide_count = target.topic.slides.length;
    markDirty(tbId);
    showToast('Moved to: ' + target.topic.title, 'success');
    // Return to source topic (if it still has slides) else its section
    if (srcArr.length > 0) {
      navigate('#/textbook/t/' + tbId + '/' + topicId);
    } else {
      navigate('#/textbook/c/' + tbId + '/s/' + src.secIdx);
    }
  };

  window.__toggleSlideHidden = function(tbId, topicId, slideIdx) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    const target = (found.topic.slides || [])[slideIdx];
    if (!target) return;
    const wasHidden = !!target.hidden;
    target.hidden = !wasHidden;
    markDirty(tbId);
    showToast(wasHidden ? 'Slide unmarked (primary)' : 'Marked as supplementary (📎 badge shown)', 'success');
    router();
  };

  function favHref(f) {
    if (f.module === 'education') return '#/education/a/' + f.id;
    if (f.module === 'notes')     return '#/notes/s/' + f.id;
    if (f.module === 'tips')      {
      for (const s of state.tips.sections) {
        if (s.subsections && s.subsections.some(x => x.id === f.id)) {
          return '#/tips/sub/' + s.id + '/' + f.id;
        }
      }
      return '#/tips';
    }
    if (f.module === 'textbook') {
      // Check cached tbChapter to find topic's chapter (if already loaded)
      for (const tbId of TB_CHAPTER_IDS) {
        if (state.tb[tbId]) {
          const found = findTopic(tbId, f.id);
          if (found) return '#/textbook/t/' + tbId + '/' + f.id;
        }
      }
      // Not loaded yet — delegate to async resolver via javascript: href
      return 'javascript:window.__openFavTextbook(\'' + encodeURIComponent(f.id) + '\')';
    }
    return '#/';
  }

  window.__openFavTextbook = async function(topicIdEnc) {

        await loadChapter(tbId);
        if (findTopic(tbId, topicId)) {
          navigate('#/textbook/t/' + tbId + '/' + topicId);
          return;
        }
      } catch {}
    }
    showToast('Topic no longer exists', 'error');

  /* ======================================================
     Global search
  ====================================================== */
  function renderSearch(q, onlyModule) {
    setHeader('Search', { label: 'Home', href: '#/' });
    const only = onlyModule || '';
    const filterChips = MODULES.map(m => `
      <button class="search-filter-chip ${only === m.id ? 'active' : ''}" style="--chip-accent:${m.accent}" onclick="window.__setSearchFilter('${m.id}')">
        ${m.icon} ${esc(m.name)}
      </button>
    `).join('') + `
      <button class="search-filter-chip ${!only ? 'active' : ''}" style="--chip-accent:var(--c-header)" onclick="window.__setSearchFilter('')">All</button>
    `;

    const unloadedChapters = TB_CHAPTER_IDS.filter(tbId => !state.tb[tbId]);
    const loadAllBar = unloadedChapters.length ? `
      <div style="margin:8px 0;padding:10px 12px;background:var(--c-surface-alt);border:1px solid var(--c-border);border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between">
        <span style="color:var(--c-text-muted)">📦 Textbook: ${TB_CHAPTER_IDS.length - unloadedChapters.length}/${TB_CHAPTER_IDS.length} chapters indexed. Load rest to search all.</span>
        <button class="btn btn-secondary" style="min-height:unset;padding:6px 10px;font-size:12px" onclick="window.__loadAllChapters()">Load all</button>
      </div>
    ` : '';

    viewEl().innerHTML = `
      <input class="search-bar" id="search-input" value="${escAttr(q)}" placeholder="Search all modules… (multi-word = AND)" autocomplete="off" autofocus>
      <div class="search-filters">${filterChips}</div>
      ${loadAllBar}
      <div id="search-results"></div>
    `;
    const input = el('search-input');
    let searchTimer = null;
    input.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const v = input.value.trim();
        const params = [];
        if (v) params.push('q=' + encodeURIComponent(v));
        if (only) params.push('only=' + only);
        const hash = '#/search' + (params.length ? '?' + params.join('&') : '');
        if (location.hash !== hash) location.replace(hash);
        doSearch(v, only);
      }, 220);
    });
    doSearch(q, only);
  }

  window.__setSearchFilter = function(moduleId) {
    const qs = new URLSearchParams();
    const cur = new URLSearchParams(location.hash.split('?')[1] || '');
    if (cur.get('q')) qs.set('q', cur.get('q'));
    if (moduleId) qs.set('only', moduleId);
    const suffix = qs.toString();
    location.hash = '#/search' + (suffix ? '?' + suffix : '');
  };

  window.__loadAllChapters = async function() {
    showToast('Loading all chapters…');
    let count = 0;
    for (const tbId of TB_CHAPTER_IDS) {
      if (!state.tb[tbId]) {
        try { await loadChapter(tbId); count++; } catch {}
      }
    }
    showToast('Loaded ' + count + ' chapters', 'success');
    router();
  };

  function doSearch(q, onlyModule) {
    const host = el('search-results');
    if (!host) return;
    const only = onlyModule || '';
    if (!q || q.length < 2) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔎</div><strong>Type 2+ characters to search</strong><small>Multi-word query = AND match (all words must appear)</small></div>';
      return;
    }
    const terms = toTerms(q);
    const results = {
      education: [], notes: [], tips: [], textbook: [],
    };

    // Patient Ed — carry query into article page so highlights persist
    for (const a of state.data.articles) {
      const hay = a.title + ' ' + (a.text || '') + ' ' + (a.keywords || []).join(' ');
      if (matchAllTerms(hay, terms)) {
        results.education.push({
          id: a.id,
          title: a.title,
          preview: previewAround(a.text || '', terms),
          href: '#/education/a/' + a.id + '?q=' + encodeURIComponent(q),
        });
      }
    }
    // PPu Notes
    for (const s of state.notes.sections) {
      const flat = s.full_title + ' ' + (s.subsections || []).map(sub => sub.title + ' ' + (sub.items || []).join(' ')).join(' ');
      if (matchAllTerms(flat, terms)) {
        results.notes.push({ id: s.id, title: s.full_title, preview: previewAround(flat, terms), href: '#/notes/s/' + s.id });
      }
    }
    // Tips & Guide
    for (const chapter of state.tips.sections) {
      for (const sub of (chapter.subsections || [])) {
        const hay = sub.title + ' ' + (sub.markdown || '');
        if (matchAllTerms(hay, terms)) {
          results.tips.push({
            id: sub.id, title: chapter.number + '. ' + chapter.title + ' › ' + sub.title,
            preview: previewAround(sub.markdown || '', terms),
            href: '#/tips/sub/' + chapter.id + '/' + sub.id,
          });
        }
      }
    }
    // Textbook (loaded chapters only) — per-slide granularity + AND-term matching.
    // Hidden (PPT-skipped) slides ARE included — knowledge points shouldn't be
    // excluded from search just because they were skipped in lecture; they get a
    // 補充 tag in result title.
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          let preview = '';
          let matchedSlideIdx = -1;
          let matched = false;
          let matchedIsHidden = false;

          const topicHay = t.title + ' ' + (t.notes || '') + ' ' + (t.markdown_content || '');
          if (matchAllTerms(topicHay, terms)) {
            matched = true;
            preview = previewAround(topicHay, terms);
          }

          if (t.type !== 'text_only') {
            const slidesAll = t.slides || [];
            for (let si = 0; si < slidesAll.length; si++) {
              const s = slidesAll[si];
              const slideHay = (s.text || []).join(' ') + ' ' + (s.ocr_text || '');
              if (matchAllTerms(slideHay, terms)) {
                matched = true;
                if (matchedSlideIdx === -1) {
                  matchedSlideIdx = si;
                  matchedIsHidden = !!s.hidden;
                  preview = previewAround(slideHay, terms);
                }
              }
            }
          }

          if (matched) {
            let title = ch.number + '. ' + ch.title + ' › ' + t.title;
            if (matchedSlideIdx >= 0) {
              const s = (t.slides || [])[matchedSlideIdx];
              const hjhTag = s && isHJHSlide(s) ? ' <span class="topic-badge hjh" style="font-size:10px;padding:1px 5px">HJH</span>' : '';
              const hidTag = matchedIsHidden ? ' <span class="topic-badge" style="font-size:10px;padding:1px 5px;background:rgba(44,62,80,.6);color:#fff">📎 補充</span>' : '';
              title += ` — slide ${matchedSlideIdx + 1}${hjhTag}${hidTag}`;
            }
            const params = [];
            if (matchedSlideIdx >= 0) params.push('slide=' + matchedSlideIdx);
            params.push('q=' + encodeURIComponent(q));
            const href = '#/textbook/t/' + tbId + '/' + t.id + '?' + params.join('&');
            results.textbook.push({ id: t.id + ':' + matchedSlideIdx, title, preview, href });
          }
        }
      }
    }

    // Apply module filter
    let visibleModules = MODULES;
    if (only) visibleModules = MODULES.filter(m => m.id === only);
    const visibleIds = visibleModules.map(m => m.id);

    const total = visibleIds.reduce((a, id) => a + results[id].length, 0);
    if (total === 0) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔍</div><strong>No results' + (only ? ' in ' + esc(only) : '') + '</strong><small>for "' + esc(q) + '"</small></div>';
      return;
    }
    let html = '<div style="font-size:13px;color:var(--c-text-muted);margin:8px 0">' + total + ' result' + (total > 1 ? 's' : '') + ' for "' + esc(q) + '"' + (only ? ' in ' + esc(only) : '') + '</div>';
    for (const mod of visibleModules) {
      const list = results[mod.id];
      if (!list.length) continue;
      html += `<div class="result-group-header" style="color:${mod.accent}">${mod.icon} ${esc(mod.name)} (${list.length})</div>`;
      html += list.slice(0, 20).map(r => `
        <a class="list-card" href="${r.href}" style="border-left:4px solid ${mod.accent}">
          <div style="flex:1;min-width:0">
            <div class="title">${highlightText(r.title, q)}</div>
            ${r.preview ? `<div class="meta" style="margin-top:4px">${r.preview}</div>` : ''}
          </div>
        </a>
      `).join('');
      if (list.length > 20) {
        html += `<div style="font-size:12px;color:var(--c-text-muted);text-align:center;padding:4px">…${list.length - 20} more in ${mod.name}</div>`;
      }
    }
    html += '<div style="font-size:11px;color:var(--c-text-muted);text-align:center;padding:12px">Tip: textbook search only covers loaded chapters. Open a chapter first to index it.</div>';
    host.innerHTML = html;
  }

  /* ======================================================
     HJH browse (cross-chapter)
  ====================================================== */
  function renderHJHBrowse() {
    setHeader('💡 HJH · all chapters', { label: 'Home', href: '#/' });
    const unloaded = TB_CHAPTER_IDS.filter(tbId => !state.tb[tbId]);
    const rows = [];
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          if (t.type === 'text_only') continue;
          const visible = (t.slides || []).filter(s => !s.hidden);
          for (let si = 0; si < visible.length; si++) {
            const s = visible[si];
            if (isHJHSlide(s)) {
              rows.push({
                tbId, ch, topic: t, slide: s, slideIdx: si,
                title: ch.icon + ' ' + ch.title + ' › ' + t.title,
                label: String(s.slide_num),
              });
            }
          }
        }
      }
    }
    rows.sort((a, b) => {
      if (a.tbId !== b.tbId) return a.tbId < b.tbId ? -1 : 1;
      return a.label.localeCompare(b.label);
    });
    viewEl().innerHTML = `
      <div style="padding:12px;background:linear-gradient(135deg,var(--c-hjh-bg-start),var(--c-hjh-bg-end));border-radius:var(--radius);margin-bottom:12px">
        <h2 style="font-size:20px;color:var(--c-hjh-fg);margin-bottom:4px">💡 HJH slides</h2>
        <div style="font-size:13px;color:var(--c-hjh-fg);opacity:.85">${rows.length} HJH slide${rows.length===1?'':'s'} from ${Object.keys(state.tb).length}/${TB_CHAPTER_IDS.length} loaded chapter${Object.keys(state.tb).length===1?'':'s'}</div>
      </div>
      ${unloaded.length ? `
        <div style="margin-bottom:12px;padding:10px 12px;background:var(--c-surface-alt);border:1px solid var(--c-border);border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between">
          <span style="color:var(--c-text-muted)">${unloaded.length} chapter${unloaded.length===1?'':'s'} not yet loaded — HJH slides there won't appear</span>
          <button class="btn btn-secondary" style="min-height:unset;padding:6px 10px;font-size:12px" onclick="window.__loadAllChapters()">Load all</button>
        </div>
      ` : ''}
      ${rows.length === 0 ? '<div class="placeholder"><div class="big">💡</div><strong>No HJH slides yet</strong><small>Load chapters first (try Load all)</small></div>' : `
        <div class="list-section">
          ${rows.map(r => `
            <a class="list-card hjh" href="#/textbook/t/${esc(r.tbId)}/${esc(r.topic.id)}?slide=${r.slideIdx}">
              ${r.slide.slide_image ? `<img class="topic-thumb" src="${escAttr(r.slide.slide_image)}" alt="" loading="lazy">` : ''}
              <div style="flex:1;min-width:0">
                <div class="title" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${esc(r.title)}</div>
                <div class="meta" style="color:var(--c-hjh-fg);font-weight:600">#${esc(r.label)}</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      `}
    `;
  }

  /* ======================================================
     Quiz mode (exam-question slides)
  ====================================================== */
  const QUIZ_STATE = { queue: [], idx: 0, seen: 0 };
  function renderQuiz() {
    setHeader('📝 Quiz · exam slides', { label: 'Home', href: '#/' });
    // Collect all slides with has_exam_question from loaded chapters
    const all = [];
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          if (t.type === 'text_only') continue;
          const visible = (t.slides || []).filter(s => !s.hidden);
          for (let si = 0; si < visible.length; si++) {
            const s = visible[si];
            if (s.has_exam_question) {
              all.push({ tbId, ch, topic: t, slide: s, slideIdx: si });
            }
          }
        }
      }
    }
    if (!all.length) {
      viewEl().innerHTML = `
        <div class="placeholder">
          <div class="big">📝</div>
          <strong>No exam slides in loaded chapters</strong>
          <small>Load all chapters to get a bigger pool</small>
          <div style="margin-top:12px"><button class="btn btn-secondary" onclick="window.__loadAllChapters()">Load all chapters</button></div>
        </div>`;
      return;
    }
    // Shuffle once per session
    if (QUIZ_STATE.queue.length !== all.length) {
      QUIZ_STATE.queue = all.slice().sort(() => Math.random() - 0.5);
      QUIZ_STATE.idx = 0;
      QUIZ_STATE.seen = 0;
    }
    const cur = QUIZ_STATE.queue[QUIZ_STATE.idx];
    if (!cur) {
      viewEl().innerHTML = `
        <div class="placeholder">
          <div class="big">🎉</div>
          <strong>Quiz complete</strong>
          <small>${QUIZ_STATE.seen} slides reviewed</small>
          <div style="margin-top:12px"><button class="btn btn-primary" onclick="window.__quizReset()">Restart</button></div>
        </div>`;
      return;
    }
    const s = cur.slide;
    const isHJH = isHJHSlide(s);
    viewEl().innerHTML = `
      <div style="margin-bottom:8px;font-size:13px;color:var(--c-text-muted);display:flex;justify-content:space-between">
        <span>${QUIZ_STATE.idx + 1} / ${QUIZ_STATE.queue.length}</span>

          <img src="${escAttr(s.slide_image || '')}" alt="" onclick="window.__openLightbox(this.src, 'Quiz · #${esc(String(s.slide_num))}')">
        </div>
        ${(s.text && s.text.length) ? `
          <details style="margin-top:10px">
            <summary class="ocr-label" style="cursor:pointer">Show captions</summary>
            <div class="slide-ocr" style="margin-top:6px"><ul><li>${(s.text || []).map(t => esc(t)).join('</li><li>')}</li></ul></div>

        ` : ''}
      </div>
      <div class="action-bar action-bar-sticky">
        <button class="btn btn-secondary" onclick="window.__quizSkip(-1)" ${QUIZ_STATE.idx === 0 ? 'disabled' : ''}>← Prev</button>
        <button class="btn btn-primary" onclick="window.__quizGoTo('${esc(cur.tbId)}','${esc(cur.topic.id)}',${cur.slideIdx})">View in context</button>
        <button class="btn btn-success" onclick="window.__quizSkip(1)">Next →</button>
      </div>
    `;
  }

  window.__discardLocal = async function() {
    const dirty = dirtyDatasets();
    if (!dirty.length) return;
    if (!confirm('Discard ' + dirty.length + ' local change(s) and reload from server? This cannot be undone.')) return;
    for (const d of dirty) {
      if (d.id === 'data')       { localStorage.removeItem(LS.DATA); state.sources.data = 'server'; }
      else if (d.id === 'notes') { localStorage.removeItem(LS.NOTES); state.sources.notes = 'server'; }
      else if (d.id === 'tips')  { localStorage.removeItem(LS.TIPS); state.sources.tips = 'server'; }
      else if (d.id.startsWith('tb_')) {
        localStorage.removeItem(LS.TB_PREFIX + d.id);
        state.sources.tb[d.id] = 'server';
        delete state.tb[d.id];
      }
    }
    // Reload fresh from server
    try {
      await loadCore();
      showToast('Reloaded from server', 'success');
    } catch (e) {
      showToast('Reload failed: ' + e.message, 'error');
    }
    router();

  /* Kill-switch admin panel */
  async function loadKillStatusIntoPanel() {
    const loading = el('kill-status-loading');
    const body = el('kill-status-body');
    if (!loading || !body) return;
    try {
      const resp = await fetch('app-status.json?t=' + Date.now(), { cache: 'no-store' });
      const st = resp.ok ? await resp.json() : { active: true, message: '', updated_at: '—' };
      const current = el('kill-status-current');
      const updated = el('kill-status-updated');
      const msgIn   = el('kill-status-message');
      if (current) {
        current.textContent = st.active === false ? '🔴 LOCKED OUT' : '🟢 ACTIVE';
        current.style.color = st.active === false ? 'var(--c-danger)' : 'var(--c-success)';
      }
      if (updated) updated.textContent = st.updated_at || '—';
      if (msgIn && !msgIn.value) msgIn.value = st.message || '';
      loading.style.display = 'none';
      body.style.display = '';
    } catch (e) {
      loading.textContent = 'Failed to load status: ' + e.message;
    }
  }

    if (!confirm('Set service status to ' + label + '?\n\n' +
                 (active ? 'All users regain access on next app open.'

  window.__downloadAll = async function() {
    const btn = el('btn-download-all');
    const bar = el('dl-progress-bar');
    const box = el('dl-progress');
    const status = el('dl-status');
    btn.disabled = true;
    box.style.display = 'block';
    // Phase 1: Load all chapter JSONs — track failures
    status.textContent = 'Loading chapter metadata…';
    const toLoad = TB_CHAPTER_IDS.filter(id => !state.tb[id]);
    let jsonFail = 0;
    for (let i = 0; i < toLoad.length; i++) {
      try { await loadChapter(toLoad[i]); } catch { jsonFail++; }
      const pct = ((i + 1) / (toLoad.length || 1)) * 20;
      bar.style.width = pct + '%';
    }
    // Phase 2: Collect all slide images
    const images = [];
    for (const tbId of TB_CHAPTER_IDS) {
      const ch = state.tb[tbId];
      if (!ch) continue;
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          for (const s of (t.slides || [])) {
            if (!s.hidden && s.slide_image) images.push(s.slide_image);
          }
        }
      }
    }
    status.textContent = 'Caching ' + images.length + ' slide images…';
    // Phase 3: Parallel fetch in batches — track ok vs fail
    const BATCH = 16;
    let done = 0, imgOk = 0, imgFail = 0;
    for (let i = 0; i < images.length; i += BATCH) {
      const batch = images.slice(i, i + BATCH);
      const results = await Promise.all(batch.map(url =>
        fetch(url).then(r => r.ok ? 'ok' : 'fail').catch(() => 'fail')
      ));
      results.forEach(r => { if (r === 'ok') imgOk++; else imgFail++; });
      done += batch.length;
      const pct = 20 + (done / images.length) * 80;
      bar.style.width = pct + '%';
      status.textContent = 'Cached ' + done + ' / ' + images.length + ' images…';
    }
    bar.style.width = '100%';
    const summary = '✓ ' + imgOk + ' images cached' +
      (imgFail ? ' · ⚠ ' + imgFail + ' failed' : '') +
      (jsonFail ? ' · ⚠ ' + jsonFail + ' chapter JSONs failed' : '');
    status.textContent = summary + '. App offline-ready.';
    if (imgFail + jsonFail === 0) showToast('Offline cache complete', 'success');
    else showToast('Cache partial — ' + (imgFail + jsonFail) + ' failures', 'error', { duration: 4000 });
    btn.disabled = false;
    btn.textContent = '✓ Done — redownload';
  };

  window.__exportJSON = function(key) {
    let obj, filename;
    if (key === 'data')       { obj = state.data;  filename = 'data.json'; }
    else if (key === 'notes') { obj = state.notes; filename = 'teaching-notes.json'; }
    else if (key === 'tips')  { obj = state.tips;  filename = 'tips-guide.json'; }
    else if (key.startsWith('tb_')) { obj = state.tb[key]; filename = key + '.json'; }
    if (!obj) return;
    const clone = JSON.parse(JSON.stringify(obj));
    delete clone._updated_at;
    const blob = new Blob([JSON.stringify(clone, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };

  /* ======================================================
     Service Worker + update banner
  ====================================================== */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('v4/sw.js?v=4', { scope: 'v4/' }).then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              el('update-banner').classList.remove('hidden');
            }
          });
        });
      }).catch(err => console.warn('SW registration failed', err));
    });
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      location.reload();
    });
  }
  el('btn-update-reload').addEventListener('click', () => {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      location.reload();
    });
  });

  /* ======================================================
     Kill-switch gate — before gateCheck. If locked, page is replaced.
  ====================================================== */
  checkAppStatus().then(ok => {
    if (!ok) return;
    if (new URLSearchParams(location.search).has('reset')) {
      Promise.all([
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))),
        'serviceWorker' in navigator
          ? navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister())))
          : Promise.resolve(),
      ]).finally(() => {
        localStorage.clear();
        location.replace(location.pathname);
      });
    } else {
      gateCheck();
    }
  });

  /* ======================================================
     Boot (after gate passed)
  ====================================================== */
  async function boot() {
    loadFavs();
    try {
      await loadCore();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Load failed</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
      return;
    }
    router();
  }

  </script>
</body>
</html>
