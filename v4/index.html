<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pocket URO v4 (Clinical)</title>

  <!-- Base rewrites relative paths to parent (/pocket-uro/) so shared data.json,
       textbook-data/, images/, lib/ all resolve to v3.4 assets without duplication.
       v4-specific files (manifest, icons, sw) use explicit v4/ prefix. -->
  <base href="../">

  <link rel="manifest" href="v4/manifest.json?v=4">
  <link rel="icon" href="v4/icon-192.png?v=4">
  <link rel="apple-touch-icon" href="v4/apple-touch-icon.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="v4/apple-touch-icon.png?v=4">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pocket URO">
  <meta name="theme-color" content="#0A1648">

  <style>
    /* ============ Design tokens ============ */
    :root {
      /* Module accents — Clinical: desaturated, used as 6px dots / 28-30px badge chips */
      --c-patient-ed: #2E5C8A;
      --c-ppu-notes:  #2E7D4E;
      --c-tips:       #B05A1C;
      --c-textbook:   #6B3A8A;

      /* Light theme (Clinical default) */
      --c-bg:          #F6F7F9;
      --c-surface:     #FFFFFF;
      --c-surface-alt: #FAFBFC;
      --c-text:        #0B1F3A;
      --c-text-2:      #3A4A63;
      --c-text-muted:  #6B7791;
      --c-border:      #E3E7EE;
      --c-border-2:    #EDEFF4;
      --c-header:      #FFFFFF;
      --c-header-text: #0B1F3A;
      --c-danger:      #B3261E;
      --c-success:     #0F7B3E;
      --c-warning:     #B26A00;
      --c-info:        #0B3D91;
      --c-primary:     #0B3D91;
      --c-primary-soft:#E8EEF9;
      --c-accent:      var(--c-primary);
      --c-highlight-bg:#FFF3BF;
      --c-highlight-fg:#0B1F3A;
      --c-hjh-bg-start:#FFF8E1;
      --c-hjh-bg-end:  #FFE5A3;
      --c-hjh-fg:      #854D0E;
      --c-hjh-border:  #F0D986;
      --c-hjh-accent:  #B26A00;
      --c-hjh-note-bg: #FFFBEB;
      --c-hjh-card-bg: #FFF8E1;

      /* Typography */
      --font-read: 15px;         /* body text / markdown / articles */
      --font-read-lg: 17px;      /* list-card titles when enlarged */
      --font-ui: 15px;           /* UI controls */

      --radius: 12px;
      --radius-sm: 8px;
      --tap-target: 44px;
      --max-width: 820px;
      --header-height: 56px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 2px 6px rgba(0,0,0,.08);
    }

    /* Dark theme override (Clinical dark variant) */
    body[data-theme="dark"] {
      --c-bg:          #0A0F1C;
      --c-surface:     #141B2D;
      --c-surface-alt: #0D1423;
      --c-text:        #E8EEF9;
      --c-text-2:      #9BA7C2;
      --c-text-muted:  #6B7791;
      --c-border:      #243049;
      --c-border-2:    #1A2238;
      --c-header:      #0A0F1C;
      --c-header-text: #E8EEF9;
      --c-primary:     #6690FF;
      --c-primary-soft:#1A2A55;
      --c-info:        #6690FF;
      --c-accent:      #6690FF;
      --c-highlight-bg:#D4A413;
      --c-highlight-fg:#0A0F1C;
      --c-hjh-bg-start:#2D2410;
      --c-hjh-bg-end:  #4A3A15;
      --c-hjh-fg:      #FFD85A;
      --c-hjh-border:  #4A3A15;
      --c-hjh-accent:  #FFD85A;
      --c-hjh-note-bg: #1F1A0E;
      --c-hjh-card-bg: #1A1810;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 2px 6px rgba(0,0,0,.4);
    }

    /* Font scale variants */
    body[data-font-scale="small"]  { --font-read: 13px; --font-read-lg: 15px; --font-ui: 14px; }
    body[data-font-scale="normal"] { --font-read: 15px; --font-read-lg: 17px; --font-ui: 15px; }
    body[data-font-scale="large"]  { --font-read: 17px; --font-read-lg: 19px; --font-ui: 16px; }
    body[data-font-scale="xlarge"] { --font-read: 19px; --font-read-lg: 21px; --font-ui: 17px; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei",
                   sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 16px;
    }
    body {
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    button { font: inherit; cursor: pointer; color: inherit; background: none; border: none; }
    input, textarea, select { font: inherit; color: inherit; }
    a { color: var(--c-info); text-decoration: none; }
    ::selection { background: var(--c-accent); color: #fff; }

    /* ============ Access gate ============ */
    .gate {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--c-header); color: #fff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 20px;
    }
    .gate.hidden { display: none; }
    .gate h1 { font-size: 32px; margin-bottom: 6px; font-weight: 700; }
    .gate p { color: #9aa0b4; margin-bottom: 28px; font-size: 14px; }
    .gate input {
      font-size: 18px; padding: 14px 16px; border: none; border-radius: var(--radius);
      width: 100%; max-width: 280px; margin-bottom: 12px;
      text-align: center; letter-spacing: 2px;
      color: #2c3e50; background: #fff; caret-color: #2c3e50;
    }
    .gate input::placeholder { color: #9aa0b4; }
    .gate button {
      font-size: 16px; padding: 14px 36px; border: none; border-radius: var(--radius);
      background: var(--c-danger); color: #fff; min-width: 160px; font-weight: 600;
    }
    .gate .error { color: #ff8a80; font-size: 14px; margin-top: 16px; min-height: 20px; }

    /* ============ App shell ============ */
    #app[hidden] { display: none; }

    .app-header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-height);
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
    }
    .app-header h1 {
      font-size: 16px; font-weight: 600; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 4px;
    }
    .app-header .parent-link {
      display: flex; align-items: center; gap: 2px;
      color: var(--c-info);
      font-size: 15px;
      text-decoration: none;
      padding: 8px 6px;
      border-radius: 8px;
      min-height: var(--tap-target);
      max-width: 100%;
      overflow: hidden;
      justify-self: start;
    }
    .app-header .parent-link.hidden { visibility: hidden; pointer-events: none; }
    .app-header .parent-link:active { background: rgba(0,0,0,.06); }
    .app-header .parent-link .chev {
      font-size: 22px; font-weight: 600; line-height: 1;
      flex-shrink: 0;
    }
    .app-header .parent-link .label {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .app-header .more-btn {
      width: var(--tap-target); height: var(--tap-target);
      border-radius: 50%; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      justify-self: end;
      position: relative;
    }
    .app-header .more-btn:active { background: rgba(0,0,0,.06); }
    .app-header .more-btn .dot-badge {
      position: absolute; top: 6px; right: 4px;
      width: 16px; height: 16px;
      background: var(--c-danger); color: #fff;
      border-radius: 8px; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .more-menu {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + var(--header-height) + 6px);
      right: 8px;
      min-width: 220px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      z-index: 500;
      overflow: hidden;
    }
    .more-menu.hidden { display: none; }
    .more-menu a, .more-menu button {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      text-align: left;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--c-text);
      font-size: 15px;
      text-decoration: none;
      border-bottom: 1px solid var(--c-border);
      cursor: pointer;
    }
    .more-menu a:last-child, .more-menu button:last-child { border-bottom: none; }
    .more-menu a:active, .more-menu button:active { background: var(--c-surface-alt); }
    .more-menu .icon {
      font-size: 18px; width: 24px; text-align: center; flex-shrink: 0;
    }
    .more-menu .badge-inline {
      margin-left: auto;
      font-size: 11px; padding: 2px 8px;
      background: var(--c-danger); color: #fff;
      border-radius: 8px; font-weight: 700;
    }
    .more-menu-backdrop {
      position: fixed; inset: 0; z-index: 499;
      background: transparent;
    }
    .more-menu-backdrop.hidden { display: none; }

    #view {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* ============ Module view header ============ */
    .module-view[data-accent] {
      --accent: var(--module-accent);
    }
    .module-header-strip {
      height: 4px; width: 100%;
      background: var(--accent, var(--c-border));
      margin-bottom: 16px; border-radius: 2px;
    }

    /* ============ Home ============ */
    .brand {
      display: flex; align-items: baseline; gap: 10px;
      padding: 6px 0 14px;
    }
    .brand-name { font-size: 26px; font-weight: 700; }
    .brand-tag { font-size: 12px; color: var(--c-text-muted); }

    .search-bar {
      width: 100%; padding: 12px 16px; border: 1px solid var(--c-border);
      border-radius: var(--radius); font-size: 16px;
      background: var(--c-surface); margin-bottom: 16px;
      -webkit-appearance: none; appearance: none;
    }

    .home-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (min-width: 768px) { .home-grid { gap: 16px; } }

    .module-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 16px;
      border-left: 6px solid var(--accent, #333);
      border-top: 1px solid var(--c-border);
      border-right: 1px solid var(--c-border);
      border-bottom: 1px solid var(--c-border);
      min-height: 120px;
      display: flex; flex-direction: column; justify-content: space-between;
      text-align: left;
      transition: transform .08s ease;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
    }
    .module-card:active { transform: scale(.97); }
    .module-card .icon { font-size: 24px; }
    .module-card .name { font-size: 15px; font-weight: 600; margin-top: 10px; }
    .module-card .count { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }

    .home-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; padding: 8px 0;
      font-size: 13px;
    }
    .home-actions a { color: var(--c-text-muted); text-decoration: underline; }
    .home-actions .admin-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--c-header); color: #fff;
    }

    /* ============ Generic list items ============ */
    .list-section {
      margin-top: 8px;
    }
    .list-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--c-border);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      color: inherit; text-decoration: none;
      min-height: var(--tap-target);
    }
    .list-card:active { background: var(--c-surface-alt); }
    .list-card .title {
      font-size: var(--font-read); font-weight: 500; flex: 1;
      overflow: hidden;
    }
    .list-card .meta {
      font-size: 12px; color: var(--c-text-muted);
      margin-top: 2px;
    }
    .list-card .chevron { color: var(--c-text-muted); font-size: 18px; }
    .list-card .badge {
      background: var(--accent, var(--c-border));
      color: #fff; font-size: 11px; padding: 2px 8px;
      border-radius: 10px; font-weight: 600;
      white-space: nowrap;
    }
    .list-card .fav-btn {
      font-size: 18px; opacity: .35; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .list-card .fav-btn.active { opacity: 1; }

    /* ============ Empty state / placeholder ============ */
    .placeholder {
      padding: 40px 20px;
      text-align: center;
      color: var(--c-text-muted);
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
    }
    .placeholder .big { font-size: 40px; margin-bottom: 12px; }
    .placeholder strong { color: var(--c-text); display: block; margin-bottom: 6px; font-size: 17px; }
    .placeholder small { font-size: 13px; }

    /* ============ Article view ============ */
    .article-body {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--c-border);
      white-space: pre-wrap;
      font-size: var(--font-read);
      line-height: 1.75;
      word-break: break-word;
    }
    .article-meta-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 12px; color: var(--c-text-muted);
      margin-bottom: 12px;
    }
    .article-meta-row span {
      padding: 2px 8px; background: var(--c-surface); border-radius: 10px;
      border: 1px solid var(--c-border);
    }
    .article-keywords {
      margin-top: 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .kw-tag {
      font-size: 12px; padding: 4px 10px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 10px; color: var(--c-text-muted);
    }
    .article-source {
      margin-top: 16px; padding: 10px 14px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 12px; color: var(--c-text-muted);
    }
    .article-source a { word-break: break-all; }

    /* ============ Notes / Tips editors ============ */
    .edit-field { margin-bottom: 16px; }
    .edit-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--c-text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .edit-field input[type="text"],
    .edit-field input[type="url"],
    .edit-field select,
    .edit-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 15px;
    }
    .edit-field textarea {
      min-height: 160px; resize: vertical;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
    }
    .edit-field textarea.plain {
      font-family: inherit; font-size: 15px;
    }
    .subsection-block {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
      position: relative;
    }
    .subsection-block .sub-idx {
      position: absolute; top: -10px; left: 12px;
      background: var(--c-header); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
    }
    .subsection-block .sub-delete {
      position: absolute; top: 8px; right: 8px;
      color: var(--c-danger); font-size: 16px; padding: 4px 8px;
    }
    .insert-btn {
      display: block; width: 100%; padding: 4px 0;
      color: var(--c-success); font-size: 14px;
      border: 1px dashed transparent;
      border-radius: var(--radius-sm);
      margin: 4px 0;
      opacity: .5;
    }
    .insert-btn:hover { opacity: 1; border-color: var(--c-border); }

    /* ============ Tips Markdown renderer ============ */
    .markdown-body { font-size: var(--font-read); line-height: 1.75; }
    .markdown-body h1 { font-size: 22px; margin: 16px 0 8px; font-weight: 700; }
    .markdown-body h2 { font-size: 19px; margin: 14px 0 6px; font-weight: 700; }
    .markdown-body h3 { font-size: 16px; margin: 12px 0 4px; font-weight: 700; }
    .markdown-body h4 {
      font-size: 14px; margin: 12px 0 4px; font-weight: 700;
      color: var(--c-tips); text-transform: uppercase; letter-spacing: .5px;
    }
    .markdown-body p { margin: 8px 0; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0 8px 22px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body code {
      background: rgba(230,126,34,.12);
      color: #b06418;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 90%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .markdown-body pre {
      background: var(--c-header); color: #e8e8e8;
      padding: 12px; border-radius: var(--radius-sm);
      overflow-x: auto; margin: 10px 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    .markdown-body pre code { background: none; color: inherit; padding: 0; }
    .markdown-body blockquote {
      border-left: 3px solid var(--c-tips);
      padding: 2px 12px;
      color: var(--c-text-muted);
      margin: 10px 0;
    }
    .markdown-body table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
      font-size: 14px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--c-border);
      padding: 6px 10px;
      text-align: left;
    }
    .markdown-body th { background: var(--c-surface-alt); font-weight: 600; }
    .markdown-body hr {
      border: none; border-top: 1px solid var(--c-border); margin: 16px 0;
    }
    .markdown-body strong { font-weight: 700; }
    .markdown-body em { font-style: italic; }
    .doctor-tag {
      display: inline-block;
      font-size: 11px; padding: 1px 6px;
      background: var(--c-tips); color: #fff;
      border-radius: 8px; font-weight: 600;
      margin: 0 2px; vertical-align: middle;
    }

    /* Markdown editor: split pane */
    .md-editor {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 768px) {
      .md-editor {
        grid-template-columns: 1fr 1fr;
      }
    }
    .md-editor textarea {
      width: 100%;
      min-height: 280px;
      padding: 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
      resize: vertical;
    }
    .md-preview {
      padding: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      min-height: 280px;
      overflow-y: auto;
    }
    .md-toolbar {
      display: flex; gap: 4px;
      margin-bottom: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .md-toolbar button {
      min-width: 38px; height: 34px;
      padding: 0 10px;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      background: var(--c-surface);
      color: var(--c-text);
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .md-toolbar button:active { background: var(--c-surface-alt); transform: scale(.95); }
    .md-toolbar .sep {
      width: 1px; align-self: stretch;
      background: var(--c-border);
      flex-shrink: 0;
    }
    .md-cheatsheet {
      font-size: 11px; color: var(--c-text-muted);
      margin-top: 4px; line-height: 1.6;
      padding: 6px 10px;
      background: var(--c-surface-alt);
      border-radius: var(--radius-sm);
      border: 1px solid var(--c-border);
    }
    .md-cheatsheet code {
      background: rgba(0,0,0,.05);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 10px;
    }
    body[data-theme="dark"] .md-cheatsheet code { background: rgba(255,255,255,.08); }

    .md-tabs {
      display: flex; gap: 4px; margin-bottom: 8px;
    }
    .md-tabs button {
      flex: 1; padding: 8px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 13px;
    }
    .md-tabs button.active {
      background: var(--c-tips); color: #fff; border-color: var(--c-tips);
    }
    @media (min-width: 768px) {
      .md-tabs { display: none; }
      .md-editor .md-pane { display: block !important; }
    }
    @media (max-width: 767px) {
      .md-editor .md-pane.hidden { display: none; }
    }

    /* ============ Textbook slide viewer ============ */
    .slide-viewer {
      background: var(--c-surface);

<body>

  <script src="lib/marked.min.js?v=4"></script>
  <script>
  'use strict';

  /* ======================================================
     Config
  ====================================================== */
  // Admin auth — viewer-default model (v4.0.2+):
  // - No gate on app open; everyone enters as viewer
  // - Admin unlocks via Settings → enters username + password
  // - Password hashed client-side with SHA-256(salt + pw)
  // - Client-side only; true data security is the GitHub token (separate)
  const ADMIN_USERS = ['123944', 'Y08594'];
  const ADMIN_PW_HASH = '12f29e25d6a1521a315895523a4f18ee2ff11e9c6f6d2db0009631148da257ca';
  const ADMIN_SALT = 'pocket-uro-2026-puro-salt-v5';
  async function sha256Hex(s) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function verifyAdminAuth(username, password) {
    if (!ADMIN_USERS.includes(username)) return false;
    const hash = await sha256Hex(ADMIN_SALT + password);
    return hash === ADMIN_PW_HASH;
  }
  const GH_REPO = 'fantasy7386-cmd/pocket-uro';
  const LS = {
    ACCESS: 'puro_access_code',        // (legacy, unused post v4.0.2 — keep key for cleanup)
    ADMIN_UNLOCKED: 'puro_admin_unlocked',  // 'yes' after successful sign-in
    ADMIN_USER: 'puro_admin_user',     // '123944' or 'Y08594'
    TOKEN: 'puro_gh_token',
    ADMIN: 'puro_admin_mode',          // 'off' = admin in preview-as-viewer mode
    FAVS: 'puro_favorites',
    DATA: 'puro_data_json',        // local override for Patient Ed
    NOTES: 'puro_notes_json',      // local override for PPu Notes
    TIPS: 'puro_tips_json',        // local override for Tips & Guide
    TB_PREFIX: 'puro_tb_',         // local override for textbook chapter: puro_tb_tb_01
    RECENT_SEARCH: 'puro_recent_search',
  };
  const MODULES = [
    { id: 'education', name: 'Patient Education', icon: '📘', accent: '#2980b9' },
    { id: 'notes',     name: 'PPu Notes',         icon: '📗', accent: '#27ae60' },
    { id: 'tips',      name: 'Tips & Guide',      icon: '📙', accent: '#e67e22' },
    { id: 'textbook',  name: 'Textbook',          icon: '📕', accent: '#8e44ad' },
  ];
  // Default built-in mailto channel. Per-device Settings override takes priority.
  const SUBMISSION_URL_DEFAULT =
    'mailto:fantasy7386@gmail.com?subject=Pocket%20URO%20建議&body=姓名：%0A單位：%0A類別（Patient%20Ed%20/%20PPu%20Notes%20/%20Tips%20/%20Textbook）：%0A標題：%0A建議內容：%0A參考資料：';
  const LS_SUBMISSION_KEY = 'puro_submission_url';
  function submissionUrl() {
    const v = localStorage.getItem(LS_SUBMISSION_KEY);
    // Empty string in localStorage = user explicitly cleared; treat as disabled
    if (v === '') return '';
    return v || SUBMISSION_URL_DEFAULT;
  }

  /* ======================================================
     State
  ====================================================== */
  const state = {
    data: null,       // {categories, articles, glossary, ...}
    notes: null,      // {sections, ...}
    tips: null,       // {sections, ...}
    tb: {},           // tb_01 → chapter obj (lazy)
    sources: {        // 'server' | 'local'
      data: 'server',
      notes: 'server',
      tips: 'server',
      tb: {},
    },
    favorites: [],    // [{module, id, title, ts}]
  };

  /* ======================================================
     Theme + font-scale (persisted)
  ====================================================== */
  const THEME_KEY = 'puro_theme';       // 'light' | 'dark' | 'auto'
  const FONT_KEY  = 'puro_font_scale';  // 'small' | 'normal' | 'large' | 'xlarge'

  function currentTheme() {
    return localStorage.getItem(THEME_KEY) || 'auto';
  }
  function resolveTheme(mode) {
    if (mode === 'dark' || mode === 'light') return mode;
    // auto: follow prefers-color-scheme
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme() {
    const effective = resolveTheme(currentTheme());
    document.body.dataset.theme = effective;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', effective === 'dark' ? '#000000' : '#1a1a2e');
    const btn = document.getElementById('btn-theme');
    if (btn) btn.textContent = effective === 'dark' ? '☀️' : '🌙';
  }
  function setTheme(mode) {
    localStorage.setItem(THEME_KEY, mode);
    applyTheme();
  }
  // Apply immediately so dark theme renders before body is visible
  document.body.dataset.theme = resolveTheme(currentTheme());
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', () => {
      if (currentTheme() === 'auto') applyTheme();
    });
  }

  function currentFontScale() {
    return localStorage.getItem(FONT_KEY) || 'normal';
  }
  function applyFontScale() {
    document.body.dataset.fontScale = currentFontScale();
  }
  function setFontScale(s) {
    localStorage.setItem(FONT_KEY, s);
    applyFontScale();
  }
  document.body.dataset.fontScale = currentFontScale();

  /* ======================================================
     Haptic feedback (iOS PWA + Android)
  ====================================================== */
  // Detect haptic support. iOS Safari doesn't implement navigator.vibrate, so this is
  // a pure no-op on iPhone / iPad — the Web Vibration API is Android / desktop only.
  const _hapticSupported = ('vibrate' in navigator) && typeof navigator.vibrate === 'function';
  function haptic(kind) {
    if (!_hapticSupported) return;
    try {
      if (kind === 'light') navigator.vibrate(8);
      else if (kind === 'medium') navigator.vibrate(15);
      else if (kind === 'error') navigator.vibrate([20, 40, 20]);
      else if (kind === 'success') navigator.vibrate([8, 30, 8]);
      else navigator.vibrate(8);
    } catch {}
  }
  // Only install the global listener if the API exists — saves a tick per click on iOS.
  if (_hapticSupported) {
    document.addEventListener('click', (e) => {
      const b = e.target.closest('button, .module-card, .list-card, .fav-btn, .kw-tag');
      if (b) haptic('light');
    }, true);
  }

  /* ======================================================
     DOM helpers
  ====================================================== */
  const el  = (id) => document.getElementById(id);
  const viewEl = () => el('view');
  const toastEl = () => el('toast');

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escAttr(s) { return esc(s); }

  function showToast(msg, kind, opts) {
    const t = toastEl();
    t.className = 'toast ' + (kind || '');
    opts = opts || {};
    const action = opts.action;
    if (action) {
      t.innerHTML = '<span></span><button class="toast-action">' + esc(action.label) + '</button>';
      t.firstChild.textContent = msg;
      t.querySelector('.toast-action').onclick = () => {
        try { action.onClick(); } finally { t.classList.add('hidden'); }
      };
    } else {
      t.textContent = msg;
    }
    t.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.add('hidden'), opts.duration || 2600);
  }

  /* ======================================================
     Editor dirty flag + unsaved-changes guard
  ====================================================== */
  let _editorDirty = false;
  let _lastHash = location.hash;
  let _navGuard = false;

  function markEditorDirty() { _editorDirty = true; }
  function clearEditorDirty() { _editorDirty = false; }
  window.markEditorDirty  = markEditorDirty;
  window.clearEditorDirty = clearEditorDirty;

  function confirmLeave() {
    if (!_editorDirty) return true;
    return confirm('有未儲存變更，確定離開？');
  }

  window.__cancelEdit = function() {
    if (confirmLeave()) {
      clearEditorDirty();
      history.back();
    }
  };

  window.addEventListener('beforeunload', (e) => {
    if (_editorDirty) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // Guard hashchange: if leaving an edit screen with unsaved changes and user declines,
  // revert the hash to the previous value (causes a second hashchange we need to skip).
  window.addEventListener('hashchange', () => {
    if (_navGuard) { _navGuard = false; _lastHash = location.hash; return; }
    if (_editorDirty && location.hash !== _lastHash && !confirmLeave()) {
      _navGuard = true;
      location.hash = _lastHash;
      return;
    }
    _lastHash = location.hash;
  });

  /* Undo framework — snapshot whole dataset, restore on demand */
  const _undo = { snapshot: null, dataset: null, timer: null };
  function deleteWithUndo(dataset, label, mutateFn) {
    const src = dataset === 'data'  ? state.data
              : dataset === 'notes' ? state.notes
              : dataset === 'tips'  ? state.tips
              : state.tb[dataset];
    const snap = JSON.parse(JSON.stringify(src));
    mutateFn();
    markDirty(dataset);
    clearTimeout(_undo.timer);
    _undo.snapshot = snap;
    _undo.dataset = dataset;
    _undo.timer = setTimeout(() => { _undo.snapshot = null; _undo.dataset = null; }, 5500);
    showToast(label, null, {
      duration: 5000,
      action: { label: 'UNDO', onClick: () => __undoDelete() },
    });
  }
  function __undoDelete() {
    if (!_undo.snapshot) return;
    const ds = _undo.dataset;

    else if (ds === 'notes') { state.notes = _undo.snapshot; localStorage.setItem(LS.NOTES, JSON.stringify(state.notes)); }
    else if (ds === 'tips')  { state.tips = _undo.snapshot; localStorage.setItem(LS.TIPS, JSON.stringify(state.tips)); }
    else if (ds && ds.startsWith('tb_')) { state.tb[ds] = _undo.snapshot; localStorage.setItem(LS.TB_PREFIX + ds, JSON.stringify(state.tb[ds])); }
    _undo.snapshot = null; _undo.dataset = null;

  function toTerms(query) {
    if (!query) return [];
    const arr = Array.isArray(query) ? query : String(query).trim().split(/\s+/);
    return arr.map(t => String(t).trim()).filter(Boolean);
  }

  function matchAllTerms(text, terms) {
    if (!terms || !terms.length) return false;
    const low = (text || '').toLowerCase();
    return terms.every(t => low.includes(String(t).toLowerCase()));
  }

  function highlightText(text, query) {
    if (!query) return esc(text);
    const terms = toTerms(query);
    if (!terms.length) return esc(text);
    let out = esc(text);
    for (const t of terms) {
      const escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp(escaped, 'gi'), m => '<mark class="highlight">' + m + '</mark>');
    }
    return out;
  }

  function isHJHSlide(s) {
    return typeof s.slide_num === 'string' && /^HJH/i.test(s.slide_num);
  }
  function hjhSlideLabels(slides) {
    return slides.filter(isHJHSlide).map(s => String(s.slide_num).replace(/^HJH-?/i, ''));
  }

  function previewAround(text, query, radius = 80) {
    if (!text || !query) return '';
    const terms = toTerms(query);
    if (!terms.length) return '';
    const low = text.toLowerCase();
    let bestIdx = -1, bestTerm = null;
    for (const t of terms) {
      const idx = low.indexOf(t.toLowerCase());
      if (idx >= 0 && (bestIdx === -1 || idx < bestIdx)) { bestIdx = idx; bestTerm = t; }
    }
    if (bestIdx < 0) return '';
    const from = Math.max(0, bestIdx - radius);
    const to = Math.min(text.length, bestIdx + bestTerm.length + radius);
    let snippet = text.slice(from, to);
    if (from > 0) snippet = '…' + snippet;
    if (to < text.length) snippet = snippet + '…';
    return highlightText(snippet, terms);
  }

  /* ======================================================
     Data loading
  ====================================================== */
  async function loadJSON(path) {
    const resp = await fetch(path + '?t=' + Date.now());
    if (!resp.ok) throw new Error('fetch ' + path + ' ' + resp.status);
    return resp.json();
  }

  function loadLocalOverride(key, server) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return { data: server, source: 'server' };
      const local = JSON.parse(raw);
      // Only use local if strictly newer (tracked via _updated_at)
      if (local && local._updated_at && server._updated_at && local._updated_at > server._updated_at) {
        return { data: local, source: 'local' };
      }
      if (local && local._updated_at && !server._updated_at) {
        return { data: local, source: 'local' };
      }
      // Otherwise trust server
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    } catch {
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    }
  }

  async function loadCore() {
    const [dataSrv, notesSrv, tipsSrv] = await Promise.all([
      loadJSON('data.json'),

    const dOv = loadLocalOverride(LS.DATA, dataSrv);

  function normalizeData() {
    // Fix PPu Notes Roman numbering (source data has XII → XIV gap).
    // Display-only renumber; does NOT mark dirty (user didn't edit).
    if (state.notes && state.notes.sections) {
      const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
      state.notes.sections.forEach((s, i) => {
        const want = i < romans.length ? romans[i] : String(i + 1);
        s.number = want;
        s.full_title = want + '. ' + s.title;
      });
    }
  }

    // dataset: 'data' | 'notes' | 'tips' | 'tb_XX'

    if (dataset === 'data') {

      state.notes.updated = now.slice(0, 10);

      localStorage.setItem(LS.TIPS, JSON.stringify(state.tips));

      const tb = state.tb[dataset];

    if (state.sources.notes === 'local') arr.push({ id: 'notes', label: 'PPu Notes', path: 'teaching-notes.json' });

  /* ======================================================
     GitHub sync
  ====================================================== */
  async function ensureToken() {
    let token = localStorage.getItem(LS.TOKEN);
    if (token) return token;
    const t = prompt(
      '首次同步：輸入 GitHub Personal Access Token。\n\n' +
      '建立路徑：github.com/settings/tokens\n' +
      'Scope: public_repo\n\n' +
      '僅儲存在此裝置的 localStorage。'
    );
    if (!t) return null;
    token = t.trim();
    localStorage.setItem(LS.TOKEN, token);
    return token;
  }

  async function ghPutFile(path, obj, message) {
    const token = await ensureToken();
    if (!token) throw new Error('No token');
    const headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
    };
    // Get existing SHA
    const getResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { headers }
    );
    if (getResp.status === 401) {
      localStorage.removeItem(LS.TOKEN);
      throw new Error('Invalid token');
    }
    let sha = null;
    if (getResp.ok) {
      const j = await getResp.json();
      sha = j.sha;
    } else if (getResp.status !== 404) {
      throw new Error('Get SHA failed: ' + getResp.status);
    }
    const payload = JSON.stringify(obj, null, 2);
    const content = btoa(unescape(encodeURIComponent(payload)));
    const putBody = { message, content };
    if (sha) putBody.sha = sha;
    const putResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { method: 'PUT', headers, body: JSON.stringify(putBody) }
    );
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({ message: 'unknown' }));
      throw new Error('Push failed: ' + (err.message || putResp.status));
    }
    return true;
  }

  async function syncAll() {
    const dirty = dirtyDatasets();
    if (!dirty.length) {
      showToast('Nothing to sync');
      return;
    }
    const today = new Date().toISOString().slice(0, 10);
    const succeeded = [];
    const failed = [];
    for (const d of dirty) {
      try {
        let payload;
        if (d.id === 'data')       payload = state.data;
        else if (d.id === 'notes') payload = state.notes;
        else if (d.id === 'tips')  payload = state.tips;
        else if (d.id.startsWith('tb_')) payload = state.tb[d.id];
        const clone = JSON.parse(JSON.stringify(payload));
        delete clone._updated_at;
        await ghPutFile(d.path, clone, 'Update ' + d.label + ' ' + today);
        // Clear local override for this one
        if (d.id === 'data')       { localStorage.removeItem(LS.DATA);    state.sources.data = 'server'; }
        else if (d.id === 'notes') { localStorage.removeItem(LS.NOTES);   state.sources.notes = 'server'; }
        else if (d.id === 'tips')  { localStorage.removeItem(LS.TIPS);    state.sources.tips = 'server'; }
        else if (d.id.startsWith('tb_')) { localStorage.removeItem(LS.TB_PREFIX + d.id); state.sources.tb[d.id] = 'server'; }
        delete payload._updated_at;
        succeeded.push(d.label);
      } catch (e) {
        failed.push({ label: d.label, error: e.message });
        // Continue trying remaining files instead of aborting
      }
    }
    if (failed.length === 0) {
      showToast('Synced ' + succeeded.length + ' file(s) ✓', 'success');
    } else if (succeeded.length === 0) {
      showToast('Sync failed: ' + failed[0].error, 'error', { duration: 5000 });
    } else {
      showToast('Partial: ' + succeeded.length + ' synced, ' + failed.length + ' failed', 'error', { duration: 5000 });
    }
    router();
  }

  function getMdTextarea() {
    return document.getElementById('te-md');

  function mdWrapSelection(before, after) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const sel = ta.value.substring(start, end);
    const placeholder = sel || 'text';
    const newText = before + placeholder + after;
    ta.setRangeText(newText, start, end, 'select');
    if (sel) {
      ta.setSelectionRange(start + before.length, start + before.length + sel.length);
    } else {
      ta.setSelectionRange(start + before.length, start + before.length + placeholder.length);
    }
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function mdPrefixLine(prefix) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', start - 1) + 1;
    ta.setRangeText(prefix, lineStart, lineStart, 'end');
    ta.setSelectionRange(start + prefix.length, start + prefix.length);
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function mdInsertAt(text) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.setRangeText(text, start, end, 'end');
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  /* ======================================================
     Router
  ====================================================== */
  function navigate(hash) {
    if (location.hash === hash) router();
    else location.hash = hash;
  }
  function parseHash() {
    const raw = (location.hash || '#/').replace(/^#\/?/, '');
    const [pathPart, queryPart] = raw.split('?');
    const parts = pathPart.split('/').filter(Boolean);
    const query = {};
    if (queryPart) {
      for (const kv of queryPart.split('&')) {
        const [k, v] = kv.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v || '');
      }
    }
    return { parts, query };
  }

  function router() {
    const { parts, query } = parseHash();
    const module = parts[0];

    try {
      if (!module) return renderHome();
      if (module === 'favorites') return renderFavorites();
      if (module === 'search') return renderSearch(query.q || '', query.only || '');
      if (module === 'sync') return renderSyncPanel();
      if (module === 'hjh') return renderHJHBrowse();
      if (module === 'quiz') return renderQuiz();
      if (module === 'education') return routeEducation(parts.slice(1), query);
      if (module === 'notes') return routeNotes(parts.slice(1));
      if (module === 'tips') return routeTips(parts.slice(1), query);
      if (module === 'textbook') return routeTextbook(parts.slice(1), query);
      renderNotFound();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Error</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
    }
  }

  /* Lightbox / slide zoom */
  // Close on hashchange so navigating away dismisses the lightbox cleanly
  window.addEventListener('hashchange', () => {
    const lb = document.getElementById('lightbox');
    if (lb && !lb.classList.contains('hidden')) closeLightbox();
  });

  window.__openLightbox = function(src, caption) {
    const lb = el('lightbox');
    const img = el('lb-img');
    const cap = el('lb-caption');
    img.src = src;
    img.classList.remove('zoomed');
    if (caption) { cap.textContent = caption; cap.classList.remove('hidden'); }
    else { cap.classList.add('hidden'); }
    lb.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };
  function closeLightbox() {
    el('lightbox').classList.add('hidden');
    el('lb-img').src = '';
    document.body.style.overflow = '';
  }
  el('lb-close').addEventListener('click', closeLightbox);
  el('lightbox').addEventListener('click', (e) => {
    // Close when tapping backdrop (not the image or close button)
    if (e.target.id === 'lightbox' || e.target.id === 'lb-wrap') closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !el('lightbox').classList.contains('hidden')) closeLightbox();
  });
  // Double-tap to toggle 2× on the image itself
  (function installDoubleTap() {
    const img = el('lb-img');
    let lastTap = 0;
    img.addEventListener('click', (e) => {
      const now = Date.now();
      if (now - lastTap < 320) {
        img.classList.toggle('zoomed');
        e.stopPropagation();
      }
      lastTap = now;
    });
  })();

  /* Edge-swipe-back gesture (PWA standalone mode has no Safari swipe) */
  (function installEdgeSwipe() {
    let x0 = null, y0 = null;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (t.clientX < 30) { x0 = t.clientX; y0 = t.clientY; }
      else { x0 = null; }
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (x0 === null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - x0;
      const dy = Math.abs(t.clientY - y0);
      if (dx > 80 && dy < 60) {
        // Prefer parent-link (iOS navigation stack semantics); fall back to history.back
        const pl = el('btn-parent');
        if (pl && !pl.classList.contains('hidden')) {
          if (!confirmLeave()) { x0 = null; return; }
          clearEditorDirty();
          const href = pl.getAttribute('href') || '#/';
          location.hash = href;
        } else if (location.hash && location.hash !== '#/' && location.hash !== '#') {
          if (history.length > 1) history.back();
          else navigate('#/');
        }
      }
      x0 = null;
    }, { passive: true });
  })();

  window.__saveArticle = function(artId, isNew) {
    const title = el('ed-title').value.trim();
    const categoryId = el('ed-category').value;
    const text = el('ed-text').value;
    const keywords = el('ed-keywords').value.split(',').map(s => s.trim()).filter(Boolean);
    const pdf_url = el('ed-source').value.trim();
    if (!title) { showToast('Title required', 'error'); return; }
    clearEditorDirty();
    if (isNew) {
      const newArt = { id: artId, title, category: categoryId, text, keywords, related: [], pdf_url, pages: null, filename: '' };
      state.data.articles.push(newArt);
      const cat = state.data.categories.find(c => c.id === categoryId);
      if (cat) { cat.articles.push(artId); cat.count = cat.articles.length; }
      state.data.total_articles = state.data.articles.length;
    } else {
      const a = state.data.articles.find(x => x.id === artId);
      if (!a) { showToast('Article not found', 'error'); return; }
      // Handle category change
      if (a.category !== categoryId) {
        const oldCat = state.data.categories.find(c => c.id === a.category);
        const newCat = state.data.categories.find(c => c.id === categoryId);
        if (oldCat) { oldCat.articles = oldCat.articles.filter(id => id !== artId); oldCat.count = oldCat.articles.length; }
        if (newCat) { newCat.articles.push(artId); newCat.count = newCat.articles.length; }
      }
      a.title = title; a.category = categoryId; a.text = text;
      a.keywords = keywords; a.pdf_url = pdf_url;
    }
    markDirty('data');
    showToast('Saved locally ✓', 'success');
    navigate('#/education/a/' + artId);
  };

    if (!confirm('Delete section "' + s.number + '. ' + s.title + '"?')) return;
    deleteWithUndo('notes', 'Deleted: ' + s.full_title, () => {
      state.notes.sections.splice(idx, 1);
      renumberNotes();
    });
    router();
  };

  function renumberNotes() {
    const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
    state.notes.sections.forEach((s, i) => {
      s.number = i < romans.length ? romans[i] : String(i + 1);
      s.full_title = s.number + '. ' + s.title;
      if (s.subsections) {
        s.subsections.forEach((sub, j) => {
          if (sub.title) {
            sub.title = sub.title.replace(/^\d+\.\s*/, '');
            sub.title = (j + 1) + '. ' + sub.title;
          }
        });
      }
    });
    state.notes.total_sections = state.notes.sections.length;
  }

  function renderNoteDetail(sid, accent) {
    const s = state.notes.sections.find(x => x.id === sid);
    if (!s) return renderNotFound();
    setHeader(s.full_title, { label: 'PPu Notes', href: '#/notes' });
    const fav = isFav('notes', sid);
    let body = '';
    for (const sub of s.subsections) {
      body += '<div style="margin-bottom:16px">';
      if (sub.title) body += '<h4 style="font-size:15px;font-weight:700;color:var(--c-ppu-notes);margin-bottom:6px">' + esc(sub.title) + '</h4>';
      if (sub.items && sub.items.length) {
        body += '<ul style="margin-left:20px">';
        for (const it of sub.items) body += '<li style="margin:4px 0">' + esc(it) + '</li>';
        body += '</ul>';
      }
      body += '</div>';
    }
    const idx = state.notes.sections.indexOf(s);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
          <h2 style="flex:1;font-size:21px;line-height:1.3">${esc(s.full_title)}</h2>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="notes" data-fav-id="${esc(sid)}" data-fav-title="${escAttr(s.full_title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        <div class="article-body" style="white-space:normal">${body}</div>
        ${isAdmin() ? `
          <div class="action-bar">
            <button class="btn btn-primary" onclick="location.hash='#/notes/edit/${esc(sid)}'">Edit section</button>
          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  function renderNoteEdit(sid, isNew, accent, insertAfterIdx) {
    let section;
    if (isNew) {
      section = {
        id: 'tn_' + Date.now(),
        number: '',
        title: '',
        full_title: '',
        subsections: [{ title: '', items: [''] }],
        _insertAfter: (insertAfterIdx !== undefined ? insertAfterIdx : -1),
      };
    } else {
      const orig = state.notes.sections.find(x => x.id === sid);
      if (!orig) return renderNotFound();
      section = JSON.parse(JSON.stringify(orig));
    }
    setHeader(isNew ? 'New section' : 'Edit', { label: isNew ? 'PPu Notes' : (section.full_title || 'Section'), href: isNew ? '#/notes' : ('#/notes/s/' + section.id) });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:19px;margin-bottom:12px">${isNew ? 'New section' : 'Edit: ' + esc(section.title)}</h2>
        <div class="edit-field">
          <label>Section title</label>
          <input type="text" id="ne-title" value="${escAttr(section.title)}" placeholder="e.g. LUTS、排尿機轉" oninput="markEditorDirty()">
        </div>
        <div class="edit-field">
          <label>Subsections</label>
          <div id="ne-subs"></div>
        </div>
        <div class="action-bar action-bar-sticky">
          <button class="btn btn-secondary" onclick="window.__cancelEdit()">Cancel</button>
          <button class="btn btn-success" onclick="window.__saveNote('${esc(section.id)}', ${isNew}, ${section._insertAfter !== undefined ? section._insertAfter : 'null'})">Save</button>
        </div>
      </div>
    `;
    renderNoteSubsBlocks(section.subsections);
  }

  function renderNoteSubsBlocks(subs) {
    const host = el('ne-subs');
    host.innerHTML = subs.map((sub, i) => noteSubBlockHTML(sub, i)).join('')
      + `<button class="insert-btn" onclick="window.__addNoteSub()">＋ add subsection</button>`;
  }

  function noteSubBlockHTML(sub, i) {
    const items = sub.items || [];
    const itemsHTML = items.map((it, j) => noteItemRowHTML(i, j, it)).join('');
    return `
      <div class="subsection-block" data-sub-idx="${i}">
        <span class="sub-idx">Sub ${i + 1}</span>
        <button class="sub-delete" onclick="window.__delNoteSub(${i})">✕</button>
        <div class="edit-field" style="margin-bottom:8px">
          <label>Title</label>
          <input type="text" class="ne-sub-title" value="${escAttr(sub.title || '')}" placeholder="1. 某子章節" oninput="markEditorDirty()">
        </div>
        <div class="edit-field" style="margin-bottom:0">
          <label>Items (${items.length})</label>
          <div class="ne-items" data-sub-idx="${i}">
            ${itemsHTML}
          </div>
          <button class="insert-btn" style="margin-top:4px" onclick="window.__addNoteItem(${i})">＋ add item</button>
        </div>
      </div>
      <button class="insert-btn" onclick="window.__insertNoteSubAfter(${i})">＋ insert after</button>
    `;
  }

  function noteItemRowHTML(subIdx, itemIdx, itemText) {
    return `
      <div class="note-item-row" data-item-idx="${itemIdx}">
        <input type="text" class="ne-item-input" value="${escAttr(itemText)}" placeholder="item ${itemIdx + 1}" oninput="markEditorDirty()">
        <button class="item-del" onclick="window.__delNoteItem(${subIdx}, ${itemIdx})">✕</button>
      </div>
    `;
  }

  function collectNoteSubs() {
    const blocks = document.querySelectorAll('#ne-subs .subsection-block');
    const subs = [];
    blocks.forEach(b => {
      const title = b.querySelector('.ne-sub-title').value.trim();
      const items = [];
      b.querySelectorAll('.note-item-row .ne-item-input').forEach(inp => {
        const v = inp.value.trim();
        if (v) items.push(v);
      });
      subs.push({ title, items });
    });
    return subs;
  }

  window.__addNoteItem = function(subIdx) {
    const subs = collectNoteSubs();
    subs[subIdx].items.push('');
    renderNoteSubsBlocks(subs);
    // Focus the new input
    setTimeout(() => {
      const rows = document.querySelectorAll(`#ne-subs .subsection-block[data-sub-idx="${subIdx}"] .ne-item-input`);
      if (rows.length) rows[rows.length - 1].focus();
    }, 0);
  };
  window.__delNoteItem = function(subIdx, itemIdx) {
    const subs = collectNoteSubs();
    subs[subIdx].items.splice(itemIdx, 1);
    renderNoteSubsBlocks(subs);
  };

  window.__addNoteSub = function() {
    const subs = collectNoteSubs();
    subs.push({ title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };
  window.__delNoteSub = function(i) {
    const subs = collectNoteSubs();
    if (subs.length <= 1) { alert('Cannot delete last subsection'); return; }
    if (!confirm('Delete subsection ' + (i + 1) + '?')) return;
    subs.splice(i, 1);
    renderNoteSubsBlocks(subs);
  };
  window.__insertNoteSubAfter = function(i) {
    const subs = collectNoteSubs();
    subs.splice(i + 1, 0, { title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };

  window.__saveNote = function(sid, isNew, insertAfter) {
    const title = el('ne-title').value.trim();
    const subs = collectNoteSubs();
    if (!title) { showToast('Title required', 'error'); return; }
    clearEditorDirty();
    if (isNew) {
      const newSection = {
        id: sid, number: '', title, full_title: title, subsections: subs,
      };
      if (insertAfter !== null && insertAfter !== undefined && insertAfter >= 0 && insertAfter < state.notes.sections.length) {
        state.notes.sections.splice(insertAfter + 1, 0, newSection);
      } else {
        state.notes.sections.push(newSection);
      }
    } else {
      const s = state.notes.sections.find(x => x.id === sid);
      if (!s) return showToast('Section not found', 'error');
      s.title = title;
      s.subsections = subs;
    }
    renumberNotes();
    markDirty('notes');
    showToast('Saved locally ✓', 'success');
    navigate(isNew ? '#/notes' : '#/notes/s/' + sid);
  };

  /* ======================================================
     Tips & Guide
  ====================================================== */
  function routeTips(parts, query) {
    const accent = '#e67e22';
    query = query || {};
    if (!parts.length) return renderTipsList(accent);
    if (parts[0] === 's' && parts[1]) return renderTipsChapter(parts[1], accent);
    if (parts[0] === 'sub' && parts[1] && parts[2]) return renderTipsSub(parts[1], parts[2], accent);
    if (parts[0] === 'edit' && parts[1] && parts[2]) return renderTipsEdit(parts[1], parts[2], false, accent);
    if (parts[0] === 'new' && parts[1]) {
      const after = query.after !== undefined ? parseInt(query.after) : -1;
      return renderTipsEdit(parts[1], null, true, accent, after);
    }
    renderNotFound();
  }

  function renderTipsList(accent) {
    setHeader('Tips & Guide', { label: 'Home', href: '#/' });
    const dirty = state.sources.tips === 'local';
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        ${dirty ? '<div style="color:var(--c-warning);font-size:12px;margin-bottom:8px">⚠ Local changes (unsynced)</div>' : ''}
        <div class="list-section">
          ${state.tips.sections.map(s => `
            <a class="list-card" href="#/tips/s/${esc(s.id)}">
              <div style="width:36px;font-weight:700;color:${accent};font-size:15px">${esc(s.number)}</div>
              <div style="flex:1;min-width:0">
                <div class="title">${esc(s.title)}</div>
                <div class="meta">${(s.subsections || []).length} subsections</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderTipsChapter(chapterId, accent) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return renderNotFound();
    setHeader(chapter.full_title, { label: 'Tips & Guide', href: '#/tips' });
    const admin = isAdmin();
    const subs = chapter.subsections || [];
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:20px;margin-bottom:12px">${esc(chapter.full_title)}</h2>
        <div class="list-section">
          ${subs.map((sub, i) => `
            <a class="list-card" href="#/tips/sub/${esc(chapterId)}/${esc(sub.id)}">
              <div style="flex:1;min-width:0">
                <div class="title">${esc(sub.title)}</div>
                <div class="meta">${(sub.markdown || '').length} chars Markdown</div>
              </div>
              <button class="fav-btn ${isFav('tips', sub.id) ? 'active' : ''}" data-fav-module="tips" data-fav-id="${esc(sub.id)}" data-fav-title="${escAttr(sub.title)}">${isFav('tips', sub.id) ? '⭐' : '☆'}</button>
              <span class="chevron">›</span>
            </a>
            ${admin ? `<button class="insert-btn" onclick="location.hash='#/tips/new/${esc(chapterId)}?after=${i}'">＋ insert subsection after</button>` : ''}
          `).join('')}
        </div>
        ${admin ? `
          <div class="action-bar">
            <button class="btn btn-success btn-block" onclick="location.hash='#/tips/new/${esc(chapterId)}'">+ New subsection at end</button>
          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  function renderTipsSub(chapterId, subId, accent) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    const sub = chapter && chapter.subsections.find(x => x.id === subId);
    if (!chapter || !sub) return renderNotFound();
    setHeader(sub.title, { label: chapter.title, href: '#/tips/s/' + chapterId });
    const admin = isAdmin();
    const fav = isFav('tips', subId);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
          <h2 style="flex:1;font-size:20px;line-height:1.3">${esc(sub.title)}</h2>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="tips" data-fav-id="${esc(subId)}" data-fav-title="${escAttr(sub.title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        <div class="markdown-body">${renderMd(sub.markdown || '')}</div>
        ${admin ? `
          <div class="action-bar">
            <button class="btn btn-primary" onclick="location.hash='#/tips/edit/${esc(chapterId)}/${esc(subId)}'">Edit</button>
            <button class="btn btn-danger" onclick="window.__deleteTipsSub('${esc(chapterId)}','${esc(subId)}')">Delete</button>
          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  window.__deleteTipsSub = function(chapterId, subId) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return;
    const sub = chapter.subsections.find(x => x.id === subId);
    if (!sub) return;
    if (!confirm('Delete "' + sub.title + '"?')) return;
    deleteWithUndo('tips', 'Deleted: ' + sub.title, () => {
      chapter.subsections = chapter.subsections.filter(x => x.id !== subId);
    });
    navigate('#/tips/s/' + chapterId);
  };

  function renderTipsEdit(chapterId, subId, isNew, accent, insertAfterIdx) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return renderNotFound();
    let sub;
    if (isNew) {
      sub = { id: 'tg_' + chapterId.replace('tg_', '') + '_' + Date.now(), title: '', markdown: '', _insertAfter: (insertAfterIdx !== undefined ? insertAfterIdx : -1) };
    } else {
      const orig = chapter.subsections.find(x => x.id === subId);
      if (!orig) return renderNotFound();
      sub = JSON.parse(JSON.stringify(orig));
    }
    setHeader(isNew ? 'New subsection' : 'Edit', { label: isNew ? chapter.title : (sub.title || 'Subsection'), href: isNew ? ('#/tips/s/' + chapterId) : ('#/tips/sub/' + chapterId + '/' + sub.id) });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:19px;margin-bottom:12px">${isNew ? 'New in: ' + esc(chapter.title) : 'Edit: ' + esc(sub.title)}</h2>
        <div class="edit-field">
          <label>Subsection title</label>
          <input type="text" id="te-title" value="${escAttr(sub.title)}" placeholder="e.g. Stone 處置流程">
        </div>
        <div class="edit-field">
          <label>Markdown content</label>
          ${mdToolbarHTML()}
          <div class="md-tabs">
            <button class="active" onclick="window.__mdTab('edit')">Edit</button>
            <button onclick="window.__mdTab('preview')">Preview</button>
          </div>
          <div class="md-editor">
            <div class="md-pane" id="mdp-edit">
              <textarea id="te-md" oninput="window.__mdUpdate(); markEditorDirty();">${esc(sub.markdown || '')}</textarea>
            </div>
            <div class="md-pane hidden" id="mdp-preview">
              <div class="md-preview markdown-body" id="te-preview"></div>
            </div>
          </div>
        </div>
        <div class="action-bar action-bar-sticky">
          <button class="btn btn-secondary" onclick="window.__cancelEdit()">Cancel</button>
          <button class="btn btn-success" onclick="window.__saveTips('${esc(chapterId)}','${esc(sub.id)}',${isNew},${sub._insertAfter !== undefined ? sub._insertAfter : 'null'})">Save</button>
        </div>
      </div>
    `;
    window.__mdUpdate();
  }

  window.__mdTab = function(which) {
    const ep = el('mdp-edit'), pp = el('mdp-preview');
    const btns = document.querySelectorAll('.md-tabs button');
    if (which === 'edit') {
      ep.classList.remove('hidden'); pp.classList.add('hidden');
      btns[0].classList.add('active'); btns[1].classList.remove('active');
    } else {
      ep.classList.add('hidden'); pp.classList.remove('hidden');
      btns[0].classList.remove('active'); btns[1].classList.add('active');
      window.__mdUpdate();
    }
  };
  window.__mdUpdate = function() {
    const md = el('te-md').value;
    const pv = el('te-preview');
    if (pv) pv.innerHTML = renderMd(md);
  };

  window.__saveTips = function(chapterId, subId, isNew, insertAfter) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return showToast('Chapter not found', 'error');
    const title = el('te-title').value.trim();
    const md = el('te-md').value;
    if (!title) return showToast('Title required', 'error');
    clearEditorDirty();
    if (isNew) {
      const newSub = { id: subId, title, markdown: md };
      if (insertAfter !== null && insertAfter !== undefined && insertAfter >= 0 && insertAfter < chapter.subsections.length) {
        chapter.subsections.splice(insertAfter + 1, 0, newSub);
      } else {
        chapter.subsections.push(newSub);
      }
    } else {
      const s = chapter.subsections.find(x => x.id === subId);
      if (!s) return showToast('Not found', 'error');
      s.title = title;
      s.markdown = md;
    }
    state.tips.total_subsections = state.tips.sections.reduce((a, s) => a + s.subsections.length, 0);
    markDirty('tips');
    showToast('Saved locally ✓', 'success');
    navigate('#/tips/sub/' + chapterId + '/' + subId);
  };

  /* ======================================================
     Textbook
  ====================================================== */
  const TB_CHAPTER_IDS = ['tb_01','tb_02','tb_03','tb_04','tb_05','tb_06','tb_07','tb_08','tb_09','tb_10','tb_11','tb_12'];

  async function routeTextbook(parts, query) {
    const accent = '#8e44ad';
    query = query || {};
    if (!parts.length) return renderTextbookHome(accent);
    if (parts[0] === 'c' && parts[1]) {
      await loadChapter(parts[1]);
      if (parts[2] === 's' && parts[3]) return renderTbSection(parts[1], parseInt(parts[3]), accent);
      return renderTbChapter(parts[1], accent);
    }
    if (parts[0] === 't' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      const opts = {
        slideIdx: query.slide !== undefined ? parseInt(query.slide) : 0,
        highlight: query.q || '',
      };
      return renderTbTopic(parts[1], parts[2], accent, opts);
    }
    if (parts[0] === 'edit-notes' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      return renderTbTopicNotesEdit(parts[1], parts[2], accent);
    }
    if (parts[0] === 'edit-ocr' && parts[1] && parts[2] && parts[3] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbOCREdit(parts[1], parts[2], parseInt(parts[3]), accent);
    }
    if (parts[0] === 'new-text' && parts[1] && parts[2] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbNewTextTopic(parts[1], parseInt(parts[2]), accent);
    }
    if (parts[0] === 'edit-text' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      return renderTbEditTextTopic(parts[1], parts[2], accent);
    }
    if (parts[0] === 'move' && parts[1] && parts[2] && parts[3] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbMoveSlide(parts[1], parts[2], parseInt(parts[3]), accent);
    }
    renderNotFound();
  }

  function renderTextbookHome(accent) {
    setHeader('Textbook Knowledge', { label: 'Home', href: '#/' });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div class="home-grid" id="tb-grid">
          ${TB_CHAPTER_IDS.map(id => `
            <a class="module-card" style="--accent:${accent}" href="#/textbook/c/${esc(id)}">
              <div class="icon">📕</div>
              <div>
                <div class="name" id="tb-name-${esc(id)}">${esc(id)}</div>
                <div class="count" id="tb-count-${esc(id)}">loading…</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `;
    // Lazy-resolve chapter titles
    TB_CHAPTER_IDS.forEach(id => {
      loadChapter(id).then(ch => {
        const nm = el('tb-name-' + id);
        const ct = el('tb-count-' + id);
        if (nm) nm.textContent = (ch.icon ? ch.icon + ' ' : '') + ch.title;
        if (ct) {
          const topics = (ch.sections || []).reduce((a, s) => a + (s.topics ? s.topics.length : 0), 0);
          ct.textContent = (ch.sections ? ch.sections.length : 0) + ' sections · ' + topics + ' topics';
        }
      }).catch(() => {
        const ct = el('tb-count-' + id);
        if (ct) ct.textContent = '(load failed)';
      });
    });
  }

  function renderTbChapter(tbId, accent) {
    const ch = state.tb[tbId];
    if (!ch) return renderNotFound();
    setHeader((ch.icon ? ch.icon + ' ' : '') + ch.title, { label: 'Textbook', href: '#/textbook' });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:21px;margin-bottom:12px">${esc(ch.icon || '')} ${esc(ch.number)}. ${esc(ch.title)}</h2>
        <div class="list-section">
          ${(ch.sections || []).map((s, i) => `
            <a class="list-card" href="#/textbook/c/${esc(tbId)}/s/${i}">
              <div style="flex:1;min-width:0">
                <div class="title">${esc(s.title)}</div>
                <div class="meta">${(s.topics || []).length} topics · ${s.total_slides || '?'} slides</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderTbSection(tbId, secIdx, accent) {
    const ch = state.tb[tbId];
    const sec = ch && ch.sections && ch.sections[secIdx];
    if (!sec) return renderNotFound();
    setHeader(sec.title, { label: ch.title, href: '#/textbook/c/' + tbId });
    const admin = isAdmin();
    const dirty = state.sources.tb[tbId] === 'local';
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:20px;margin-bottom:4px">${esc(sec.title)}</h2>
        ${dirty ? '<div style="color:var(--c-warning);font-size:12px;margin-bottom:8px">⚠ Local changes (unsynced)</div>' : ''}
        <div style="color:var(--c-text-muted);font-size:13px;margin-bottom:12px">${(sec.topics || []).length} topics · from ${esc(sec.source_file || '')}</div>
        <div class="list-section">
          ${(sec.topics || []).map(t => topicListCard(tbId, t, accent)).join('')}
        </div>

          <div class="action-bar">
            <button class="btn btn-success btn-block" onclick="location.hash='#/textbook/new-text/${esc(tbId)}/${secIdx}'">+ New text-only topic in this section</button>
          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  function topicListCard(tbId, t, accent) {
    const fav = isFav('textbook', t.id);
    const isText = t.type === 'text_only';
    const badges = [];
    if (t.has_exam_questions) badges.push('<span class="topic-badge exam">📝 Exam</span>');
    if (t.has_hjh_content) badges.push('<span class="topic-badge hjh">HJH</span>');
    if (isText) badges.push('<span class="topic-badge text-only">📄 Text</span>');
    let meta;
    if (isText) {
      meta = (t.markdown_content || '').length + ' chars';
    } else {
      const all = t.slides || [];
      const hiddenCount = all.filter(s => s.hidden).length;
      meta = all.length + ' slides' + (hiddenCount ? ` · ${hiddenCount}📎 補充` : '');
    }
    const cardClass = t.has_hjh_content ? 'list-card hjh' : 'list-card';

    // Mini thumbnail from first non-hidden slide (fallback to first of any)
    const all = t.slides || [];
    const firstSlide = all.find(s => !s.hidden) || all[0];
    const thumbHTML = (!isText && firstSlide && firstSlide.slide_image)
      ? `<img class="topic-thumb" src="${escAttr(firstSlide.slide_image)}" alt="" loading="lazy">`
      : (isText ? '<div class="topic-thumb" style="display:flex;align-items:center;justify-content:center;font-size:18px">📄</div>' : '');

    return `
      <a class="${cardClass}" href="#/textbook/t/${esc(tbId)}/${esc(t.id)}">
        ${thumbHTML}
        <div style="flex:1;min-width:0">
          <div class="title" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${esc(t.title)}${badges.join('')}</div>
          <div class="meta">${meta}</div>
        </div>
        <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(t.id)}" data-fav-title="${escAttr(t.title)}">${fav ? '⭐' : '☆'}</button>
        <span class="chevron">›</span>
      </a>`;
  }

  function findTopic(tbId, topicId) {
    const ch = state.tb[tbId];
    if (!ch) return null;
    for (let si = 0; si < (ch.sections || []).length; si++) {
      const sec = ch.sections[si];
      const ti = (sec.topics || []).findIndex(t => t.id === topicId);
      if (ti >= 0) return { ch, sec, secIdx: si, topic: sec.topics[ti], topicIdx: ti };
    }
    return null;
  }

  function renderTbTopic(tbId, topicId, accent, opts) {
    opts = opts || {};
    const initialSlideIdx = Math.max(0, opts.slideIdx || 0);
    const highlight = opts.highlight || '';
    const found = findTopic(tbId, topicId);
    if (!found) return renderNotFound();
    const { ch, sec, secIdx, topic } = found;
    setHeader(topic.title, { label: sec.title, href: '#/textbook/c/' + tbId + '/s/' + secIdx });
    const fav = isFav('textbook', topicId);
    const admin = isAdmin();

    let content = '';
    // All slides visible (including PPT-hidden, badged as supplementary)
    const visibleSlides = (topic.slides || []);
    if (topic.type === 'text_only') {
      const md = topic.markdown_content || '';
      let rendered = renderMd(md);
      if (highlight) {
        // Naive highlight inside rendered HTML — wrap text matches
        const safe = highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        rendered = rendered.replace(new RegExp('(?![^<]*>)(' + safe + ')', 'gi'), '<mark class="highlight">$1</mark>');
      }
      content = `<div class="markdown-body">${rendered}</div>`;
    } else {
      if (!visibleSlides.length) {
        content = '<div class="placeholder"><div class="big">📄</div><strong>No visible slides</strong></div>';
      } else {
        const startIdx = Math.min(initialSlideIdx, visibleSlides.length - 1);
        content = renderSlideViewerHTML(tbId, topicId, visibleSlides, startIdx, highlight);
      }
    }

    const badges = [];
    if (topic.has_exam_questions) badges.push('<span class="topic-badge exam">📝 Exam</span>');
    if (topic.has_hjh_content)    badges.push('<span class="topic-badge hjh">HJH</span>');
    if (topic.type === 'text_only') badges.push('<span class="topic-badge text-only">📄 Text</span>');

    // HJH slide summary for quick navigation
    const hjhLabels = hjhSlideLabels(visibleSlides);
    const hjhSummary = hjhLabels.length ? `
      <details class="hjh-summary" style="margin-bottom:10px">
        <summary style="padding:8px 12px;background:#fff5d6;border:1px solid #f0d986;border-radius:var(--radius-sm);font-size:13px;color:#8b5a00;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between">
          <span><strong>${hjhLabels.length} HJH slide${hjhLabels.length > 1 ? 's' : ''}</strong> in this topic</span>
          <span style="font-size:11px;opacity:.7">tap to show ▸</span>
        </summary>
        <div style="padding:8px 4px;display:flex;flex-wrap:wrap;gap:6px">
          ${visibleSlides.map((s, i) => isHJHSlide(s) ? `<a href="#/textbook/t/${esc(tbId)}/${esc(topicId)}?slide=${i}" style="padding:4px 10px;background:#ffe680;color:#8b5a00;border-radius:8px;font-weight:700;text-decoration:none;font-size:12px">${esc(String(s.slide_num))}</a>` : '').join('')}
        </div>
      </details>
    ` : '';

    const notesHTML = topic.notes ? `
      <div class="topic-notes">
        <div class="notes-label">📝 Notes</div>
        <div class="markdown-body">${renderMd(topic.notes)}</div>
      </div>
    ` : '';

    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div class="topic-header">
          <div class="title">${esc(topic.title)}</div>
          <div class="badges">${badges.join('')}</div>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(topicId)}" data-fav-title="${escAttr(topic.title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        ${notesHTML}
        ${hjhSummary}
        <div id="tb-content">${content}</div>
        ${admin ? `
          <div class="action-bar">
            ${topic.type === 'text_only'
              ? `<button class="btn btn-primary" onclick="location.hash='#/textbook/edit-text/${esc(tbId)}/${esc(topicId)}'">Edit content</button>`
              : `<button class="btn btn-secondary" onclick="window.__ocrEditPrompt('${esc(tbId)}','${esc(topicId)}')">Edit OCR</button>`
            }
            <button class="btn btn-primary" onclick="location.hash='#/textbook/edit-notes/${esc(tbId)}/${esc(topicId)}'">Edit notes</button>
            <button class="btn btn-danger" onclick="window.__deleteTopic('${esc(tbId)}','${esc(topicId)}')">Delete topic</button>
          </div>
        ` : ''}
      </div>
    `;

    if (topic.type !== 'text_only') bindSlideViewer(tbId, topicId, initialSlideIdx, highlight);
    bindFavButtons();
  }

  window.__deleteTopic = function(tbId, topicId) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    if (!confirm('Delete topic "' + found.topic.title + '"?')) return;
    deleteWithUndo(tbId, 'Deleted: ' + found.topic.title, () => {
      found.sec.topics = found.sec.topics.filter(t => t.id !== topicId);
    });
    navigate('#/textbook/c/' + tbId + '/s/' + found.secIdx);
  };

  window.__ocrEditPrompt = function(tbId, topicId) {
    // Show a simple slide picker overlay: for now, navigate to slide 0 editor
    const found = findTopic(tbId, topicId);
    if (!found) return;
    const slides = (found.topic.slides || []).filter(s => !s.hidden);
    if (!slides.length) return;
    // Pick currently-viewing slide from DOM
    const cur = parseInt(el('tb-slide-index') ? el('tb-slide-index').textContent : 1) - 1;
    const idx = Math.max(0, Math.min(slides.length - 1, cur));
    navigate('#/textbook/edit-ocr/' + tbId + '/' + topicId + '/' + idx);
  };
