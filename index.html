<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pocket URO</title>

  <link rel="manifest" href="manifest.json?v=3">
  <link rel="icon" href="icon-192.png?v=3">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pocket URO">
  <meta name="theme-color" content="#1a1a2e">

  <style>
    /* ============ Design tokens ============ */
    :root {
      /* Module colors (stable across themes) */
      --c-patient-ed: #2980b9;
      --c-ppu-notes: #27ae60;
      --c-tips: #e67e22;
      --c-textbook: #8e44ad;

      /* Light theme (default) */
      --c-bg: #f5f5f7;
      --c-surface: #ffffff;
      --c-surface-alt: #fafafa;
      --c-text: #2c3e50;
      --c-text-muted: #7f8c8d;
      --c-border: #e5e5ea;
      --c-header: #1a1a2e;
      --c-header-text: #ffffff;
      --c-danger: #e74c3c;
      --c-success: #27ae60;
      --c-warning: #f39c12;
      --c-info: #3498db;
      --c-accent: var(--c-info);
      --c-highlight-bg: #ffe680;
      --c-highlight-fg: #2c3e50;
      --c-hjh-bg-start: #fff5cc;
      --c-hjh-bg-end: #ffe680;
      --c-hjh-fg: #8b5a00;
      --c-hjh-border: #f0d986;
      --c-hjh-accent: #f1c40f;
      --c-hjh-note-bg: #fffaed;
      --c-hjh-card-bg: #fffbe6;

      /* Inline code (doctor-tags `[名]`) — light theme defaults, dark theme overrides below */
      --c-code-bg: rgba(230,126,34,.12);
      --c-code-fg: #b06418;

      /* Role indicator (viewer banner bg — light theme) */
      --c-role-viewer-bg: #eef4fa;

      /* Typography */
      --font-read: 15px;         /* body text / markdown / articles */
      --font-read-lg: 17px;      /* list-card titles when enlarged */
      --font-ui: 15px;           /* UI controls */

      --radius: 12px;
      --radius-sm: 8px;
      --tap-target: 44px;
      --max-width: 820px;
      --header-height: 56px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 2px 6px rgba(0,0,0,.08);
    }

    /* Dark theme override — re-evaluated 2026-05-06 for less-jarring text colors:
       - Module accents lightened + desaturated (vs raw light values which are too vivid on dark)
       - Semantic colors (danger/warning/success) lightened
       - HJH gold toned down from #ffd85a to #e8c46a
       - Highlight background reduced saturation
       - .markdown-body code (doctor-tag inline code) gets dedicated token pair */
    body[data-theme="dark"] {
      --c-bg: #0f1419;
      --c-surface: #1a1f2e;
      --c-surface-alt: #141821;
      --c-text: #e8eaed;
      --c-text-muted: #8b95a5;
      --c-border: #2a3040;
      --c-header: #000000;
      --c-header-text: #e8eaed;

      /* Module accents — lightened + slightly desaturated for dark bg */
      --c-patient-ed: #5fa8d8;
      --c-ppu-notes:  #54c785;
      --c-tips:       #e89958;
      --c-textbook:   #b885d4;

      /* Semantic — lighter/softer for dark */
      --c-danger:  #ff6f6f;
      --c-success: #54c785;
      --c-warning: #f0b350;
      --c-info:    #5dade2;
      --c-accent:  var(--c-info);

      /* Highlight (search match) — less saturated mustard, easier on eyes */
      --c-highlight-bg: #b89438;
      --c-highlight-fg: #1a1a2e;

      /* HJH — toned down golden */
      --c-hjh-bg-start: #3d3018;
      --c-hjh-bg-end:   #5a4520;
      --c-hjh-fg:       #e8c46a;
      --c-hjh-border:   #5a4520;
      --c-hjh-accent:   #e8c46a;
      --c-hjh-note-bg:  #1f1a0e;
      --c-hjh-card-bg:  #1a1810;

      /* Inline code (doctor-tags `[名]`) — dark-mode specific */
      --c-code-bg: rgba(232,153,88,.16);
      --c-code-fg: #f0b88a;

      /* Role indicator (viewer banner bg — dark variant: soft navy tint) */
      --c-role-viewer-bg: #1a2440;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 2px 6px rgba(0,0,0,.4);
    }


    /* Font scale variants */
    body[data-font-scale="small"]  { --font-read: 13px; --font-read-lg: 15px; --font-ui: 14px; }
    body[data-font-scale="normal"] { --font-read: 15px; --font-read-lg: 17px; --font-ui: 15px; }
    body[data-font-scale="large"]  { --font-read: 17px; --font-read-lg: 19px; --font-ui: 16px; }
    body[data-font-scale="xlarge"] { --font-read: 19px; --font-read-lg: 21px; --font-ui: 17px; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei",
                   sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 16px;
    }
    body {
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    button { font: inherit; cursor: pointer; color: inherit; background: none; border: none; }
    input, textarea, select { font: inherit; color: inherit; }
    a { color: var(--c-info); text-decoration: none; }
    ::selection { background: var(--c-accent); color: #fff; }

    /* ============ App shell ============ */
    #app[hidden] { display: none; }

    .app-header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-height);
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 8px;
      gap: 4px;
    }
    .app-header h1 {
      font-size: 16px; font-weight: 600; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      padding: 0 4px;
    }
    .app-header .parent-link {
      display: flex; align-items: center; gap: 2px;
      color: var(--c-info);
      font-size: 15px;
      text-decoration: none;
      padding: 8px 6px;
      border-radius: 8px;
      min-height: var(--tap-target);
      max-width: 100%;
      overflow: hidden;
      justify-self: start;
    }
    .app-header .parent-link.hidden { visibility: hidden; pointer-events: none; }
    .app-header .parent-link:active { background: rgba(0,0,0,.06); }
    .app-header .parent-link .chev {
      font-size: 22px; font-weight: 600; line-height: 1;
      flex-shrink: 0;
    }
    .app-header .parent-link .label {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .app-header .more-btn {
      width: var(--tap-target); height: var(--tap-target);
      border-radius: 50%; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      justify-self: end;
      position: relative;
    }
    .app-header .more-btn:active { background: rgba(0,0,0,.06); }
    .app-header .more-btn .dot-badge {
      position: absolute; top: 6px; right: 4px;
      width: 16px; height: 16px;
      background: var(--c-danger); color: #fff;
      border-radius: 8px; font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .more-menu {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + var(--header-height) + 6px);
      right: 8px;
      min-width: 220px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      z-index: 500;
      overflow: hidden;
    }
    .more-menu.hidden { display: none; }
    .more-menu a, .more-menu button {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      text-align: left;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--c-text);
      font-size: 15px;
      text-decoration: none;
      border-bottom: 1px solid var(--c-border);
      cursor: pointer;
    }
    .more-menu a:last-child, .more-menu button:last-child { border-bottom: none; }
    .more-menu a:active, .more-menu button:active { background: var(--c-surface-alt); }
    .more-menu .icon {
      font-size: 18px; width: 24px; text-align: center; flex-shrink: 0;
    }
    .more-menu .badge-inline {
      margin-left: auto;
      font-size: 11px; padding: 2px 8px;
      background: var(--c-danger); color: #fff;
      border-radius: 8px; font-weight: 700;
    }
    .more-menu-backdrop {
      position: fixed; inset: 0; z-index: 499;
      background: transparent;
    }
    .more-menu-backdrop.hidden { display: none; }

    #view {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* ============ Module view header ============ */
    .module-view[data-accent] {
      --accent: var(--module-accent);
    }
    .module-header-strip {
      height: 4px; width: 100%;
      background: var(--accent, var(--c-border));
      margin-bottom: 16px; border-radius: 2px;
    }

    /* ============ Home ============ */
    .brand {
      display: flex; flex-direction: column;
      padding: 24px 0 14px;
      gap: 2px;
    }
    .brand-row { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      display: flex; line-height: 0; flex-shrink: 0;
    }
    .brand-icon svg { display: block; }
    .brand-icon img { display: block; width: 56px; height: 56px; transform: translateY(6px); }
    .brand-name { font-size: 26px; font-weight: 700; letter-spacing: -0.4px; }
    .brand-tag { font-size: 12px; color: var(--c-text-muted); margin-left: 68px; }

    .search-bar {
      width: 100%; padding: 12px 16px; border: 1px solid var(--c-border);
      border-radius: var(--radius); font-size: 16px;
      background: var(--c-surface); margin-bottom: 16px;
      -webkit-appearance: none; appearance: none;
    }
    /* Search bar with iOS-style clear button (×) */
    .search-bar-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-bar-wrap .search-bar {
      margin-bottom: 0;
      padding-right: 42px;
    }
    .search-clear {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--c-text-muted);
      color: var(--c-surface);
      font-size: 14px; line-height: 1; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: none; padding: 0;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.7;
    }
    .search-clear:active { opacity: 1; }
    .search-clear[hidden] { display: none; }

    .home-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (min-width: 768px) { .home-grid { gap: 16px; } }

    .module-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 16px;
      border-left: 6px solid var(--accent, #333);
      border-top: 1px solid var(--c-border);
      border-right: 1px solid var(--c-border);
      border-bottom: 1px solid var(--c-border);
      min-height: 120px;
      display: flex; flex-direction: column; justify-content: space-between;
      text-align: left;
      transition: transform .08s ease;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
    }
    .module-card:active { transform: scale(.97); }
    .module-card .icon {
      color: var(--accent);
      display: flex; align-items: center;
      height: 28px;
    }
    .module-card .icon svg { display: block; }
    .module-card .name { font-size: 15px; font-weight: 600; margin-top: 10px; }
    .module-card .count { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }

    .home-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; padding: 8px 0;
      font-size: 13px;
    }
    .home-actions a { color: var(--c-text-muted); text-decoration: underline; }
    .home-actions .admin-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--c-header); color: #fff;
    }

    /* ============ Generic list items ============ */
    .list-section {
      margin-top: 8px;
    }
    .list-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--c-border);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      color: inherit; text-decoration: none;
      min-height: var(--tap-target);
    }
    .list-card:active { background: var(--c-surface-alt); }
    .list-card .title {
      font-size: var(--font-read); font-weight: 500; flex: 1;
      overflow: hidden;
    }
    .list-card .meta {
      font-size: 12px; color: var(--c-text-muted);
      margin-top: 2px;
    }
    .list-card .chevron { color: var(--c-text-muted); font-size: 18px; }
    .list-card .badge {
      background: var(--accent, var(--c-border));
      color: #fff; font-size: 11px; padding: 2px 8px;
      border-radius: 10px; font-weight: 600;
      white-space: nowrap;
    }
    .list-card .fav-btn {
      font-size: 18px; opacity: .35; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .list-card .fav-btn.active { opacity: 1; }

    /* ============ Empty state / placeholder ============ */
    .placeholder {
      padding: 40px 20px;
      text-align: center;
      color: var(--c-text-muted);
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
    }
    .placeholder .big { font-size: 40px; margin-bottom: 12px; }
    .placeholder strong { color: var(--c-text); display: block; margin-bottom: 6px; font-size: 17px; }
    .placeholder small { font-size: 13px; }

    /* ============ Article view ============ */
    .article-body {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--c-border);
      white-space: pre-wrap;
      font-size: var(--font-read);
      line-height: 1.75;
      word-break: break-word;
    }
    .article-meta-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 12px; color: var(--c-text-muted);
      margin-bottom: 12px;
    }
    .article-meta-row span {
      padding: 2px 8px; background: var(--c-surface); border-radius: 10px;
      border: 1px solid var(--c-border);
    }
    .article-keywords {
      margin-top: 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .kw-tag {
      font-size: 12px; padding: 4px 10px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 10px; color: var(--c-text-muted);
    }
    .article-source {
      margin-top: 16px; padding: 10px 14px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 12px; color: var(--c-text-muted);
    }
    .article-source a { word-break: break-all; }

    /* ============ Notes / Tips editors ============ */
    .edit-field { margin-bottom: 16px; }
    .edit-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--c-text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .edit-field input[type="text"],
    .edit-field input[type="url"],
    .edit-field select,
    .edit-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 15px;
    }
    .edit-field textarea {
      min-height: 160px; resize: vertical;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
    }
    .edit-field textarea.plain {
      font-family: inherit; font-size: 15px;
    }
    .subsection-block {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
      position: relative;
    }
    .subsection-block .sub-idx {
      position: absolute; top: -10px; left: 12px;
      background: var(--c-header); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
    }
    .subsection-block .sub-delete {
      position: absolute; top: 8px; right: 8px;
      color: var(--c-danger); font-size: 16px; padding: 4px 8px;
    }
    .insert-btn {
      display: block; width: 100%; padding: 4px 0;
      color: var(--c-success); font-size: 14px;
      border: 1px dashed transparent;
      border-radius: var(--radius-sm);
      margin: 4px 0;
      opacity: .5;
    }
    .insert-btn:hover { opacity: 1; border-color: var(--c-border); }

    /* ============ Tips Markdown renderer ============ */
    .markdown-body { font-size: var(--font-read); line-height: 1.75; }
    .markdown-body h1 { font-size: 22px; margin: 16px 0 8px; font-weight: 700; }
    .markdown-body h2 { font-size: 19px; margin: 14px 0 6px; font-weight: 700; }
    .markdown-body h3 { font-size: 16px; margin: 12px 0 4px; font-weight: 700; }
    .markdown-body h4 {
      font-size: 14px; margin: 12px 0 4px; font-weight: 700;
      color: var(--c-tips); text-transform: uppercase; letter-spacing: .5px;
    }
    .markdown-body p { margin: 8px 0; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0 8px 22px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 10px auto;
      border-radius: 6px;
      border: 1px solid var(--c-border);
      cursor: zoom-in;
    }
    /* Image attachments: rendered below markdown text in view mode */
    .attachments {
      display: flex; flex-wrap: wrap; gap: 12px;
      margin-top: 20px;
    }
    .attachment {
      flex: 1 1 300px; max-width: 100%;
      margin: 0;
    }
    .attachment img {
      width: 100%; height: auto; border-radius: 6px;
      border: 1px solid var(--c-border);
      cursor: zoom-in;
      display: block;
    }
    .attachment figcaption {
      font-size: 12px; color: var(--c-text-muted);
      margin-top: 6px; text-align: center;
    }
    /* Edit-screen image buffer gallery */
    .editor-images {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 8px;
    }
    .edit-image-item {
      width: 130px;
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 6px;
      background: var(--c-surface-alt);
    }
    .edit-image-item img {
      width: 100%; height: 90px;
      object-fit: cover;
      border-radius: 4px;
      cursor: zoom-in;
      display: block;
    }
    .edit-image-item input {
      width: 100%; font-size: 11px;
      margin-top: 6px; padding: 4px 6px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-surface); color: var(--c-text);
      box-sizing: border-box;
    }
    .markdown-body code {
      background: var(--c-code-bg);
      color: var(--c-code-fg);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 90%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .markdown-body pre {
      background: var(--c-header); color: #e8e8e8;
      padding: 12px; border-radius: var(--radius-sm);
      overflow-x: auto; margin: 10px 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    .markdown-body pre code { background: none; color: inherit; padding: 0; }
    .markdown-body blockquote {
      border-left: 3px solid var(--c-tips);
      padding: 2px 12px;
      color: var(--c-text-muted);
      margin: 10px 0;
    }
    .markdown-body table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
      font-size: 14px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--c-border);
      padding: 6px 10px;
      text-align: left;
    }
    .markdown-body th { background: var(--c-surface-alt); font-weight: 600; }
    .markdown-body hr {
      border: none; border-top: 1px solid var(--c-border); margin: 16px 0;
    }
    .markdown-body strong { font-weight: 700; }
    .markdown-body em { font-style: italic; }
    .doctor-tag {
      display: inline-block;
      font-size: 11px; padding: 1px 6px;
      background: var(--c-tips); color: #fff;
      border-radius: 8px; font-weight: 600;
      margin: 0 2px; vertical-align: middle;
    }

    /* Markdown editor: split pane */
    .md-editor {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 768px) {
      .md-editor {
        grid-template-columns: 1fr 1fr;
      }
    }
    .md-editor textarea {
      width: 100%;
      min-height: 280px;
      padding: 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
      resize: vertical;
    }
    .md-preview {
      padding: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);

    if (mode === 'dark' || mode === 'light') return mode;

  /* ======================================================
     Haptic feedback (iOS PWA + Android)
  ====================================================== */
  // Detect haptic support. iOS Safari doesn't implement navigator.vibrate, so this is
  // a pure no-op on iPhone / iPad — the Web Vibration API is Android / desktop only.
  const _hapticSupported = ('vibrate' in navigator) && typeof navigator.vibrate === 'function';
  function haptic(kind) {
    if (!_hapticSupported) return;
    try {
      if (kind === 'light') navigator.vibrate(8);
      else if (kind === 'medium') navigator.vibrate(15);
      else if (kind === 'error') navigator.vibrate([20, 40, 20]);
      else if (kind === 'success') navigator.vibrate([8, 30, 8]);
      else navigator.vibrate(8);
    } catch {}
  }
  // Only install the global listener if the API exists — saves a tick per click on iOS.
  if (_hapticSupported) {
    document.addEventListener('click', (e) => {
      const b = e.target.closest('button, .module-card, .list-card, .fav-btn, .kw-tag');
      if (b) haptic('light');
    }, true);
  }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // v3.7.1: Wraps localStorage.setItem with quota-exceeded handling.
  // Returns true on success, throws a descriptive Error on quota failure so
  // save handlers can roll back and surface the error instead of silent loss.
  function safeSetItem(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      const isQuota =
        e && (e.name === 'QuotaExceededError' ||
              e.code === 22 || e.code === 1014);
      if (isQuota) {
        const sizeKB = Math.round((value || '').length / 1024);
        throw new Error('localStorage 額度已滿（單次寫入約 ' + sizeKB + ' KB）。請先 Sync to GitHub 或移除圖片後重試。');
      }
      throw e;
    }
  }

  // Promise-based confirm dialog. Replaces native confirm() for styled UX.
  // For navigation guards that need SYNC decisions (hashchange), continue
  // using native confirm(). Call sites with simple yes/no are async now.
  function showConfirm(message, options) {
    return new Promise((resolve) => {
      options = options || {};
      const backdrop = el('confirm-backdrop');
      const msgEl    = el('confirm-msg');
      const okBtn    = el('confirm-ok');
      const cancelBtn= el('confirm-cancel');
      msgEl.textContent = message;
      okBtn.textContent = options.okLabel || 'OK';
      cancelBtn.textContent = options.cancelLabel || 'Cancel';
      okBtn.className = 'btn ' + (options.danger ? 'btn-danger' : 'btn-primary');
      const done = (result) => {
        backdrop.classList.add('hidden');
        okBtn.onclick = null;
        cancelBtn.onclick = null;
        backdrop.onclick = null;
        document.removeEventListener('keydown', onKey, true);
        resolve(result);
      };
      const onKey = (e) => {
        if (e.key === 'Escape') { e.preventDefault(); done(false); }
        else if (e.key === 'Enter') { e.preventDefault(); done(true); }
      };
      okBtn.onclick = () => done(true);
      cancelBtn.onclick = () => done(false);
      backdrop.onclick = (e) => { if (e.target === backdrop) done(false); };
      document.addEventListener('keydown', onKey, true);
      backdrop.classList.remove('hidden');
      setTimeout(() => okBtn.focus(), 20);
    });
  }

  function showToast(msg, kind, opts) {
    const t = toastEl();
    t.className = 'toast ' + (kind || '');
    opts = opts || {};
    const action = opts.action;
    if (action) {
      t.innerHTML = '<span></span><button class="toast-action">' + esc(action.label) + '</button>';
      t.firstChild.textContent = msg;
      t.querySelector('.toast-action').onclick = () => {
        try { action.onClick(); } finally { t.classList.add('hidden'); }
      };
    } else {
      t.textContent = msg;
    }
    t.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.add('hidden'), opts.duration || 2600);
  }

  // Wrap any Save button so the user gets immediate feedback (haptic + button
  // flip to "✓ Saved" + disabled) before the save handler runs. Prevents the
  // "did that work?" double-tap problem reported 2026-04-20. Pass `this` as btn.
  window.__saveFb = function(btn, saveFn) {
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = '⏳ Saving…';
    const restore = () => {
      btn.textContent = orig;
      btn.disabled = false;
    };
    try {
      const r = saveFn();
      // Save handler returns explicit `false` on validation failure — restore
      // button immediately so user can correct and retry. Only flash "✓ Saved"
      // on truthy-or-undefined return (successful save).
      if (r === false) {
        restore();
        haptic('error');
        return r;
      }
      haptic('success');
      btn.textContent = '✓ Saved';
      // If save handler navigates away, this restore never runs — fine.
      setTimeout(() => { if (btn.isConnected) restore(); }, 1500);
      return r;
    } catch (e) {
      restore();
      haptic('error');
      const msg = (e && e.message) || '儲存失敗';
      showToast(msg, 'error', { duration: 5000 });
      // Don't rethrow — error surfaced to user already
      return false;
    }
  };

  /* Undo framework — snapshot whole dataset, restore on demand */
  const _undo = { snapshot: null, dataset: null, timer: null };
  function deleteWithUndo(dataset, label, mutateFn) {
    const src = dataset === 'data'  ? state.data
              : dataset === 'notes' ? state.notes
              : dataset === 'tips'  ? state.tips
              : state.tb[dataset];
    const snap = JSON.parse(JSON.stringify(src));
    mutateFn();
    markDirty(dataset);
    clearTimeout(_undo.timer);
    _undo.snapshot = snap;
    _undo.dataset = dataset;
    _undo.timer = setTimeout(() => { _undo.snapshot = null; _undo.dataset = null; }, 5500);
    showToast(label, null, {
      duration: 5000,
      action: { label: 'UNDO', onClick: () => __undoDelete() },
    });
  }
  function __undoDelete() {
    if (!_undo.snapshot) return;
    const ds = _undo.dataset;
    if (ds === 'data')       { state.data = _undo.snapshot; localStorage.setItem(LS.DATA, JSON.stringify(state.data)); }
    else if (ds === 'notes') { state.notes = _undo.snapshot; localStorage.setItem(LS.NOTES, JSON.stringify(state.notes)); }
    else if (ds === 'tips')  { state.tips = _undo.snapshot; localStorage.setItem(LS.TIPS, JSON.stringify(state.tips)); }
    else if (ds && ds.startsWith('tb_')) { state.tb[ds] = _undo.snapshot; localStorage.setItem(LS.TB_PREFIX + ds, JSON.stringify(state.tb[ds])); }
    _undo.snapshot = null; _undo.dataset = null;
    showToast('Restored', 'success');
    router();

  function toTerms(query) {
    if (!query) return [];
    const arr = Array.isArray(query) ? query : String(query).trim().split(/\s+/);
    return arr.map(t => String(t).trim()).filter(Boolean);
  }

  function matchAllTerms(text, terms) {
    if (!terms || !terms.length) return false;
    const low = (text || '').toLowerCase();
    return terms.every(t => low.includes(String(t).toLowerCase()));
  }

  function highlightText(text, query) {
    if (!query) return esc(text);
    const terms = toTerms(query);
    if (!terms.length) return esc(text);
    let out = esc(text);
    for (const t of terms) {
      const escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp(escaped, 'gi'), m => '<mark class="highlight">' + m + '</mark>');
    }
    return out;
  }

  function isHJHSlide(s) {
    return typeof s.slide_num === 'string' && /^HJH/i.test(s.slide_num);
  }
  function hjhSlideLabels(slides) {
    return slides.filter(isHJHSlide).map(s => String(s.slide_num).replace(/^HJH-?/i, ''));
  }

  function previewAround(text, query, radius = 80) {
    if (!text || !query) return '';
    const terms = toTerms(query);
    if (!terms.length) return '';
    const low = text.toLowerCase();
    let bestIdx = -1, bestTerm = null;
    for (const t of terms) {
      const idx = low.indexOf(t.toLowerCase());
      if (idx >= 0 && (bestIdx === -1 || idx < bestIdx)) { bestIdx = idx; bestTerm = t; }
    }
    if (bestIdx < 0) return '';
    const from = Math.max(0, bestIdx - radius);
    const to = Math.min(text.length, bestIdx + bestTerm.length + radius);
    let snippet = text.slice(from, to);
    if (from > 0) snippet = '…' + snippet;
    if (to < text.length) snippet = snippet + '…';
    return highlightText(snippet, terms);
  }

  /* ======================================================
     Remote kill-switch — fetch app-status.json, lock out if active=false.
     Admin bypasses with ?admin-override=1 in URL.
  ====================================================== */
  async function checkAppStatus() {
    if (new URLSearchParams(location.search).has('admin-override')) return true;
    try {
      const resp = await fetch('app-status.json?t=' + Date.now(), { cache: 'no-store' });
      if (!resp.ok) return true;  // 404 / error → fail open
      const status = await resp.json();
      if (status.active === false) {
        showLockoutPage(status.message || 'Pocket URO 已暫停使用。');
        return false;
      }
      return true;
    } catch (e) {
      return true;  // offline / parse error → fail open (don't lock users out)
    }
  }

  ====================================================== */
  function currentCode() {
    return (localStorage.getItem(LS.ADMIN_USER) || 'VIEWER').toUpperCase();
  }
  function isAdminCode() {
    // Renamed semantic: "is admin authenticated"; kept name for caller compatibility
    return localStorage.getItem(LS.ADMIN_UNLOCKED) === 'yes';
  }
  function isAdmin() {
    // Admin code users can temporarily preview as viewer (LS.ADMIN === 'off'),
    // but viewer codes can never escalate. Only admin codes / GH token grant admin.
    if (isAdminCode() && localStorage.getItem(LS.ADMIN) === 'off') return false;
    if (isAdminCode()) return true;
    if (localStorage.getItem(LS.TOKEN)) return true;
    return false;
  }
  window.__toggleAdmin = function() {
    // Only admin-code users may toggle. Viewers' button is not rendered.
    if (!isAdminCode()) return;
    if (localStorage.getItem(LS.ADMIN) === 'off') {
      localStorage.removeItem(LS.ADMIN);
    } else {
      localStorage.setItem(LS.ADMIN, 'off');
    }
    router();

  window.__unlockAdmin = async function() {
    const uEl  = el('admin-user-input');
    const pwEl = el('admin-pw-input');
    const errEl = el('admin-signin-error');
    if (!uEl || !pwEl) return;
    const username = (uEl.value || '').trim();
    const password = pwEl.value || '';
    const showErr = (msg) => {
      if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
    };
    if (!username || !password) { showErr('請輸入帳號與密碼'); return; }
    try {
      const ok = await verifyAdminAuth(username, password);
      if (!ok) { showErr('帳號或密碼錯誤'); pwEl.value = ''; return; }
      localStorage.setItem(LS.ADMIN_UNLOCKED, 'yes');
      localStorage.setItem(LS.ADMIN_USER, username);
      localStorage.removeItem(LS.ADMIN); // clear preview-as-viewer flag
      showToast('Admin unlocked — welcome ' + username, 'success');
      router();
    } catch (e) {
      showErr('Sign-in failed: ' + (e && e.message || e));

    if (!await showConfirm('Sign out of admin? You can still use the app as a viewer.', { okLabel: 'Sign out', danger: true })) return;

      showToast('Removed from favorites');
    } else {
      state.favorites.unshift({ module, id, title, ts: Date.now() });
      showToast('Added to favorites', 'success');
    }
    saveFavs();
  }

  /* ======================================================
     Data loading
  ====================================================== */
  async function loadJSON(path) {
    const resp = await fetch(path + '?t=' + Date.now());
    if (!resp.ok) throw new Error('fetch ' + path + ' ' + resp.status);
    return resp.json();
  }

  function loadLocalOverride(key, server) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return { data: server, source: 'server' };
      const local = JSON.parse(raw);
      // Only use local if strictly newer (tracked via _updated_at)
      if (local && local._updated_at && server._updated_at && local._updated_at > server._updated_at) {
        return { data: local, source: 'local' };
      }
      if (local && local._updated_at && !server._updated_at) {
        return { data: local, source: 'local' };
      }
      // Otherwise trust server
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    } catch {
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    }
  }

  async function loadCore() {
    const [dataSrv, notesSrv, tipsSrv] = await Promise.all([
      loadJSON('data.json'),
      loadJSON('teaching-notes.json'),
      loadJSON('tips-guide.json'),
    ]);
    const dOv = loadLocalOverride(LS.DATA, dataSrv);
    state.data = dOv.data; state.sources.data = dOv.source;
    const nOv = loadLocalOverride(LS.NOTES, notesSrv);
    state.notes = nOv.data; state.sources.notes = nOv.source;
    const tOv = loadLocalOverride(LS.TIPS, tipsSrv);
    state.tips = tOv.data; state.sources.tips = tOv.source;
    normalizeData();
  }

  function normalizeData() {
    // Fix PPu Notes Roman numbering (source data has XII → XIV gap).
    // Display-only renumber; does NOT mark dirty (user didn't edit).
    if (state.notes && state.notes.sections) {
      const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
      state.notes.sections.forEach((s, i) => {
        const want = i < romans.length ? romans[i] : String(i + 1);
        s.number = want;
        s.full_title = want + '. ' + s.title;
      });
    }
  }

  async function loadChapter(tbId) {
    if (state.tb[tbId]) return state.tb[tbId];
    const server = await loadJSON('textbook-data/' + tbId + '.json');
    const key = LS.TB_PREFIX + tbId;
    const ov = loadLocalOverride(key, server);
    state.tb[tbId] = ov.data;
    state.sources.tb[tbId] = ov.source;
    return state.tb[tbId];
  }

  function markDirty(dataset) {
    // dataset: 'data' | 'notes' | 'tips' | 'tb_XX'
    // v3.7.1: uses safeSetItem which throws descriptive Error on quota.
    // Save handlers wrap markDirty in try/catch to roll back in-memory state
    // on failure (see __saveArticle et al.).
    const now = new Date().toISOString();
    if (dataset === 'data') {
      state.data._updated_at = now;
      state.sources.data = 'local';
      safeSetItem(LS.DATA, JSON.stringify(state.data));
    } else if (dataset === 'notes') {
      state.notes._updated_at = now;
      state.notes.updated = now.slice(0, 10);
      state.sources.notes = 'local';
      safeSetItem(LS.NOTES, JSON.stringify(state.notes));
    } else if (dataset === 'tips') {
      state.tips._updated_at = now;
      state.tips.updated = now.slice(0, 10);
      state.sources.tips = 'local';
      safeSetItem(LS.TIPS, JSON.stringify(state.tips));
    } else if (dataset.startsWith('tb_')) {
      const tb = state.tb[dataset];
      tb._updated_at = now;
      state.sources.tb[dataset] = 'local';
      safeSetItem(LS.TB_PREFIX + dataset, JSON.stringify(tb));
    }
  }

  function dirtyDatasets() {
    const arr = [];
    if (state.sources.data === 'local') arr.push({ id: 'data', label: 'Patient Education', path: 'data.json' });
    if (state.sources.notes === 'local') arr.push({ id: 'notes', label: 'PPu Notes', path: 'teaching-notes.json' });
    if (state.sources.tips === 'local') arr.push({ id: 'tips', label: 'Tips & Guide', path: 'tips-guide.json' });
    for (const tbId of Object.keys(state.sources.tb)) {
      if (state.sources.tb[tbId] === 'local') {
        arr.push({ id: tbId, label: 'Textbook ' + tbId, path: 'textbook-data/' + tbId + '.json' });
      }
    }
    return arr;
  }

  /* ======================================================
     GitHub sync
  ====================================================== */
  async function ensureToken() {
    let token = localStorage.getItem(LS.TOKEN);
    if (token) return token;
    const t = prompt(
      '首次同步：輸入 GitHub Personal Access Token。\n\n' +
      '建立路徑：github.com/settings/tokens\n' +
      'Scope: public_repo\n\n' +
      '僅儲存在此裝置的 localStorage。'
    );
    if (!t) return null;
    token = t.trim();
    localStorage.setItem(LS.TOKEN, token);
    return token;
  }

  async function ghPutFile(path, obj, message) {
    const token = await ensureToken();
    if (!token) throw new Error('No token');
    const headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
    };
    // Get existing SHA
    const getResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { headers }
    );
    if (getResp.status === 401) {
      localStorage.removeItem(LS.TOKEN);
      throw new Error('Invalid token');
    }
    let sha = null;
    if (getResp.ok) {
      const j = await getResp.json();
      sha = j.sha;
    } else if (getResp.status !== 404) {
      throw new Error('Get SHA failed: ' + getResp.status);
    }
    const payload = JSON.stringify(obj, null, 2);
    const content = btoa(unescape(encodeURIComponent(payload)));
    const putBody = { message, content };
    if (sha) putBody.sha = sha;
    const putResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { method: 'PUT', headers, body: JSON.stringify(putBody) }
    );
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({ message: 'unknown' }));
      throw new Error('Push failed: ' + (err.message || putResp.status));
    }
    return true;
  }

  async function syncAll() {
    const dirty = dirtyDatasets();
    if (!dirty.length) {
      showToast('Nothing to sync');
      return;
    }
    const today = new Date().toISOString().slice(0, 10);
    const succeeded = [];
    const failed = [];
    for (const d of dirty) {
      try {
        let payload;
        if (d.id === 'data')       payload = state.data;
        else if (d.id === 'notes') payload = state.notes;
        else if (d.id === 'tips')  payload = state.tips;
        else if (d.id.startsWith('tb_')) payload = state.tb[d.id];
        const clone = JSON.parse(JSON.stringify(payload));
        delete clone._updated_at;
        await ghPutFile(d.path, clone, 'Update ' + d.label + ' ' + today);
        // Clear local override for this one
        if (d.id === 'data')       { localStorage.removeItem(LS.DATA);    state.sources.data = 'server'; }
        else if (d.id === 'notes') { localStorage.removeItem(LS.NOTES);   state.sources.notes = 'server'; }
        else if (d.id === 'tips')  { localStorage.removeItem(LS.TIPS);    state.sources.tips = 'server'; }
        else if (d.id.startsWith('tb_')) { localStorage.removeItem(LS.TB_PREFIX + d.id); state.sources.tb[d.id] = 'server'; }
        delete payload._updated_at;
        succeeded.push(d.label);
      } catch (e) {
        failed.push({ label: d.label, error: e.message });
        // Continue trying remaining files instead of aborting
      }
    }
    if (failed.length === 0) {
      showToast('Synced ' + succeeded.length + ' file(s) ✓', 'success');
    } else if (succeeded.length === 0) {
      showToast('Sync failed: ' + failed[0].error, 'error', { duration: 5000 });
    } else {
      showToast('Partial: ' + succeeded.length + ' synced, ' + failed.length + ' failed', 'error', { duration: 5000 });
    }
    router();
  }

  function getMdTextarea() {
    return document.getElementById('te-md');
  }

  function mdWrapSelection(before, after) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const sel = ta.value.substring(start, end);
    const placeholder = sel || 'text';
    const newText = before + placeholder + after;
    ta.setRangeText(newText, start, end, 'select');
    if (sel) {
      ta.setSelectionRange(start + before.length, start + before.length + sel.length);
    } else {
      ta.setSelectionRange(start + before.length, start + before.length + placeholder.length);
    }
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function mdPrefixLine(prefix) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart;
    const val = ta.value;
    const lineStart = val.lastIndexOf('\n', start - 1) + 1;
    ta.setRangeText(prefix, lineStart, lineStart, 'end');
    ta.setSelectionRange(start + prefix.length, start + prefix.length);
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  function mdInsertAt(text) {
    const ta = getMdTextarea();
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.setRangeText(text, start, end, 'end');
    ta.focus();
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }

  window.__mdWrap = mdWrapSelection;
  window.__mdPrefix = mdPrefixLine;
  window.__mdInsert = mdInsertAt;
  window.__mdDoctorTag = function() {
    const name = prompt('Doctor initials (e.g. 小黃, HJH):');

  window.__mdTable = function() {
    mdInsertAt('\n\n| Header 1 | Header 2 |\n|----------|----------|\n| cell 1   | cell 2   |\n| cell 3   | cell 4   |\n\n');
  };
  window.__mdLink = function() {
    const url = prompt('Link URL:');
    if (!url) return;
    const text = prompt('Link text:', url) || url;

  // Image picker: resize on-device (max 1600px wide, JPEG 80%) then embed as
  // base64 data URL inside the markdown. Keeps storage in the JSON sync pipeline
  // (no separate binary upload step). Viewer can tap image → lightbox zoom.
  function resizeImageToDataUrl(file, maxWidth, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxWidth / img.width);
          const w = Math.max(1, Math.round(img.width * scale));
          const h = Math.max(1, Math.round(img.height * scale));
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';           // flatten transparency for JPEG
          ctx.fillRect(0, 0, w, h);
          ctx.drawImage(img, 0, 0, w, h);
          // Keep PNG if original has alpha; otherwise JPEG for size
          const mime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
          resolve(canvas.toDataURL(mime, quality));
        };
        img.onerror = () => reject(new Error('無法解碼圖片'));
        img.src = ev.target.result;
      };
      reader.onerror = () => reject(new Error('無法讀取檔案'));
      reader.readAsDataURL(file);
    });
  }
  // v3.7.0 architecture change: images stored in dedicated entity.images[]
  // array, NOT inline in markdown. Keeps editor text clean and avoids iOS
  // hang from huge base64 strings in textareas.

  // Extract legacy inline ![](data:...) images from markdown text so old
  // content gets migrated automatically on first edit.
  // v3.7.1: more robust regex + escape-aware + dedup by data URL
  function extractInlineImages(md) {
    if (!md) return { text: '', images: [] };
    const images = [];
    const seenData = new Set();
    // Match `![alt](data:...)` but skip when preceded by backslash (escaped
    // markdown). `[^)]*` is fine because base64 data URLs don't contain ')'.
    const text = String(md).replace(
      /(^|[^\\])!\[([^\]]*)\]\((data:[^)]+)\)/g,
      (match, prefix, alt, data) => {
        if (!seenData.has(data)) {
          seenData.add(data);
          images.push({ data, alt: alt || '', caption: '' });
        }
        return prefix; // keep the non-backslash prefix, remove the image markup
      }
    ).replace(/\n{3,}/g, '\n\n').trim();
    return { text, images };
  }

  // Dedup helper: merge an array from entity.images[] with freshly-migrated
  // images, skipping duplicates by data URL. Used in every edit screen render
  // to prevent double-add after legacy-migrate + re-save loops.
  function dedupImages(arr) {
    const seen = new Set();
    const out = [];
    for (const img of (arr || [])) {
      if (!img || !img.data) continue;
      if (seen.has(img.data)) continue;
      seen.add(img.data);
      out.push(img);
    }
    return out;
  }

  // Edit-session image buffer. Populated on edit screen open, consumed on save.
  let _editorImages = [];
  function setEditorImages(arr) {
    _editorImages = Array.isArray(arr) ? arr.map(x => ({ data: x.data || '', alt: x.alt || '', caption: x.caption || '' })) : [];
    renderEditorImageGallery();
  }
  function getEditorImages() {
    return _editorImages.filter(x => x && x.data).map(x => ({ data: x.data, alt: x.alt || '', caption: x.caption || '' }));
  }
  function editorImageGalleryHTML() {

        </div>

  function renderEditorImageGallery() {

  window.__rmEditorImg = async function(i) {

  // Render attachments below markdown text in VIEW mode
  function renderAttachments(images) {

    return '<div class="attachments">' + images.map(img => `

  window.__mdImage = function() {
    // v3.7.1: capture the editor buffer reference at click time. If user
    // navigates to a different edit screen before the picker resolves, the
    // captured buffer is no longer active — abort to prevent the image from
    // landing in the wrong entity.
    const capturedBuffer = _editorImages;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none';
    const cleanup = () => { if (input.parentNode) input.parentNode.removeChild(input); };
    input.addEventListener('change', async (ev) => {
      const file = ev.target.files && ev.target.files[0];
      cleanup();
      if (!file) return;
      if (capturedBuffer !== _editorImages) {
        showToast('編輯頁已切換，圖片未加入。請重開編輯頁再試。', 'error', { duration: 4000 });
        return;
      }
      try {
        showToast('處理圖片中…');
        const dataUrl = await resizeImageToDataUrl(file, 1600, 0.8);
        // Guard again after async resize (user may navigate during processing)
        if (capturedBuffer !== _editorImages) {
          showToast('編輯頁已切換，圖片未加入。', 'error', { duration: 4000 });
          return;
        }
        const kb = Math.round(dataUrl.length * 0.75 / 1024);
        const alt = (file.name || 'image').replace(/\.[^.]+$/, '').slice(0, 40);
        _editorImages.push({ data: dataUrl, alt, caption: '' });
        renderEditorImageGallery();
        markEditorDirty();
        showToast('圖片已加入（約 ' + kb + ' KB），文字區不受影響', 'success');
      } catch (err) {
        showToast('圖片插入失敗：' + (err.message || err), 'error');
      }
    });
    document.body.appendChild(input);
    input.click();
    setTimeout(cleanup, 60000);
  };

  // Keyboard shortcuts (mostly useful on desktop / iPad with keyboard)
  document.addEventListener('keydown', (e) => {
    if (!(e.metaKey || e.ctrlKey)) return;
    const ta = getMdTextarea();
    if (!ta || document.activeElement !== ta) return;
    const k = e.key.toLowerCase();
    if (k === 'b') { e.preventDefault(); mdWrapSelection('**', '**'); }
    else if (k === 'i') { e.preventDefault(); mdWrapSelection('*', '*'); }
    else if (k === 'k') { e.preventDefault(); window.__mdLink(); }

  /* ======================================================
     Markdown rendering (Tips & Guide + Textbook notes)
  ====================================================== */
  let markedConfigured = false;
  function configureMarked() {
    if (markedConfigured || typeof marked === 'undefined') return;
    marked.setOptions({
      gfm: true,
      breaks: false,
      tables: true,
    });
    markedConfigured = true;
  }
  // Cache last parse result. Helps when same content re-renders on back/forward
  // or after an image add doesn't change the markdown. Cache size 1 is enough
  // because view mode shows one doc at a time.
  let _renderMdCache = { md: null, html: null };
  function renderMd(md) {
    if (typeof marked === 'undefined') return '<pre>' + esc(md) + '</pre>';
    if (md === _renderMdCache.md) return _renderMdCache.html;
    configureMarked();
    const parsed = marked.parse(md || '');
    const html = parsed.replace(/\[([^\[\]\n]{1,12})\]/g, (m, txt) => {
      return '<span class="doctor-tag">' + esc(txt) + '</span>';
    });
    _renderMdCache = { md, html };
    return html;
  }

  // Render a plain-text title that may contain `[名字]` doctor tags (often
  // wrapped in backticks like `` `[小黃]` `` in source JSON). Returns safe HTML.
  function titleWithTags(title) {
    if (title == null) return '';
    const cleaned = String(title).replace(/`(\[[^\[\]\n]{1,12}\])`/g, '$1');
    return esc(cleaned).replace(/\[([^\[\]\n]{1,12})\]/g, (m, txt) =>
      '<span class="doctor-tag">' + esc(txt) + '</span>'
    );
  }
  // Plain-text version for textContent contexts (setHeader, alert/confirm, alt):
  // strips the backtick+bracket wrappers but keeps the name visible.
  function titlePlain(title) {
    if (title == null) return '';
    return String(title)
      .replace(/`(\[[^\[\]\n]{1,12}\])`/g, '$1')
      .replace(/\[([^\[\]\n]{1,12})\]/g, '$1');
  }

  /* ======================================================
     Router
  ====================================================== */
  function navigate(hash) {
    if (location.hash === hash) router();
    else location.hash = hash;
  }
  function parseHash() {
    const raw = (location.hash || '#/').replace(/^#\/?/, '');
    const [pathPart, queryPart] = raw.split('?');
    const parts = pathPart.split('/').filter(Boolean);
    const query = {};
    if (queryPart) {
      for (const kv of queryPart.split('&')) {
        const [k, v] = kv.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v || '');
      }
    }
    return { parts, query };
  }

  function router() {
    const { parts, query } = parseHash();
    const module = parts[0];

    try {
      if (!module) return renderHome();
      if (module === 'favorites') return renderFavorites();
      if (module === 'search') return renderSearch(query.q || '', query.only || '');
      if (module === 'sync') return renderSyncPanel();
      if (module === 'hjh') return renderHJHBrowse();
      if (module === 'education') return routeEducation(parts.slice(1), query);
      if (module === 'notes') return routeNotes(parts.slice(1));
      if (module === 'tips') return routeTips(parts.slice(1), query);
      if (module === 'textbook') return routeTextbook(parts.slice(1), query);
      renderNotFound();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Error</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
    }
  }

  window.addEventListener('hashchange', router);

    const icon = el('more-theme-icon');

    const now = currentTheme();
    if (icon) icon.textContent = now === 'dark' ? '☀️' : now === 'auto' ? '🤖' : '🌙';
    if (lbl)  lbl.textContent  = 'Theme: ' + now;

  function updateMoreCounts() {
    const favC = el('more-fav-count');
    if (favC) favC.textContent = state.favorites.length ? '(' + state.favorites.length + ')' : '';
    const syncB = el('more-sync-badge');
    const n = dirtyDatasets().length;
    if (syncB) {
      if (n > 0) { syncB.style.display = ''; syncB.textContent = n + ' unsynced'; }
      else       { syncB.style.display = 'none'; }
    }
    // Also reflect unsynced count as a red dot on the header More button
    const moreBtn = el('btn-more');
    if (moreBtn) {
      const existing = moreBtn.querySelector('.dot-badge');
      if (n > 0) {
        if (existing) existing.textContent = n;
        else moreBtn.insertAdjacentHTML('beforeend', '<span class="dot-badge">' + n + '</span>');
      } else if (existing) {
        existing.remove();
      }
    }
  }

  /* setHeader(title, parent?) — parent = { label, href } or null for root pages */
  function setHeader(title, parent) {
    el('app-title').textContent = title || 'Pocket URO';
    const pl = el('btn-parent');
    if (parent && parent.label) {
      pl.classList.remove('hidden');
      pl.querySelector('.label').textContent = parent.label;
      pl.setAttribute('href', parent.href || '#/');
    } else {
      pl.classList.add('hidden');
      pl.setAttribute('href', '#/');
    }
    updateMoreCounts();

  function updateSyncBadge() { updateMoreCounts(); }

  /* Lightbox / slide zoom */
  // Close on hashchange so navigating away dismisses the lightbox cleanly
  window.addEventListener('hashchange', () => {
    const lb = document.getElementById('lightbox');
    if (lb && !lb.classList.contains('hidden')) closeLightbox();
  });

  // Markdown images (data URLs or remote) → open in existing lightbox on tap
  document.addEventListener('click', (e) => {
    const img = e.target.closest('.markdown-body img');
    if (!img) return;
    e.preventDefault();
    window.__openLightbox(img.src, img.alt || '');
  });

  window.__openLightbox = function(src, caption) {
    const lb = el('lightbox');
    const img = el('lb-img');
    const cap = el('lb-caption');
    img.src = src;
    img.classList.remove('zoomed');
    if (caption) { cap.textContent = caption; cap.classList.remove('hidden'); }
    else { cap.classList.add('hidden'); }
    lb.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };
  function closeLightbox() {
    el('lightbox').classList.add('hidden');
    el('lb-img').src = '';
    document.body.style.overflow = '';
  }
  el('lb-close').addEventListener('click', closeLightbox);
  el('lightbox').addEventListener('click', (e) => {
    // Close when tapping backdrop (not the image or close button)
    if (e.target.id === 'lightbox' || e.target.id === 'lb-wrap') closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !el('lightbox').classList.contains('hidden')) closeLightbox();
  });
  // Double-tap to toggle 2× on the image itself
  (function installDoubleTap() {
    const img = el('lb-img');
    let lastTap = 0;
    img.addEventListener('click', (e) => {
      const now = Date.now();
      if (now - lastTap < 320) {
        img.classList.toggle('zoomed');
        e.stopPropagation();
      }
      lastTap = now;
    });
  })();

  /* Edge-swipe-back gesture (PWA standalone mode has no Safari swipe) */
  (function installEdgeSwipe() {
    let x0 = null, y0 = null;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (t.clientX < 30) { x0 = t.clientX; y0 = t.clientY; }
      else { x0 = null; }
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (x0 === null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - x0;
      const dy = Math.abs(t.clientY - y0);
      if (dx > 80 && dy < 60) {
        // Prefer parent-link (iOS navigation stack semantics); fall back to history.back
        const pl = el('btn-parent');
        if (pl && !pl.classList.contains('hidden')) {
          if (!confirmLeave()) { x0 = null; return; }
          clearEditorDirty();
          const href = pl.getAttribute('href') || '#/';
          location.hash = href;
        } else if (location.hash && location.hash !== '#/' && location.hash !== '#') {
          if (history.length > 1) history.back();
          else navigate('#/');
        }
      }
      x0 = null;
    }, { passive: true });
  })();

  function routeEducation(parts, query) {

    query = query || {};
    if (!parts.length) return renderEducationCategories(accent);
    if (parts[0] === 'c' && parts[1]) return renderEducationArticles(parts[1], accent);
    if (parts[0] === 'a' && parts[1] && parts[2] === 'edit') return renderArticleEdit(parts[1], false, accent);
    if (parts[0] === 'a' && parts[1]) return renderArticle(parts[1], accent, query.q || '');

  window.__saveArticle = function(artId, isNew) {
    const title = el('ed-title').value.trim();
    const categoryId = el('ed-category').value;
    const text = el('te-md').value;
    const images = getEditorImages();
    const keywords = el('ed-keywords').value.split(',').map(s => s.trim()).filter(Boolean);
    const pdf_url = el('ed-source').value.trim();
    if (!title) { showToast('Title required', 'error'); return false; }
    // Snapshot pre-mutation state for rollback on quota failure
    const snapshot = JSON.parse(JSON.stringify(state.data));
    try {
      if (isNew) {
        const newArt = { id: artId, title, category: categoryId, text, images, keywords, related: [], pdf_url, pages: null, filename: '' };
        state.data.articles.push(newArt);
        const cat = state.data.categories.find(c => c.id === categoryId);
        if (cat) { cat.articles.push(artId); cat.count = cat.articles.length; }
        state.data.total_articles = state.data.articles.length;
      } else {
        const a = state.data.articles.find(x => x.id === artId);
        if (!a) { showToast('Article not found', 'error'); return false; }
        if (a.category !== categoryId) {
          const oldCat = state.data.categories.find(c => c.id === a.category);
          const newCat = state.data.categories.find(c => c.id === categoryId);
          if (oldCat) { oldCat.articles = oldCat.articles.filter(id => id !== artId); oldCat.count = oldCat.articles.length; }
          if (newCat) { newCat.articles.push(artId); newCat.count = newCat.articles.length; }
        }
        a.title = title; a.category = categoryId; a.text = text; a.images = images;
        a.keywords = keywords; a.pdf_url = pdf_url;
      }
      markDirty('data');
    } catch (e) {
      state.data = snapshot;
      throw e; // saveFb catches, shows toast, restores button
    }
    clearEditorDirty();
    showToast('Saved locally ✓', 'success');
    navigate('#/education/a/' + artId);
    return true;
  };

  window.__moveNote = function(idx, dir) {
    const arr = state.notes.sections;
    if (idx + dir < 0 || idx + dir >= arr.length) return;
    [arr[idx], arr[idx + dir]] = [arr[idx + dir], arr[idx]];
    renumberNotes();
    markDirty('notes');
    router();
  };
  window.__deleteNote = async function(idx) {
    if (state.notes.sections.length <= 1) { showToast('Cannot delete last section', 'error'); return; }
    const s = state.notes.sections[idx];
    if (!await showConfirm('Delete section "' + s.number + '. ' + s.title + '"?', { danger: true, okLabel: 'Delete' })) return;
    deleteWithUndo('notes', 'Deleted: ' + s.full_title, () => {
      state.notes.sections.splice(idx, 1);
      renumberNotes();
    });
    router();
  };

  function renumberNotes() {
    const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
    state.notes.sections.forEach((s, i) => {
      s.number = i < romans.length ? romans[i] : String(i + 1);
      s.full_title = s.number + '. ' + s.title;
      if (s.subsections) {
        s.subsections.forEach((sub, j) => {
          if (sub.title) {
            sub.title = sub.title.replace(/^\d+\.\s*/, '');
            sub.title = (j + 1) + '. ' + sub.title;
          }
        });
      }
    });
    state.notes.total_sections = state.notes.sections.length;
  }

  function renderNoteDetail(sid, accent) {
    const s = state.notes.sections.find(x => x.id === sid);
    if (!s) return renderNotFound();
    setHeader(s.full_title, { label: 'PPu Notes', href: '#/notes' });
    const fav = isFav('notes', sid);
    let body = '';
    for (const sub of s.subsections) {
      body += '<div style="margin-bottom:16px">';
      if (sub.title) body += '<h4 style="font-size:15px;font-weight:700;color:var(--c-ppu-notes);margin-bottom:6px">' + esc(sub.title) + '</h4>';
      if (sub.items && sub.items.length) {
        body += '<ul style="margin-left:20px">';
        for (const it of sub.items) body += '<li style="margin:4px 0">' + esc(it) + '</li>';
        body += '</ul>';
      }
      body += '</div>';
    }
    const idx = state.notes.sections.indexOf(s);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
          <h2 style="flex:1;font-size:21px;line-height:1.3">${esc(s.full_title)}</h2>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="notes" data-fav-id="${esc(sid)}" data-fav-title="${escAttr(s.full_title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        <div class="article-body" style="white-space:normal">${body}</div>
        ${s.notes ? `
          <div class="markdown-body" style="margin-top:18px;padding:14px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius)">
            ${renderMd(s.notes)}
          </div>
        ` : ''}
        ${renderAttachments(s.images)}
        ${isAdmin() ? `
          <div class="action-bar">
            <button class="btn btn-primary" onclick="location.hash='#/notes/edit/${esc(sid)}'">Edit section</button>
          </div>

  function renderNoteEdit(sid, isNew, accent, insertAfterIdx) {
    let section;
    if (isNew) {
      section = {
        id: 'tn_' + Date.now(),
        number: '',
        title: '',
        full_title: '',
        subsections: [{ title: '', items: [''] }],
        notes: '',
        images: [],
        _insertAfter: (insertAfterIdx !== undefined ? insertAfterIdx : -1),
      };
    } else {
      const orig = state.notes.sections.find(x => x.id === sid);
      if (!orig) return renderNotFound();
      section = JSON.parse(JSON.stringify(orig));

    const migrated = extractInlineImages(section.notes || '');
    const cleanNotes = migrated.text;
    const allImgs = dedupImages((section.images || []).concat(migrated.images));
    setHeader(isNew ? 'New section' : 'Edit', { label: isNew ? 'PPu Notes' : (section.full_title || 'Section'), href: isNew ? '#/notes' : ('#/notes/s/' + section.id) });

      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>

        <div class="edit-field">
          <label>Section title</label>
          <input type="text" id="ne-title" value="${escAttr(section.title)}" placeholder="e.g. LUTS、排尿機轉" oninput="markEditorDirty()">

  function renderNoteSubsBlocks(subs) {
    const host = el('ne-subs');
    host.innerHTML = subs.map((sub, i) => noteSubBlockHTML(sub, i)).join('')
      + `<button class="insert-btn" onclick="window.__addNoteSub()">＋ add subsection</button>`;
  }

  function noteSubBlockHTML(sub, i) {
    const items = sub.items || [];
    const itemsHTML = items.map((it, j) => noteItemRowHTML(i, j, it)).join('');
    return `
      <div class="subsection-block" data-sub-idx="${i}">
        <span class="sub-idx">Sub ${i + 1}</span>
        <button class="sub-delete" onclick="window.__delNoteSub(${i})">✕</button>
        <div class="edit-field" style="margin-bottom:8px">
          <label>Title</label>
          <input type="text" class="ne-sub-title" value="${escAttr(sub.title || '')}" placeholder="1. 某子章節" oninput="markEditorDirty()">
        </div>
        <div class="edit-field" style="margin-bottom:0">
          <label>Items (${items.length})</label>
          <div class="ne-items" data-sub-idx="${i}">
            ${itemsHTML}
          </div>
          <button class="insert-btn" style="margin-top:4px" onclick="window.__addNoteItem(${i})">＋ add item</button>
        </div>
      </div>
      <button class="insert-btn" onclick="window.__insertNoteSubAfter(${i})">＋ insert after</button>
    `;
  }

  function noteItemRowHTML(subIdx, itemIdx, itemText) {
    return `
      <div class="note-item-row" data-item-idx="${itemIdx}">
        <input type="text" class="ne-item-input" value="${escAttr(itemText)}" placeholder="item ${itemIdx + 1}" oninput="markEditorDirty()">
        <button class="item-del" onclick="window.__delNoteItem(${subIdx}, ${itemIdx})">✕</button>
      </div>
    `;
  }

  function collectNoteSubs() {
    const blocks = document.querySelectorAll('#ne-subs .subsection-block');
    const subs = [];
    blocks.forEach(b => {
      const title = b.querySelector('.ne-sub-title').value.trim();
      const items = [];
      b.querySelectorAll('.note-item-row .ne-item-input').forEach(inp => {
        const v = inp.value.trim();
        if (v) items.push(v);
      });
      subs.push({ title, items });
    });
    return subs;
  }

  window.__addNoteItem = function(subIdx) {
    const subs = collectNoteSubs();
    subs[subIdx].items.push('');
    renderNoteSubsBlocks(subs);
    // Focus the new input
    setTimeout(() => {
      const rows = document.querySelectorAll(`#ne-subs .subsection-block[data-sub-idx="${subIdx}"] .ne-item-input`);
      if (rows.length) rows[rows.length - 1].focus();
    }, 0);
  };
  window.__delNoteItem = function(subIdx, itemIdx) {
    const subs = collectNoteSubs();
    subs[subIdx].items.splice(itemIdx, 1);
    renderNoteSubsBlocks(subs);
  };

  window.__addNoteSub = function() {
    const subs = collectNoteSubs();
    subs.push({ title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };
  window.__delNoteSub = async function(i) {
    const subs = collectNoteSubs();
    if (subs.length <= 1) { showToast('Cannot delete last subsection', 'error'); return; }
    if (!await showConfirm('Delete subsection ' + (i + 1) + '?', { danger: true, okLabel: 'Delete' })) return;
    subs.splice(i, 1);
    renderNoteSubsBlocks(subs);
  };
  window.__insertNoteSubAfter = function(i) {
    const subs = collectNoteSubs();
    subs.splice(i + 1, 0, { title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };

  window.__saveNote = function(sid, isNew, insertAfter) {
    const title = el('ne-title').value.trim();
    const subs = collectNoteSubs();
    const notes = (el('te-md') && el('te-md').value) || '';
    const images = getEditorImages();
    if (!title) { showToast('Title required', 'error'); return false; }
    const snapshot = JSON.parse(JSON.stringify(state.notes));
    try {
      if (isNew) {
        const newSection = {
          id: sid, number: '', title, full_title: title, subsections: subs, notes, images,
        };
        if (insertAfter !== null && insertAfter !== undefined && insertAfter >= 0 && insertAfter < state.notes.sections.length) {
          state.notes.sections.splice(insertAfter + 1, 0, newSection);
        } else {
          state.notes.sections.push(newSection);
        }
      } else {
        const s = state.notes.sections.find(x => x.id === sid);
        if (!s) { showToast('Section not found', 'error'); return false; }
        s.title = title;
        s.subsections = subs;
        s.notes = notes;
        s.images = images;
      }
      renumberNotes();
      markDirty('notes');
    } catch (e) {
      state.notes = snapshot;
      throw e;
    }
    clearEditorDirty();
    showToast('Saved locally ✓', 'success');
    navigate(isNew ? '#/notes' : '#/notes/s/' + sid);
    return true;
  };

  /* ======================================================
     Tips & Guide
  ====================================================== */
  function routeTips(parts, query) {
    const accent = '#e67e22';
    query = query || {};
    if (!parts.length) return renderTipsList(accent);
    if (parts[0] === 's' && parts[1]) return renderTipsChapter(parts[1], accent);
    if (parts[0] === 'sub' && parts[1] && parts[2]) return renderTipsSub(parts[1], parts[2], accent);
    if (parts[0] === 'edit' && parts[1] && parts[2]) return renderTipsEdit(parts[1], parts[2], false, accent);
    if (parts[0] === 'new' && parts[1]) {
      const after = query.after !== undefined ? parseInt(query.after) : -1;
      return renderTipsEdit(parts[1], null, true, accent, after);
    }
    renderNotFound();
  }

  function renderTipsList(accent) {
    setHeader('Tips & Guide', { label: 'Home', href: '#/' });
    const dirty = state.sources.tips === 'local';
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        ${dirty ? '<div style="color:var(--c-warning);font-size:12px;margin-bottom:8px">⚠ Local changes (unsynced)</div>' : ''}
        <div class="list-section">
          ${state.tips.sections.map(s => `
            <a class="list-card" href="#/tips/s/${esc(s.id)}">
              <div style="width:36px;font-weight:700;color:${accent};font-size:15px">${esc(s.number)}</div>
              <div style="flex:1;min-width:0">
                <div class="title">${titleWithTags(s.title)}</div>
                <div class="meta">${(s.subsections || []).length} subsections</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

    if (!chapter) return renderNotFound();
    setHeader(titlePlain(chapter.full_title), { label: 'Tips & Guide', href: '#/tips' });
    const admin = isAdmin();

    viewEl().innerHTML = `

          ${subs.map((sub, i) => `

              </div>
              <button class="fav-btn ${isFav('tips', sub.id) ? 'active' : ''}" data-fav-module="tips" data-fav-id="${esc(sub.id)}" data-fav-title="${escAttr(titlePlain(sub.title))}">${isFav('tips', sub.id) ? '⭐' : '☆'}</button>
              <span class="chevron">›</span>

        ${admin ? `

          </div>
        ` : ''}

    bindFavButtons();

  function renderTipsSub(chapterId, subId, accent) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    const sub = chapter && chapter.subsections.find(x => x.id === subId);
    if (!chapter || !sub) return renderNotFound();
    setHeader(titlePlain(sub.title), { label: titlePlain(chapter.title), href: '#/tips/s/' + chapterId });
    const admin = isAdmin();
    const fav = isFav('tips', subId);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
          <h2 style="flex:1;font-size:20px;line-height:1.3">${titleWithTags(sub.title)}</h2>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="tips" data-fav-id="${esc(subId)}" data-fav-title="${escAttr(titlePlain(sub.title))}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>

        ${admin ? `

          </div>
