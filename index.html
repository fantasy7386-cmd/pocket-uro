<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pocket URO</title>

  <link rel="manifest" href="manifest.json?v=3">
  <link rel="icon" href="icon-192.png?v=3">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=3">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Pocket URO">
  <meta name="theme-color" content="#1a1a2e">

  <style>
    /* ============ Design tokens ============ */
    :root {
      --c-patient-ed: #2980b9;
      --c-ppu-notes: #27ae60;
      --c-tips: #e67e22;
      --c-textbook: #8e44ad;

      --c-bg: #f5f5f7;
      --c-surface: #ffffff;
      --c-surface-alt: #fafafa;
      --c-text: #2c3e50;
      --c-text-muted: #7f8c8d;
      --c-border: #e5e5ea;
      --c-header: #1a1a2e;
      --c-danger: #e74c3c;
      --c-success: #27ae60;
      --c-warning: #f39c12;
      --c-info: #3498db;
      --c-accent: var(--c-info);

      --radius: 12px;
      --radius-sm: 8px;
      --tap-target: 44px;
      --max-width: 820px;
      --header-height: 56px;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 2px 6px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei",
                   sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      font-size: 16px;
    }
    body {
      min-height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    button { font: inherit; cursor: pointer; color: inherit; background: none; border: none; }
    input, textarea, select { font: inherit; color: inherit; }
    a { color: var(--c-info); text-decoration: none; }
    ::selection { background: var(--c-accent); color: #fff; }

    /* ============ Access gate ============ */
    .gate {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--c-header); color: #fff;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 20px;
    }
    .gate.hidden { display: none; }
    .gate h1 { font-size: 32px; margin-bottom: 6px; font-weight: 700; }
    .gate p { color: #9aa0b4; margin-bottom: 28px; font-size: 14px; }
    .gate input {
      font-size: 18px; padding: 14px 16px; border: none; border-radius: var(--radius);
      width: 100%; max-width: 280px; margin-bottom: 12px;
      text-align: center; letter-spacing: 2px;
      color: #2c3e50; background: #fff; caret-color: #2c3e50;
    }
    .gate input::placeholder { color: #9aa0b4; }
    .gate button {
      font-size: 16px; padding: 14px 36px; border: none; border-radius: var(--radius);
      background: var(--c-danger); color: #fff; min-width: 160px; font-weight: 600;
    }
    .gate .error { color: #ff8a80; font-size: 14px; margin-top: 16px; min-height: 20px; }

    /* ============ App shell ============ */
    #app[hidden] { display: none; }

    .app-header {
      position: sticky; top: 0; z-index: 100;
      height: var(--header-height);
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center;
      padding: 0 12px;
      gap: 8px;
    }
    .app-header h1 {
      font-size: 17px; font-weight: 600; flex: 1; text-align: center;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .app-header .icon-btn {
      width: var(--tap-target); height: var(--tap-target);
      border-radius: 50%; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-header .icon-btn:active { background: rgba(0,0,0,.06); }

    #view {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 80px;
    }

    /* ============ Module view header ============ */
    .module-view[data-accent] {
      --accent: var(--module-accent);
    }
    .module-header-strip {
      height: 4px; width: 100%;
      background: var(--accent, var(--c-border));
      margin-bottom: 16px; border-radius: 2px;
    }

    /* ============ Home ============ */
    .brand {
      display: flex; align-items: baseline; gap: 10px;
      padding: 6px 0 14px;
    }
    .brand-name { font-size: 26px; font-weight: 700; }
    .brand-tag { font-size: 12px; color: var(--c-text-muted); }

    .search-bar {
      width: 100%; padding: 12px 16px; border: 1px solid var(--c-border);
      border-radius: var(--radius); font-size: 16px;
      background: var(--c-surface); margin-bottom: 16px;
      -webkit-appearance: none; appearance: none;
    }

    .home-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    }
    @media (min-width: 768px) { .home-grid { gap: 16px; } }

    .module-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 16px;
      border-left: 6px solid var(--accent, #333);
      border-top: 1px solid var(--c-border);
      border-right: 1px solid var(--c-border);
      border-bottom: 1px solid var(--c-border);
      min-height: 120px;
      display: flex; flex-direction: column; justify-content: space-between;
      text-align: left;
      transition: transform .08s ease;
      cursor: pointer;
      color: inherit;
      text-decoration: none;
    }
    .module-card:active { transform: scale(.97); }
    .module-card .icon { font-size: 24px; }
    .module-card .name { font-size: 15px; font-weight: 600; margin-top: 10px; }
    .module-card .count { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }

    .home-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 20px; padding: 8px 0;
      font-size: 13px;
    }
    .home-actions a { color: var(--c-text-muted); text-decoration: underline; }
    .home-actions .admin-tag {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--c-header); color: #fff;
    }

    /* ============ Generic list items ============ */
    .list-section {
      margin-top: 8px;
    }
    .list-card {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid var(--c-border);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
      color: inherit; text-decoration: none;
      min-height: var(--tap-target);
    }
    .list-card:active { background: var(--c-surface-alt); }
    .list-card .title {
      font-size: 15px; font-weight: 500; flex: 1;
      overflow: hidden;
    }
    .list-card .meta {
      font-size: 12px; color: var(--c-text-muted);
      margin-top: 2px;
    }
    .list-card .chevron { color: var(--c-text-muted); font-size: 18px; }
    .list-card .badge {
      background: var(--accent, var(--c-border));
      color: #fff; font-size: 11px; padding: 2px 8px;
      border-radius: 10px; font-weight: 600;
      white-space: nowrap;
    }
    .list-card .fav-btn {
      font-size: 18px; opacity: .35; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .list-card .fav-btn.active { opacity: 1; }

    /* ============ Empty state / placeholder ============ */
    .placeholder {
      padding: 40px 20px;
      text-align: center;
      color: var(--c-text-muted);
      background: var(--c-surface);
      border-radius: var(--radius);
      border: 1px solid var(--c-border);
    }
    .placeholder .big { font-size: 40px; margin-bottom: 12px; }
    .placeholder strong { color: var(--c-text); display: block; margin-bottom: 6px; font-size: 17px; }
    .placeholder small { font-size: 13px; }

    /* ============ Article view ============ */
    .article-body {
      background: var(--c-surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--c-border);
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.75;
      word-break: break-word;
    }
    .article-meta-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 12px; color: var(--c-text-muted);
      margin-bottom: 12px;
    }
    .article-meta-row span {
      padding: 2px 8px; background: var(--c-surface); border-radius: 10px;
      border: 1px solid var(--c-border);
    }
    .article-keywords {
      margin-top: 16px;
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .kw-tag {
      font-size: 12px; padding: 4px 10px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: 10px; color: var(--c-text-muted);
    }
    .article-source {
      margin-top: 16px; padding: 10px 14px;
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius);
      font-size: 12px; color: var(--c-text-muted);
    }
    .article-source a { word-break: break-all; }

    /* ============ Notes / Tips editors ============ */
    .edit-field { margin-bottom: 16px; }
    .edit-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--c-text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .edit-field input[type="text"],
    .edit-field input[type="url"],
    .edit-field select,
    .edit-field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 15px;
    }
    .edit-field textarea {
      min-height: 160px; resize: vertical;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
    }
    .edit-field textarea.plain {
      font-family: inherit; font-size: 15px;
    }
    .subsection-block {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
      position: relative;
    }
    .subsection-block .sub-idx {
      position: absolute; top: -10px; left: 12px;
      background: var(--c-header); color: #fff;
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
    }
    .subsection-block .sub-delete {
      position: absolute; top: 8px; right: 8px;
      color: var(--c-danger); font-size: 16px; padding: 4px 8px;
    }
    .insert-btn {
      display: block; width: 100%; padding: 4px 0;
      color: var(--c-success); font-size: 14px;
      border: 1px dashed transparent;
      border-radius: var(--radius-sm);
      margin: 4px 0;
      opacity: .5;
    }
    .insert-btn:hover { opacity: 1; border-color: var(--c-border); }

    /* ============ Tips Markdown renderer ============ */
    .markdown-body { font-size: 15px; line-height: 1.75; }
    .markdown-body h1 { font-size: 22px; margin: 16px 0 8px; font-weight: 700; }
    .markdown-body h2 { font-size: 19px; margin: 14px 0 6px; font-weight: 700; }
    .markdown-body h3 { font-size: 16px; margin: 12px 0 4px; font-weight: 700; }
    .markdown-body h4 {
      font-size: 14px; margin: 12px 0 4px; font-weight: 700;
      color: var(--c-tips); text-transform: uppercase; letter-spacing: .5px;
    }
    .markdown-body p { margin: 8px 0; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0 8px 22px; }
    .markdown-body li { margin: 4px 0; }
    .markdown-body code {
      background: rgba(230,126,34,.12);
      color: #b06418;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 90%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }
    .markdown-body pre {
      background: var(--c-header); color: #e8e8e8;
      padding: 12px; border-radius: var(--radius-sm);
      overflow-x: auto; margin: 10px 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 13px;
    }
    .markdown-body pre code { background: none; color: inherit; padding: 0; }
    .markdown-body blockquote {
      border-left: 3px solid var(--c-tips);
      padding: 2px 12px;
      color: var(--c-text-muted);
      margin: 10px 0;
    }
    .markdown-body table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
      font-size: 14px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--c-border);
      padding: 6px 10px;
      text-align: left;
    }
    .markdown-body th { background: var(--c-surface-alt); font-weight: 600; }
    .markdown-body hr {
      border: none; border-top: 1px solid var(--c-border); margin: 16px 0;
    }
    .markdown-body strong { font-weight: 700; }
    .markdown-body em { font-style: italic; }
    .doctor-tag {
      display: inline-block;
      font-size: 11px; padding: 1px 6px;
      background: var(--c-tips); color: #fff;
      border-radius: 8px; font-weight: 600;
      margin: 0 2px; vertical-align: middle;
    }

    /* Markdown editor: split pane */
    .md-editor {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 768px) {
      .md-editor {
        grid-template-columns: 1fr 1fr;
      }
    }
    .md-editor textarea {
      width: 100%;
      min-height: 280px;
      padding: 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 14px; line-height: 1.6;
      resize: vertical;
    }
    .md-preview {
      padding: 12px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      min-height: 280px;
      overflow-y: auto;
    }
    .md-tabs {
      display: flex; gap: 4px; margin-bottom: 8px;
    }
    .md-tabs button {
      flex: 1; padding: 8px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      background: var(--c-surface);
      font-size: 13px;
    }
    .md-tabs button.active {
      background: var(--c-tips); color: #fff; border-color: var(--c-tips);
    }
    @media (min-width: 768px) {
      .md-tabs { display: none; }
      .md-editor .md-pane { display: block !important; }
    }
    @media (max-width: 767px) {
      .md-editor .md-pane.hidden { display: none; }
    }

    /* ============ Textbook slide viewer ============ */
    .slide-viewer {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .slide-frame {
      position: relative;
      background: #000;
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      min-height: 200px;
    }
    .slide-frame img {
      display: block;
      max-width: 100%;
      height: auto;
    }
    .slide-controls {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-top: 8px;
    }
    .slide-controls button {
      padding: 10px 14px;
      background: var(--c-textbook); color: #fff;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
    }
    .slide-controls button[disabled] { opacity: .4; }
    .slide-counter {
      font-size: 13px; color: var(--c-text-muted);
      min-width: 60px; text-align: center;
    }
    .slide-ocr {
      margin-top: 12px; padding: 10px 12px;
      background: var(--c-surface-alt);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      font-size: 14px; line-height: 1.6;
    }
    .slide-ocr ul { margin-left: 18px; }
    .slide-ocr .ocr-label {
      font-size: 11px; font-weight: 600;
      color: var(--c-text-muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .topic-notes {
      margin-bottom: 12px; padding: 12px 14px;
      background: #fffaed;
      border: 1px solid #f0d986;
      border-radius: var(--radius-sm);
      font-size: 14px;
    }
    .topic-notes .notes-label {
      font-size: 11px; font-weight: 700;
      color: var(--c-warning);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .topic-header {
      display: flex; align-items: center;
      gap: 10px; margin-bottom: 12px;
    }
    .topic-header .title { flex: 1; font-size: 17px; font-weight: 600; }
    .topic-header .badges { display: flex; gap: 4px; }
    .topic-badge {
      font-size: 11px; padding: 2px 7px;
      border-radius: 10px; font-weight: 600;
    }
    .topic-badge.exam { background: #fff3cd; color: #b87800; }
    .topic-badge.text-only { background: #e8d8f0; color: #5e2670; }
    .topic-badge.hjh {
      background: linear-gradient(135deg, #fff5cc, #ffe680);
      color: #8b5a00; font-weight: 700;
      border: 1px solid #f0d986;
    }
    .list-card.hjh { border-left: 4px solid #f1c40f; background: linear-gradient(90deg, #fffbe6 0%, var(--c-surface) 50%); }
    .sync-badge {
      position: absolute; top: 6px; right: 4px;
      background: var(--c-danger); color: #fff;
      font-size: 10px; font-weight: 700;
      min-width: 16px; height: 16px;
      border-radius: 8px; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ============ Buttons ============ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600;
      min-height: var(--tap-target);
      border: 1px solid transparent;
      transition: transform .08s ease, background .15s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--c-info); color: #fff; }
    .btn-secondary { background: var(--c-surface); color: var(--c-text); border-color: var(--c-border); }
    .btn-success { background: var(--c-success); color: #fff; }
    .btn-danger { background: var(--c-danger); color: #fff; }
    .btn-ghost { background: transparent; color: var(--c-text-muted); }
    .btn-block { display: flex; width: 100%; }

    .action-bar {
      display: flex; gap: 8px; margin: 16px 0;
      flex-wrap: wrap;
    }
    .action-bar .btn { flex: 1; min-width: 100px; }
    .action-bar-sticky {
      position: sticky; bottom: 0;
      background: var(--c-bg);
      padding: 12px 0;
      margin-top: 20px;
      border-top: 1px solid var(--c-border);
    }

    /* ============ Back button ============ */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 0;
      color: var(--c-info);
      font-size: 15px;
      margin-bottom: 4px;
    }

    /* ============ Toast ============ */
    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--c-header); color: #fff;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 14px; z-index: 500;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      max-width: 90%;
    }
    .toast.hidden { display: none; }
    .toast.success { background: var(--c-success); }
    .toast.error { background: var(--c-danger); }

    /* ============ Favorites / Search ============ */
    .result-group-header {
      font-size: 12px; font-weight: 700;
      color: var(--c-text-muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin: 16px 0 6px; padding: 0 4px;
    }
    .result-module-badge {
      display: inline-block;
      font-size: 10px; padding: 1px 6px;
      border-radius: 8px; color: #fff;
      margin-right: 4px; font-weight: 600;
      vertical-align: middle;
    }
    mark.highlight {
      background: #ffe680; color: inherit; padding: 0 2px; border-radius: 3px;
    }

    /* ============ Sync panel ============ */
    .sync-panel {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .sync-panel h3 {
      font-size: 14px; font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .sync-panel .dirty-list {
      font-size: 13px; color: var(--c-text-muted);
      margin: 8px 0; padding-left: 16px;
    }
    .sync-panel .dirty-list li { list-style: disc; }

    /* ============ Lightbox (slide zoom) ============ */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      touch-action: pinch-zoom;
      -webkit-user-select: none; user-select: none;
    }
    .lightbox.hidden { display: none; }
    .lightbox .lb-close {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 12px);
      right: 12px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,.15);
      color: #fff;
      font-size: 28px; line-height: 1;
      border-radius: 50%;
      z-index: 2001;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .lightbox .lb-caption {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0) + 12px);
      left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.12);
      color: #fff; font-size: 13px;
      padding: 6px 14px; border-radius: 14px;
      z-index: 2001;
      max-width: 90%;
      text-align: center;
      pointer-events: none;
    }
    .lightbox .lb-img-wrap {
      width: 100%; height: 100%;
      overflow: auto;
      display: flex; align-items: center; justify-content: center;
      -webkit-overflow-scrolling: touch;
    }
    .lightbox img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      touch-action: pinch-zoom;
      transition: transform .2s ease;
      transform-origin: center center;
      cursor: zoom-in;
    }
    .lightbox img.zoomed {
      max-width: none; max-height: none;
      transform: scale(2);
      cursor: zoom-out;
    }
    .lightbox .lb-hint {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0) + 20px);
      left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.12);
      color: #fff; font-size: 11px;
      padding: 4px 10px; border-radius: 10px;
      z-index: 2001;
      pointer-events: none;
      opacity: .8;
    }
    .slide-frame img {
      cursor: zoom-in;
      -webkit-tap-highlight-color: rgba(142,68,173,.2);
    }

    /* ============ Update toast ============ */
    .update-banner {
      position: sticky; top: var(--header-height); z-index: 50;
      background: var(--c-info); color: #fff;
      padding: 10px 14px; font-size: 13px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .update-banner.hidden { display: none; }
    .update-banner button {
      padding: 4px 12px; background: rgba(255,255,255,.2);
      border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- ============ Access gate ============ -->
  <div class="gate" id="gate">
    <h1>Pocket URO</h1>
    <p>Urology reference · residents only</p>
    <input type="text" id="gate-input" placeholder="員編" autocapitalize="characters" autocomplete="off">
    <button id="gate-submit">進入</button>
    <div class="error" id="gate-error"></div>
  </div>

  <!-- ============ App shell ============ -->
  <div id="app" hidden>
    <header class="app-header" id="app-header" hidden>
      <button class="icon-btn" id="btn-back" aria-label="back">←</button>
      <h1 id="app-title">Pocket URO</h1>
      <button class="icon-btn" id="btn-sync" aria-label="sync" style="position:relative">⚙</button>
      <button class="icon-btn" id="btn-home" aria-label="home">🏠</button>
    </header>
    <div class="update-banner hidden" id="update-banner">
      <span>New version available</span>
      <button id="btn-update-reload">Reload</button>
    </div>
    <div id="view"></div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <!-- Slide lightbox -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Slide zoom">
    <div class="lb-hint">double-tap / pinch to zoom · tap outside to close</div>
    <button class="lb-close" id="lb-close" aria-label="close">×</button>
    <div class="lb-img-wrap" id="lb-wrap">
      <img id="lb-img" alt="">
    </div>
    <div class="lb-caption hidden" id="lb-caption"></div>
  </div>

  <script src="lib/marked.min.js?v=3"></script>
  <script>
  'use strict';

  /* ======================================================
     Config
  ====================================================== */
  // Admin codes: full editing + sync permissions
  const ADMIN_CODES = ['ADMIN', '123944', 'Y08594'];
  // Viewer codes: share with residents / other users — read-only, cannot escalate
  const VIEWER_CODES = ['URO'];
  const VALID_CODES = [...ADMIN_CODES, ...VIEWER_CODES];
  const GH_REPO = 'fantasy7386-cmd/pocket-uro';
  const LS = {
    ACCESS: 'puro_access_code',
    TOKEN: 'puro_gh_token',
    ADMIN: 'puro_admin_mode',      // 'on' | 'off' (user toggle override)
    FAVS: 'puro_favorites',
    DATA: 'puro_data_json',        // local override for Patient Ed
    NOTES: 'puro_notes_json',      // local override for PPu Notes
    TIPS: 'puro_tips_json',        // local override for Tips & Guide
    TB_PREFIX: 'puro_tb_',         // local override for textbook chapter: puro_tb_tb_01
    RECENT_SEARCH: 'puro_recent_search',
  };
  const MODULES = [
    { id: 'education', name: 'Patient Education', icon: '📘', accent: '#2980b9' },
    { id: 'notes',     name: 'PPu Notes',         icon: '📗', accent: '#27ae60' },
    { id: 'tips',      name: 'Tips & Guide',      icon: '📙', accent: '#e67e22' },
    { id: 'textbook',  name: 'Textbook',          icon: '📕', accent: '#8e44ad' },
  ];
  const SUBMISSION_URL = '';

  /* ======================================================
     State
  ====================================================== */
  const state = {
    data: null,       // {categories, articles, glossary, ...}
    notes: null,      // {sections, ...}
    tips: null,       // {sections, ...}
    tb: {},           // tb_01 → chapter obj (lazy)
    sources: {        // 'server' | 'local'
      data: 'server',
      notes: 'server',
      tips: 'server',
      tb: {},
    },
    favorites: [],    // [{module, id, title, ts}]
  };

  /* ======================================================
     DOM helpers
  ====================================================== */
  const el  = (id) => document.getElementById(id);
  const viewEl = () => el('view');
  const toastEl = () => el('toast');

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escAttr(s) { return esc(s); }

  function showToast(msg, kind) {
    const t = toastEl();
    t.className = 'toast ' + (kind || '');
    t.textContent = msg;
    t.classList.remove('hidden');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.add('hidden'), 2600);
  }

  function toTerms(query) {
    if (!query) return [];
    const arr = Array.isArray(query) ? query : String(query).trim().split(/\s+/);
    return arr.map(t => String(t).trim()).filter(Boolean);
  }

  function matchAllTerms(text, terms) {
    if (!terms || !terms.length) return false;
    const low = (text || '').toLowerCase();
    return terms.every(t => low.includes(String(t).toLowerCase()));
  }

  function highlightText(text, query) {
    if (!query) return esc(text);
    const terms = toTerms(query);
    if (!terms.length) return esc(text);
    let out = esc(text);
    for (const t of terms) {
      const escaped = t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      out = out.replace(new RegExp(escaped, 'gi'), m => '<mark class="highlight">' + m + '</mark>');
    }
    return out;
  }

  function isHJHSlide(s) {
    return typeof s.slide_num === 'string' && /^HJH/i.test(s.slide_num);
  }
  function hjhSlideLabels(slides) {
    return slides.filter(isHJHSlide).map(s => String(s.slide_num).replace(/^HJH-?/i, ''));
  }

  function previewAround(text, query, radius = 80) {
    if (!text || !query) return '';
    const terms = toTerms(query);
    if (!terms.length) return '';
    const low = text.toLowerCase();
    let bestIdx = -1, bestTerm = null;
    for (const t of terms) {
      const idx = low.indexOf(t.toLowerCase());
      if (idx >= 0 && (bestIdx === -1 || idx < bestIdx)) { bestIdx = idx; bestTerm = t; }
    }
    if (bestIdx < 0) return '';
    const from = Math.max(0, bestIdx - radius);
    const to = Math.min(text.length, bestIdx + bestTerm.length + radius);
    let snippet = text.slice(from, to);
    if (from > 0) snippet = '…' + snippet;
    if (to < text.length) snippet = snippet + '…';
    return highlightText(snippet, terms);
  }

  /* ======================================================
     Access gate
  ====================================================== */
  function gateCheck() {
    const saved = (localStorage.getItem(LS.ACCESS) || '').toUpperCase();
    if (saved && VALID_CODES.includes(saved)) {
      openApp();
      return true;
    }
    return false;
  }
  function openApp() {
    el('gate').classList.add('hidden');
    el('app').hidden = false;
    el('app-header').hidden = false;
    boot();
  }
  function gateSubmit() {
    const code = el('gate-input').value.trim().toUpperCase();
    if (VALID_CODES.includes(code)) {
      localStorage.setItem(LS.ACCESS, code);
      openApp();
    } else {
      el('gate-error').textContent = '員編無效';
    }
  }
  el('gate-submit').addEventListener('click', gateSubmit);
  el('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') gateSubmit(); });

  /* ======================================================
     Admin detection
  ====================================================== */
  function currentCode() {
    return (localStorage.getItem(LS.ACCESS) || '').toUpperCase();
  }
  function isAdminCode() {
    return ADMIN_CODES.includes(currentCode());
  }
  function isAdmin() {
    // Admin code users can temporarily preview as viewer (LS.ADMIN === 'off'),
    // but viewer codes can never escalate. Only admin codes / GH token grant admin.
    if (isAdminCode() && localStorage.getItem(LS.ADMIN) === 'off') return false;
    if (isAdminCode()) return true;
    if (localStorage.getItem(LS.TOKEN)) return true;
    return false;
  }
  window.__toggleAdmin = function() {
    // Only admin-code users may toggle. Viewers' button is not rendered.
    if (!isAdminCode()) return;
    if (localStorage.getItem(LS.ADMIN) === 'off') {
      localStorage.removeItem(LS.ADMIN);
    } else {
      localStorage.setItem(LS.ADMIN, 'off');
    }
    router();
  };

  /* ======================================================
     Favorites
  ====================================================== */
  function loadFavs() {
    try {
      const raw = localStorage.getItem(LS.FAVS);
      state.favorites = raw ? JSON.parse(raw) : [];
    } catch { state.favorites = []; }
  }
  function saveFavs() {
    localStorage.setItem(LS.FAVS, JSON.stringify(state.favorites));
  }
  function isFav(module, id) {
    return state.favorites.some(f => f.module === module && f.id === id);
  }
  function toggleFav(module, id, title) {
    const idx = state.favorites.findIndex(f => f.module === module && f.id === id);
    if (idx >= 0) {
      state.favorites.splice(idx, 1);
      showToast('Removed from favorites');
    } else {
      state.favorites.unshift({ module, id, title, ts: Date.now() });
      showToast('Added to favorites', 'success');
    }
    saveFavs();
  }

  /* ======================================================
     Data loading
  ====================================================== */
  async function loadJSON(path) {
    const resp = await fetch(path + '?t=' + Date.now());
    if (!resp.ok) throw new Error('fetch ' + path + ' ' + resp.status);
    return resp.json();
  }

  function loadLocalOverride(key, server) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return { data: server, source: 'server' };
      const local = JSON.parse(raw);
      // Only use local if strictly newer (tracked via _updated_at)
      if (local && local._updated_at && server._updated_at && local._updated_at > server._updated_at) {
        return { data: local, source: 'local' };
      }
      if (local && local._updated_at && !server._updated_at) {
        return { data: local, source: 'local' };
      }
      // Otherwise trust server
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    } catch {
      localStorage.removeItem(key);
      return { data: server, source: 'server' };
    }
  }

  async function loadCore() {
    const [dataSrv, notesSrv, tipsSrv] = await Promise.all([
      loadJSON('data.json'),
      loadJSON('teaching-notes.json'),
      loadJSON('tips-guide.json'),
    ]);
    const dOv = loadLocalOverride(LS.DATA, dataSrv);
    state.data = dOv.data; state.sources.data = dOv.source;
    const nOv = loadLocalOverride(LS.NOTES, notesSrv);
    state.notes = nOv.data; state.sources.notes = nOv.source;
    const tOv = loadLocalOverride(LS.TIPS, tipsSrv);
    state.tips = tOv.data; state.sources.tips = tOv.source;
    normalizeData();
  }

  function normalizeData() {
    // Fix PPu Notes Roman numbering (source data has XII → XIV gap).
    // Display-only renumber; does NOT mark dirty (user didn't edit).
    if (state.notes && state.notes.sections) {
      const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
      state.notes.sections.forEach((s, i) => {
        const want = i < romans.length ? romans[i] : String(i + 1);
        s.number = want;
        s.full_title = want + '. ' + s.title;
      });
    }
  }

  async function loadChapter(tbId) {
    if (state.tb[tbId]) return state.tb[tbId];
    const server = await loadJSON('textbook-data/' + tbId + '.json');
    const key = LS.TB_PREFIX + tbId;
    const ov = loadLocalOverride(key, server);
    state.tb[tbId] = ov.data;
    state.sources.tb[tbId] = ov.source;
    return state.tb[tbId];
  }

  function markDirty(dataset) {
    // dataset: 'data' | 'notes' | 'tips' | 'tb_XX'
    const now = new Date().toISOString();
    if (dataset === 'data') {
      state.data._updated_at = now;
      state.sources.data = 'local';
      localStorage.setItem(LS.DATA, JSON.stringify(state.data));
    } else if (dataset === 'notes') {
      state.notes._updated_at = now;
      state.notes.updated = now.slice(0, 10);
      state.sources.notes = 'local';
      localStorage.setItem(LS.NOTES, JSON.stringify(state.notes));
    } else if (dataset === 'tips') {
      state.tips._updated_at = now;
      state.tips.updated = now.slice(0, 10);
      state.sources.tips = 'local';
      localStorage.setItem(LS.TIPS, JSON.stringify(state.tips));
    } else if (dataset.startsWith('tb_')) {
      const tb = state.tb[dataset];
      tb._updated_at = now;
      state.sources.tb[dataset] = 'local';
      localStorage.setItem(LS.TB_PREFIX + dataset, JSON.stringify(tb));
    }
  }

  function dirtyDatasets() {
    const arr = [];
    if (state.sources.data === 'local') arr.push({ id: 'data', label: 'Patient Education', path: 'data.json' });
    if (state.sources.notes === 'local') arr.push({ id: 'notes', label: 'PPu Notes', path: 'teaching-notes.json' });
    if (state.sources.tips === 'local') arr.push({ id: 'tips', label: 'Tips & Guide', path: 'tips-guide.json' });
    for (const tbId of Object.keys(state.sources.tb)) {
      if (state.sources.tb[tbId] === 'local') {
        arr.push({ id: tbId, label: 'Textbook ' + tbId, path: 'textbook-data/' + tbId + '.json' });
      }
    }
    return arr;
  }

  /* ======================================================
     GitHub sync
  ====================================================== */
  async function ensureToken() {
    let token = localStorage.getItem(LS.TOKEN);
    if (token) return token;
    const t = prompt(
      '首次同步：輸入 GitHub Personal Access Token。\n\n' +
      '建立路徑：github.com/settings/tokens\n' +
      'Scope: public_repo\n\n' +
      '僅儲存在此裝置的 localStorage。'
    );
    if (!t) return null;
    token = t.trim();
    localStorage.setItem(LS.TOKEN, token);
    return token;
  }

  async function ghPutFile(path, obj, message) {
    const token = await ensureToken();
    if (!token) throw new Error('No token');
    const headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
    };
    // Get existing SHA
    const getResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { headers }
    );
    if (getResp.status === 401) {
      localStorage.removeItem(LS.TOKEN);
      throw new Error('Invalid token');
    }
    let sha = null;
    if (getResp.ok) {
      const j = await getResp.json();
      sha = j.sha;
    } else if (getResp.status !== 404) {
      throw new Error('Get SHA failed: ' + getResp.status);
    }
    const payload = JSON.stringify(obj, null, 2);
    const content = btoa(unescape(encodeURIComponent(payload)));
    const putBody = { message, content };
    if (sha) putBody.sha = sha;
    const putResp = await fetch(
      'https://api.github.com/repos/' + GH_REPO + '/contents/' + path,
      { method: 'PUT', headers, body: JSON.stringify(putBody) }
    );
    if (!putResp.ok) {
      const err = await putResp.json().catch(() => ({ message: 'unknown' }));
      throw new Error('Push failed: ' + (err.message || putResp.status));
    }
    return true;
  }

  async function syncAll() {
    const dirty = dirtyDatasets();
    if (!dirty.length) {
      showToast('Nothing to sync');
      return;
    }
    const today = new Date().toISOString().slice(0, 10);
    for (const d of dirty) {
      try {
        let payload;
        if (d.id === 'data')       payload = state.data;
        else if (d.id === 'notes') payload = state.notes;
        else if (d.id === 'tips')  payload = state.tips;
        else if (d.id.startsWith('tb_')) payload = state.tb[d.id];
        // Strip transient fields before push
        const clone = JSON.parse(JSON.stringify(payload));
        delete clone._updated_at;
        await ghPutFile(d.path, clone, 'Update ' + d.label + ' ' + today);
        // Clear local override
        if (d.id === 'data')       { localStorage.removeItem(LS.DATA);    state.sources.data = 'server'; }
        else if (d.id === 'notes') { localStorage.removeItem(LS.NOTES);   state.sources.notes = 'server'; }
        else if (d.id === 'tips')  { localStorage.removeItem(LS.TIPS);    state.sources.tips = 'server'; }
        else if (d.id.startsWith('tb_')) { localStorage.removeItem(LS.TB_PREFIX + d.id); state.sources.tb[d.id] = 'server'; }
        delete payload._updated_at;
      } catch (e) {
        showToast('Sync failed: ' + d.label + ' — ' + e.message, 'error');
        return;
      }
    }
    showToast('Synced ' + dirty.length + ' file(s) ✓', 'success');
    router();
  }

  /* ======================================================
     Markdown rendering (Tips & Guide + Textbook notes)
  ====================================================== */
  let markedConfigured = false;
  function configureMarked() {
    if (markedConfigured || typeof marked === 'undefined') return;
    marked.setOptions({
      gfm: true,
      breaks: false,
      tables: true,
    });
    markedConfigured = true;
  }
  function renderMd(md) {
    if (typeof marked === 'undefined') return '<pre>' + esc(md) + '</pre>';
    configureMarked();
    const html = marked.parse(md || '');
    // Post-process doctor tags [XXX] → <span class="doctor-tag">XXX</span>
    return html.replace(/\[([^\[\]\n]{1,12})\]/g, (m, txt) => {
      // Avoid replacing markdown link syntax (followed by `(`)
      return '<span class="doctor-tag">' + esc(txt) + '</span>';
    });
  }

  /* ======================================================
     Router
  ====================================================== */
  function navigate(hash) {
    if (location.hash === hash) router();
    else location.hash = hash;
  }
  function parseHash() {
    const raw = (location.hash || '#/').replace(/^#\/?/, '');
    const [pathPart, queryPart] = raw.split('?');
    const parts = pathPart.split('/').filter(Boolean);
    const query = {};
    if (queryPart) {
      for (const kv of queryPart.split('&')) {
        const [k, v] = kv.split('=');
        query[decodeURIComponent(k)] = decodeURIComponent(v || '');
      }
    }
    return { parts, query };
  }

  function router() {
    const { parts, query } = parseHash();
    const module = parts[0];

    try {
      if (!module) return renderHome();
      if (module === 'favorites') return renderFavorites();
      if (module === 'search') return renderSearch(query.q || '');
      if (module === 'sync') return renderSyncPanel();
      if (module === 'education') return routeEducation(parts.slice(1));
      if (module === 'notes') return routeNotes(parts.slice(1));
      if (module === 'tips') return routeTips(parts.slice(1));
      if (module === 'textbook') return routeTextbook(parts.slice(1), query);
      renderNotFound();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Error</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
    }
  }

  window.addEventListener('hashchange', router);

  /* ======================================================
     Header controls
  ====================================================== */
  el('btn-back').addEventListener('click', () => {
    if (history.length > 1) history.back();
    else navigate('#/');
  });
  el('btn-home').addEventListener('click', () => navigate('#/'));
  el('btn-sync').addEventListener('click', () => navigate('#/sync'));

  function setHeader(title) {
    el('app-title').textContent = title || 'Pocket URO';
    updateSyncBadge();
  }
  function updateSyncBadge() {
    const btn = el('btn-sync');
    if (!btn) return;
    const n = dirtyDatasets().length;
    btn.innerHTML = '⚙' + (n > 0 ? '<span class="sync-badge">' + n + '</span>' : '');
  }

  /* Lightbox / slide zoom */
  window.__openLightbox = function(src, caption) {
    const lb = el('lightbox');
    const img = el('lb-img');
    const cap = el('lb-caption');
    img.src = src;
    img.classList.remove('zoomed');
    if (caption) { cap.textContent = caption; cap.classList.remove('hidden'); }
    else { cap.classList.add('hidden'); }
    lb.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };
  function closeLightbox() {
    el('lightbox').classList.add('hidden');
    el('lb-img').src = '';
    document.body.style.overflow = '';
  }
  el('lb-close').addEventListener('click', closeLightbox);
  el('lightbox').addEventListener('click', (e) => {
    // Close when tapping backdrop (not the image or close button)
    if (e.target.id === 'lightbox' || e.target.id === 'lb-wrap') closeLightbox();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !el('lightbox').classList.contains('hidden')) closeLightbox();
  });
  // Double-tap to toggle 2× on the image itself
  (function installDoubleTap() {
    const img = el('lb-img');
    let lastTap = 0;
    img.addEventListener('click', (e) => {
      const now = Date.now();
      if (now - lastTap < 320) {
        img.classList.toggle('zoomed');
        e.stopPropagation();
      }
      lastTap = now;
    });
  })();

  /* Edge-swipe-back gesture (PWA standalone mode has no Safari swipe) */
  (function installEdgeSwipe() {
    let x0 = null, y0 = null;
    document.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (t.clientX < 30) { x0 = t.clientX; y0 = t.clientY; }
      else { x0 = null; }
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (x0 === null) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - x0;
      const dy = Math.abs(t.clientY - y0);
      if (dx > 80 && dy < 60) {
        if (location.hash && location.hash !== '#/' && location.hash !== '#') {
          if (history.length > 1) history.back();
          else navigate('#/');
        }
      }
      x0 = null;
    }, { passive: true });
  })();

  /* ======================================================
     Home
  ====================================================== */
  function renderHome() {
    setHeader('Pocket URO');
    const counts = {
      education: state.data ? state.data.articles.length : 0,

    if (parts[0] === 'a' && parts[1] && parts[2] === 'edit') return renderArticleEdit(parts[1], false, accent);
    if (parts[0] === 'a' && parts[1]) return renderArticle(parts[1], accent);
    if (parts[0] === 'new') return renderArticleEdit(null, true, accent, parts[1]);
    renderNotFound();
  }

  window.__deleteArticle = function(artId) {
    const a = state.data.articles.find(x => x.id === artId);
    if (!a) return;
    if (!confirm('Delete article "' + a.title + '"?')) return;
    // Remove from articles
    state.data.articles = state.data.articles.filter(x => x.id !== artId);
    // Remove from category's article list
    const cat = state.data.categories.find(c => c.id === a.category);
    if (cat) cat.articles = cat.articles.filter(id => id !== artId);
    state.data.total_articles = state.data.articles.length;
    markDirty('data');
    showToast('Article deleted', 'success');
    navigate('#/education/c/' + a.category);
  };

    viewEl().innerHTML = `

      </div>
    `;
  }

  window.__saveArticle = function(artId, isNew) {
    const title = el('ed-title').value.trim();
    const categoryId = el('ed-category').value;
    const text = el('ed-text').value;
    const keywords = el('ed-keywords').value.split(',').map(s => s.trim()).filter(Boolean);
    const pdf_url = el('ed-source').value.trim();
    if (!title) { showToast('Title required', 'error'); return; }
    if (isNew) {
      const newArt = { id: artId, title, category: categoryId, text, keywords, related: [], pdf_url, pages: null, filename: '' };
      state.data.articles.push(newArt);
      const cat = state.data.categories.find(c => c.id === categoryId);
      if (cat) { cat.articles.push(artId); cat.count = cat.articles.length; }
      state.data.total_articles = state.data.articles.length;
    } else {
      const a = state.data.articles.find(x => x.id === artId);
      if (!a) { showToast('Article not found', 'error'); return; }
      // Handle category change
      if (a.category !== categoryId) {
        const oldCat = state.data.categories.find(c => c.id === a.category);
        const newCat = state.data.categories.find(c => c.id === categoryId);
        if (oldCat) { oldCat.articles = oldCat.articles.filter(id => id !== artId); oldCat.count = oldCat.articles.length; }
        if (newCat) { newCat.articles.push(artId); newCat.count = newCat.articles.length; }
      }
      a.title = title; a.category = categoryId; a.text = text;
      a.keywords = keywords; a.pdf_url = pdf_url;
    }
    markDirty('data');
    showToast('Saved locally ✓', 'success');
    navigate('#/education/a/' + artId);
  };

  function routeNotes(parts) {

    if (!parts.length) return renderNotesList(accent);
    if (parts[0] === 's' && parts[1]) return renderNoteDetail(parts[1], accent);
    if (parts[0] === 'edit' && parts[1]) return renderNoteEdit(parts[1], false, accent);
    if (parts[0] === 'new') return renderNoteEdit(null, true, accent, parts[1] ? parseInt(parts[1]) : -1);
    renderNotFound();
  }

  function renderNotesList(accent) {
    setHeader('PPu Notes');

    const lastIdx = sections.length - 1;
    const dirty = state.sources.notes === 'local';
    viewEl().innerHTML = `

                <button class="fav-btn ${isFav('notes', s.id) ? 'active' : ''}" data-fav-module="notes" data-fav-id="${esc(s.id)}" data-fav-title="${escAttr(s.full_title)}">${isFav('notes', s.id) ? '⭐' : '☆'}</button>
                ${admin ? `
                  <div style="display:flex;flex-direction:column;gap:2px;margin-left:6px">
                    ${i > 0 ? `<button onclick="event.preventDefault();event.stopPropagation();window.__moveNote(${i},-1)" style="font-size:12px;opacity:.5;padding:2px">▲</button>` : ''}
                    ${i < lastIdx ? `<button onclick="event.preventDefault();event.stopPropagation();window.__moveNote(${i},1)" style="font-size:12px;opacity:.5;padding:2px">▼</button>` : ''}
                    <button onclick="event.preventDefault();event.stopPropagation();window.__deleteNote(${i})" style="font-size:12px;opacity:.5;padding:2px;color:var(--c-danger)">✕</button>
                  </div>
                ` : ''}
                <span class="chevron">›</span>

        ${admin ? `

          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  window.__moveNote = function(idx, dir) {
    const arr = state.notes.sections;
    if (idx + dir < 0 || idx + dir >= arr.length) return;
    [arr[idx], arr[idx + dir]] = [arr[idx + dir], arr[idx]];
    renumberNotes();
    markDirty('notes');
    router();
  };
  window.__deleteNote = function(idx) {
    if (state.notes.sections.length <= 1) { alert('Cannot delete last section'); return; }
    const s = state.notes.sections[idx];
    if (!confirm('Delete section "' + s.number + '. ' + s.title + '"?')) return;
    state.notes.sections.splice(idx, 1);
    renumberNotes();
    markDirty('notes');
    router();
  };

  function renumberNotes() {
    const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
    state.notes.sections.forEach((s, i) => {
      s.number = i < romans.length ? romans[i] : String(i + 1);
      s.full_title = s.number + '. ' + s.title;
      if (s.subsections) {
        s.subsections.forEach((sub, j) => {
          if (sub.title) {
            sub.title = sub.title.replace(/^\d+\.\s*/, '');
            sub.title = (j + 1) + '. ' + sub.title;
          }
        });
      }
    });
    state.notes.total_sections = state.notes.sections.length;
  }

  function renderNoteDetail(sid, accent) {
    const s = state.notes.sections.find(x => x.id === sid);
    if (!s) return renderNotFound();
    setHeader(s.full_title);
    const fav = isFav('notes', sid);

    for (const sub of s.subsections) {

      if (sub.items && sub.items.length) {
        body += '<ul style="margin-left:20px">';
        for (const it of sub.items) body += '<li style="margin:4px 0">' + esc(it) + '</li>';
        body += '</ul>';
      }
      body += '</div>';
    }
    const idx = state.notes.sections.indexOf(s);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>

  function renderNoteEdit(sid, isNew, accent, insertAfterIdx) {
    let section;
    if (isNew) {
      section = {
        id: 'tn_' + Date.now(),
        number: '',
        title: '',
        full_title: '',
        subsections: [{ title: '', items: [''] }],
        _insertAfter: (insertAfterIdx !== undefined ? insertAfterIdx : -1),
      };
    } else {
      const orig = state.notes.sections.find(x => x.id === sid);
      if (!orig) return renderNotFound();
      section = JSON.parse(JSON.stringify(orig));
    }
    setHeader(isNew ? 'New section' : 'Edit section');
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:19px;margin-bottom:12px">${isNew ? 'New section' : 'Edit: ' + esc(section.title)}</h2>

          <label>Section title</label>

          <label>Subsections</label>
          <div id="ne-subs"></div>
        </div>
        <div class="action-bar action-bar-sticky">
          <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
          <button class="btn btn-success" onclick="window.__saveNote('${esc(section.id)}', ${isNew}, ${section._insertAfter !== undefined ? section._insertAfter : 'null'})">Save</button>
        </div>
      </div>
    `;
    renderNoteSubsBlocks(section.subsections);

  function renderNoteSubsBlocks(subs) {
    const host = el('ne-subs');
    host.innerHTML = subs.map((sub, i) => noteSubBlockHTML(sub, i)).join('')
      + `<button class="insert-btn" onclick="window.__addNoteSub()">＋ add subsection</button>`;
  }

  function noteSubBlockHTML(sub, i) {
    return `
      <div class="subsection-block" data-sub-idx="${i}">
        <span class="sub-idx">Sub ${i + 1}</span>
        <button class="sub-delete" onclick="window.__delNoteSub(${i})">✕</button>
        <div class="edit-field" style="margin-bottom:8px">
          <label>Title</label>
          <input type="text" class="ne-sub-title" value="${escAttr(sub.title || '')}" placeholder="1. 某子章節">
        </div>
        <div class="edit-field" style="margin-bottom:0">
          <label>Items (one per line)</label>
          <textarea class="ne-sub-items" style="min-height:120px">${esc((sub.items || []).join('\n'))}</textarea>
        </div>
      </div>
      <button class="insert-btn" onclick="window.__insertNoteSubAfter(${i})">＋ insert after</button>
    `;
  }

  function collectNoteSubs() {
    const blocks = document.querySelectorAll('#ne-subs .subsection-block');
    const subs = [];
    blocks.forEach(b => {
      const title = b.querySelector('.ne-sub-title').value.trim();
      const itemsRaw = b.querySelector('.ne-sub-items').value;
      const items = itemsRaw.split('\n').map(s => s.trim()).filter(Boolean);
      subs.push({ title, items });
    });
    return subs;
  }

  window.__addNoteSub = function() {
    const subs = collectNoteSubs();
    subs.push({ title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };
  window.__delNoteSub = function(i) {
    const subs = collectNoteSubs();
    if (subs.length <= 1) { alert('Cannot delete last subsection'); return; }
    if (!confirm('Delete subsection ' + (i + 1) + '?')) return;
    subs.splice(i, 1);
    renderNoteSubsBlocks(subs);
  };
  window.__insertNoteSubAfter = function(i) {
    const subs = collectNoteSubs();
    subs.splice(i + 1, 0, { title: '', items: [] });
    renderNoteSubsBlocks(subs);
  };

  window.__saveNote = function(sid, isNew, insertAfter) {
    const title = el('ne-title').value.trim();
    const subs = collectNoteSubs();
    if (!title) { showToast('Title required', 'error'); return; }
    if (isNew) {
      const newSection = {
        id: sid, number: '', title, full_title: title, subsections: subs,
      };
      if (insertAfter !== null && insertAfter !== undefined && insertAfter >= 0 && insertAfter < state.notes.sections.length) {
        state.notes.sections.splice(insertAfter + 1, 0, newSection);
      } else {
        state.notes.sections.push(newSection);
      }
    } else {
      const s = state.notes.sections.find(x => x.id === sid);
      if (!s) return showToast('Section not found', 'error');
      s.title = title;
      s.subsections = subs;
    }
    renumberNotes();
    markDirty('notes');
    showToast('Saved locally ✓', 'success');
    navigate(isNew ? '#/notes' : '#/notes/s/' + sid);

  window.__deleteTipsSub = function(chapterId, subId) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return;
    if (!confirm('Delete this subsection?')) return;
    chapter.subsections = chapter.subsections.filter(x => x.id !== subId);

    navigate('#/tips/s/' + chapterId);
  };

  function renderTipsEdit(chapterId, subId, isNew, accent) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return renderNotFound();
    let sub;
    if (isNew) {
      sub = { id: 'tg_' + chapterId.replace('tg_', '') + '_' + Date.now(), title: '', markdown: '' };
    } else {
      const orig = chapter.subsections.find(x => x.id === subId);

    }
    setHeader(isNew ? 'New subsection' : 'Edit subsection');

  window.__mdTab = function(which) {
    const ep = el('mdp-edit'), pp = el('mdp-preview');
    const btns = document.querySelectorAll('.md-tabs button');
    if (which === 'edit') {
      ep.classList.remove('hidden'); pp.classList.add('hidden');
      btns[0].classList.add('active'); btns[1].classList.remove('active');
    } else {
      ep.classList.add('hidden'); pp.classList.remove('hidden');
      btns[0].classList.remove('active'); btns[1].classList.add('active');
      window.__mdUpdate();
    }
  };
  window.__mdUpdate = function() {
    const md = el('te-md').value;
    const pv = el('te-preview');
    if (pv) pv.innerHTML = renderMd(md);
  };

  window.__saveTips = function(chapterId, subId, isNew) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return showToast('Chapter not found', 'error');
    const title = el('te-title').value.trim();
    const md = el('te-md').value;
    if (!title) return showToast('Title required', 'error');
    if (isNew) {
      chapter.subsections.push({ id: subId, title, markdown: md });
    } else {
      const s = chapter.subsections.find(x => x.id === subId);
      if (!s) return showToast('Not found', 'error');
      s.title = title;
      s.markdown = md;
    }
    state.tips.total_subsections = state.tips.sections.reduce((a, s) => a + s.subsections.length, 0);
    markDirty('tips');
    showToast('Saved locally ✓', 'success');
    navigate('#/tips/sub/' + chapterId + '/' + subId);

  /* ======================================================
     Textbook
  ====================================================== */
  const TB_CHAPTER_IDS = ['tb_01','tb_02','tb_03','tb_04','tb_05','tb_06','tb_07','tb_08','tb_09','tb_10','tb_11','tb_12'];

  async function routeTextbook(parts, query) {
    const accent = '#8e44ad';
    query = query || {};
    if (!parts.length) return renderTextbookHome(accent);
    if (parts[0] === 'c' && parts[1]) {
      await loadChapter(parts[1]);
      if (parts[2] === 's' && parts[3]) return renderTbSection(parts[1], parseInt(parts[3]), accent);
      return renderTbChapter(parts[1], accent);
    }
    if (parts[0] === 't' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      const opts = {
        slideIdx: query.slide !== undefined ? parseInt(query.slide) : 0,
        highlight: query.q || '',
      };
      return renderTbTopic(parts[1], parts[2], accent, opts);
    }
    if (parts[0] === 'edit-notes' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      return renderTbTopicNotesEdit(parts[1], parts[2], accent);
    }
    if (parts[0] === 'edit-ocr' && parts[1] && parts[2] && parts[3] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbOCREdit(parts[1], parts[2], parseInt(parts[3]), accent);
    }
    if (parts[0] === 'new-text' && parts[1] && parts[2] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbNewTextTopic(parts[1], parseInt(parts[2]), accent);
    }
    renderNotFound();
  }

  function renderTextbookHome(accent) {
    setHeader('Textbook Knowledge');
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div class="home-grid" id="tb-grid">
          ${TB_CHAPTER_IDS.map(id => `
            <a class="module-card" style="--accent:${accent}" href="#/textbook/c/${esc(id)}">
              <div class="icon">📕</div>
              <div>
                <div class="name" id="tb-name-${esc(id)}">${esc(id)}</div>
                <div class="count" id="tb-count-${esc(id)}">loading…</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `;
    // Lazy-resolve chapter titles
    TB_CHAPTER_IDS.forEach(id => {
      loadChapter(id).then(ch => {
        const nm = el('tb-name-' + id);
        const ct = el('tb-count-' + id);
        if (nm) nm.textContent = (ch.icon ? ch.icon + ' ' : '') + ch.title;
        if (ct) {
          const topics = (ch.sections || []).reduce((a, s) => a + (s.topics ? s.topics.length : 0), 0);
          ct.textContent = (ch.sections ? ch.sections.length : 0) + ' sections · ' + topics + ' topics';
        }
      }).catch(() => {
        const ct = el('tb-count-' + id);
        if (ct) ct.textContent = '(load failed)';
      });
    });
  }

  function renderTbChapter(tbId, accent) {
    const ch = state.tb[tbId];
    if (!ch) return renderNotFound();
    setHeader((ch.icon ? ch.icon + ' ' : '') + ch.title);
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <a class="back-btn" href="#/textbook">← All chapters</a>
        <h2 style="font-size:21px;margin-bottom:12px">${esc(ch.icon || '')} ${esc(ch.number)}. ${esc(ch.title)}</h2>
        <div class="list-section">
          ${(ch.sections || []).map((s, i) => `
            <a class="list-card" href="#/textbook/c/${esc(tbId)}/s/${i}">
              <div style="flex:1;min-width:0">
                <div class="title">${esc(s.title)}</div>
                <div class="meta">${(s.topics || []).length} topics · ${s.total_slides || '?'} slides</div>
              </div>
              <span class="chevron">›</span>
            </a>

        </div>
      </div>
    `;
  }

  function renderTbSection(tbId, secIdx, accent) {
    const ch = state.tb[tbId];
    const sec = ch && ch.sections && ch.sections[secIdx];
    if (!sec) return renderNotFound();
    setHeader(sec.title);
    const admin = isAdmin();
    const dirty = state.sources.tb[tbId] === 'local';
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>

        ${dirty ? '<div style="color:var(--c-warning);font-size:12px;margin-bottom:8px">⚠ Local changes (unsynced)</div>' : ''}
        <div style="color:var(--c-text-muted);font-size:13px;margin-bottom:12px">${(sec.topics || []).length} topics · from ${esc(sec.source_file || '')}</div>

        </div>
        ${admin ? `
          <div class="action-bar">
            <button class="btn btn-success btn-block" onclick="location.hash='#/textbook/new-text/${esc(tbId)}/${secIdx}'">+ New text-only topic in this section</button>

      </div>

  function topicListCard(tbId, t, accent) {
    const fav = isFav('textbook', t.id);
    const isText = t.type === 'text_only';
    const badges = [];
    if (t.has_exam_questions) badges.push('<span class="topic-badge exam">📝 Exam</span>');
    if (t.has_hjh_content) badges.push('<span class="topic-badge hjh">HJH</span>');
    if (isText) badges.push('<span class="topic-badge text-only">📄 Text</span>');
    const meta = isText ? ((t.markdown_content || '').length + ' chars') : ((t.slide_count || (t.slides ? t.slides.length : 0)) + ' slides');
    const cardClass = t.has_hjh_content ? 'list-card hjh' : 'list-card';
    return `
      <a class="${cardClass}" href="#/textbook/t/${esc(tbId)}/${esc(t.id)}">
        <div style="flex:1;min-width:0">
          <div class="title" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${esc(t.title)}${badges.join('')}</div>
          <div class="meta">${meta}</div>
        </div>
        <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(t.id)}" data-fav-title="${escAttr(t.title)}">${fav ? '⭐' : '☆'}</button>
        <span class="chevron">›</span>
      </a>`;
  }

  function findTopic(tbId, topicId) {
    const ch = state.tb[tbId];
    if (!ch) return null;
    for (let si = 0; si < (ch.sections || []).length; si++) {
      const sec = ch.sections[si];
      const ti = (sec.topics || []).findIndex(t => t.id === topicId);
      if (ti >= 0) return { ch, sec, secIdx: si, topic: sec.topics[ti], topicIdx: ti };
    }
    return null;
  }

  function renderTbTopic(tbId, topicId, accent, opts) {
    opts = opts || {};
    const initialSlideIdx = Math.max(0, opts.slideIdx || 0);
    const highlight = opts.highlight || '';
    const found = findTopic(tbId, topicId);
    if (!found) return renderNotFound();
    const { ch, sec, secIdx, topic } = found;
    setHeader(topic.title);
    const fav = isFav('textbook', topicId);
    const admin = isAdmin();

    let content = '';
    const visibleSlides = (topic.slides || []).filter(s => !s.hidden);
    if (topic.type === 'text_only') {
      const md = topic.markdown_content || '';
      let rendered = renderMd(md);
      if (highlight) {
        // Naive highlight inside rendered HTML — wrap text matches
        const safe = highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        rendered = rendered.replace(new RegExp('(?![^<]*>)(' + safe + ')', 'gi'), '<mark class="highlight">$1</mark>');
      }
      content = `<div class="markdown-body">${rendered}</div>`;
    } else {
      if (!visibleSlides.length) {
        content = '<div class="placeholder"><div class="big">📄</div><strong>No visible slides</strong></div>';
      } else {
        const startIdx = Math.min(initialSlideIdx, visibleSlides.length - 1);
        content = renderSlideViewerHTML(tbId, topicId, visibleSlides, startIdx, highlight);
      }
    }

    const badges = [];
    if (topic.has_exam_questions) badges.push('<span class="topic-badge exam">📝 Exam</span>');
    if (topic.has_hjh_content)    badges.push('<span class="topic-badge hjh">HJH</span>');
    if (topic.type === 'text_only') badges.push('<span class="topic-badge text-only">📄 Text</span>');

    // HJH slide summary for quick navigation
    const hjhLabels = hjhSlideLabels(visibleSlides);
    const hjhSummary = hjhLabels.length ? `
      <details class="hjh-summary" style="margin-bottom:10px">
        <summary style="padding:8px 12px;background:#fff5d6;border:1px solid #f0d986;border-radius:var(--radius-sm);font-size:13px;color:#8b5a00;cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between">
          <span><strong>${hjhLabels.length} HJH slide${hjhLabels.length > 1 ? 's' : ''}</strong> in this topic</span>
          <span style="font-size:11px;opacity:.7">tap to show ▸</span>
        </summary>
        <div style="padding:8px 4px;display:flex;flex-wrap:wrap;gap:6px">
          ${visibleSlides.map((s, i) => isHJHSlide(s) ? `<a href="#/textbook/t/${esc(tbId)}/${esc(topicId)}?slide=${i}" style="padding:4px 10px;background:#ffe680;color:#8b5a00;border-radius:8px;font-weight:700;text-decoration:none;font-size:12px">${esc(String(s.slide_num))}</a>` : '').join('')}
        </div>
      </details>
    ` : '';

    const notesHTML = topic.notes ? `
      <div class="topic-notes">
        <div class="notes-label">📝 Notes</div>
        <div class="markdown-body">${renderMd(topic.notes)}</div>
      </div>
    ` : '';

    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <a class="back-btn" href="#/textbook/c/${esc(tbId)}/s/${secIdx}">← ${esc(sec.title)}</a>
        <div class="topic-header">
          <div class="title">${esc(topic.title)}</div>
          <div class="badges">${badges.join('')}</div>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(topicId)}" data-fav-title="${escAttr(topic.title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        ${notesHTML}
        ${hjhSummary}
        <div id="tb-content">${content}</div>
        ${admin ? `
          <div class="action-bar">
            <button class="btn btn-primary" onclick="location.hash='#/textbook/edit-notes/${esc(tbId)}/${esc(topicId)}'">Edit notes</button>
            ${topic.type !== 'text_only' ? `<button class="btn btn-secondary" onclick="window.__ocrEditPrompt('${esc(tbId)}','${esc(topicId)}')">Edit OCR</button>` : ''}
            <button class="btn btn-danger" onclick="window.__deleteTopic('${esc(tbId)}','${esc(topicId)}')">Delete topic</button>
          </div>
        ` : ''}
      </div>
    `;

    if (topic.type !== 'text_only') bindSlideViewer(tbId, topicId, initialSlideIdx, highlight);
    bindFavButtons();
  }

  window.__deleteTopic = function(tbId, topicId) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    if (!confirm('Delete topic "' + found.topic.title + '"?')) return;
    found.sec.topics = found.sec.topics.filter(t => t.id !== topicId);
    markDirty(tbId);
    showToast('Deleted', 'success');
    navigate('#/textbook/c/' + tbId + '/s/' + found.secIdx);
  };

  window.__ocrEditPrompt = function(tbId, topicId) {
    // Show a simple slide picker overlay: for now, navigate to slide 0 editor
    const found = findTopic(tbId, topicId);
    if (!found) return;
    const slides = (found.topic.slides || []).filter(s => !s.hidden);
    if (!slides.length) return;
    // Pick currently-viewing slide from DOM
    const cur = parseInt(el('tb-slide-index') ? el('tb-slide-index').textContent : 1) - 1;
    const idx = Math.max(0, Math.min(slides.length - 1, cur));
    navigate('#/textbook/edit-ocr/' + tbId + '/' + topicId + '/' + idx);
  };

  function renderSlideViewerHTML(tbId, topicId, slides, idx, highlight) {
    const s = slides[idx];
    highlight = highlight || '';
    const textLines = (s.text || []).map(t => highlight ? highlightText(t, highlight) : esc(t)).join('</li><li>');
    const ocrFull = s.ocr_text ? (highlight ? highlightText(s.ocr_text, highlight) : esc(s.ocr_text)) : '';
    const isHJH = isHJHSlide(s);
    return `
      <div class="slide-viewer" ${isHJH ? 'style="box-shadow:0 0 0 3px #f1c40f"' : ''}>
        <div class="slide-frame" style="position:relative">
          ${isHJH ? '<div style="position:absolute;top:8px;left:8px;z-index:2"><span class="topic-badge hjh" style="font-size:12px;padding:3px 10px">HJH</span></div>' : ''}
          <img src="${escAttr(s.slide_image || '')}" alt="slide ${esc(String(s.slide_num))}" loading="eager" onclick="window.__openLightbox(this.src, 'Slide ${esc(String(s.slide_num))} · ${idx + 1}/${slides.length}')">
        </div>
        <div class="slide-controls">
          <button onclick="window.__slidePrev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
          <div class="slide-counter">
            <span id="tb-slide-index">${idx + 1}</span> / ${slides.length}
            · <span style="color:${isHJH ? '#8b5a00' : 'var(--c-text-muted)'};font-weight:${isHJH ? '700' : 'normal'}">#${esc(String(s.slide_num))}</span>
          </div>
          <button onclick="window.__slideNext()" ${idx === slides.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
        ${(s.text && s.text.length) ? `
          <div class="slide-ocr" ${isHJH ? 'style="background:#fffbe6;border-color:#f0d986"' : ''}>
            <div class="ocr-label">${isHJH ? 'HJH · ' : ''}Captions</div>
            <ul><li>${textLines}</li></ul>

        ${ocrFull ? `

        ` : ''}

    `;
  }

  function bindSlideViewer(tbId, topicId, initialIdx, highlight) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    const slides = (found.topic.slides || []).filter(s => !s.hidden);
    let idx = Math.max(0, Math.min(initialIdx || 0, slides.length - 1));
    highlight = highlight || '';

    function rerender() {
      el('tb-content').innerHTML = renderSlideViewerHTML(tbId, topicId, slides, idx, highlight);
      // Swipe gesture
      const frame = el('tb-content').querySelector('.slide-frame');
      if (frame) attachSwipe(frame);
    }

    function attachSwipe(node) {
      let x0 = null;
      node.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; });
      node.addEventListener('touchend', e => {
        if (x0 === null) return;
        const x1 = e.changedTouches[0].clientX;
        const dx = x1 - x0;
        if (dx < -40 && idx < slides.length - 1) { idx++; rerender(); }
        else if (dx > 40 && idx > 0) { idx--; rerender(); }
        x0 = null;
      });
    }

    window.__slidePrev = () => { if (idx > 0) { idx--; rerender(); } };
    window.__slideNext = () => { if (idx < slides.length - 1) { idx++; rerender(); } };
    document.onkeydown = (e) => {
      if (e.key === 'ArrowLeft')  window.__slidePrev();
      if (e.key === 'ArrowRight') window.__slideNext();
    };
    // Initial render
    const frame = el('tb-content').querySelector('.slide-frame');
    if (frame) attachSwipe(frame);
  }

      // Find the subsection's chapter

          return '#/tips/sub/' + s.id + '/' + f.id;

  function doSearch(q) {
    const host = el('search-results');
    if (!host) return;
    if (!q || q.length < 2) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔎</div><strong>Type 2+ characters to search</strong><small>Multi-word query = AND match (all words must appear)</small></div>';
      return;
    }
    const terms = toTerms(q);
    const results = {
      education: [], notes: [], tips: [], textbook: [],
    };

    // Patient Ed
    for (const a of state.data.articles) {
      const hay = a.title + ' ' + (a.text || '') + ' ' + (a.keywords || []).join(' ');
      if (matchAllTerms(hay, terms)) {
        results.education.push({ id: a.id, title: a.title, preview: previewAround(a.text || '', terms), href: '#/education/a/' + a.id });
      }
    }
    // PPu Notes
    for (const s of state.notes.sections) {
      const flat = s.full_title + ' ' + (s.subsections || []).map(sub => sub.title + ' ' + (sub.items || []).join(' ')).join(' ');
      if (matchAllTerms(flat, terms)) {
        results.notes.push({ id: s.id, title: s.full_title, preview: previewAround(flat, terms), href: '#/notes/s/' + s.id });
      }
    }
    // Tips & Guide
    for (const chapter of state.tips.sections) {
      for (const sub of (chapter.subsections || [])) {
        const hay = sub.title + ' ' + (sub.markdown || '');
        if (matchAllTerms(hay, terms)) {
          results.tips.push({
            id: sub.id, title: chapter.number + '. ' + chapter.title + ' › ' + sub.title,
            preview: previewAround(sub.markdown || '', terms),
            href: '#/tips/sub/' + chapter.id + '/' + sub.id,
          });
        }
      }
    }
    // Textbook (loaded chapters only) — per-slide granularity + AND-term matching
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          let preview = '';
          let matchedSlideIdx = -1;
          let matched = false;

          // Topic-level text
          const topicHay = t.title + ' ' + (t.notes || '') + ' ' + (t.markdown_content || '');
          if (matchAllTerms(topicHay, terms)) {
            matched = true;
            preview = previewAround(topicHay, terms);
          }

          // Per-slide (find FIRST slide where ALL terms match)
          if (t.type !== 'text_only') {
            const visible = (t.slides || []).filter(s => !s.hidden);
            for (let si = 0; si < visible.length; si++) {
              const s = visible[si];
              const slideHay = (s.text || []).join(' ') + ' ' + (s.ocr_text || '');
              if (matchAllTerms(slideHay, terms)) {
                matched = true;
                if (matchedSlideIdx === -1) {
                  matchedSlideIdx = si;
                  preview = previewAround(slideHay, terms);
                }
              }
            }
          }

          if (matched) {
            let title = ch.number + '. ' + ch.title + ' › ' + t.title;
            if (matchedSlideIdx >= 0) {
              const s = (t.slides || []).filter(x => !x.hidden)[matchedSlideIdx];
              const slideTag = s && isHJHSlide(s) ? ' <span class="topic-badge hjh" style="font-size:10px;padding:1px 5px">HJH</span>' : '';
              title += ` — slide ${matchedSlideIdx + 1}${slideTag}`;
            }
            const params = [];
            if (matchedSlideIdx >= 0) params.push('slide=' + matchedSlideIdx);
            params.push('q=' + encodeURIComponent(q));
            const href = '#/textbook/t/' + tbId + '/' + t.id + '?' + params.join('&');
            results.textbook.push({ id: t.id + ':' + matchedSlideIdx, title, preview, href });
          }
        }
      }
    }

    const total = Object.values(results).reduce((a, r) => a + r.length, 0);
    if (total === 0) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔍</div><strong>No results</strong><small>for "' + esc(q) + '"</small></div>';
      return;
    }
    let html = '<div style="font-size:13px;color:var(--c-text-muted);margin:8px 0">' + total + ' result' + (total > 1 ? 's' : '') + ' for "' + esc(q) + '"</div>';
    for (const mod of MODULES) {
      const list = results[mod.id];
      if (!list.length) continue;
      html += `<div class="result-group-header" style="color:${mod.accent}">${mod.icon} ${esc(mod.name)} (${list.length})</div>`;
      html += list.slice(0, 20).map(r => `
        <a class="list-card" href="${r.href}" style="border-left:4px solid ${mod.accent}">
          <div style="flex:1;min-width:0">
            <div class="title">${highlightText(r.title, q)}</div>
            ${r.preview ? `<div class="meta" style="margin-top:4px">${r.preview}</div>` : ''}
          </div>
        </a>
      `).join('');
      if (list.length > 20) {
        html += `<div style="font-size:12px;color:var(--c-text-muted);text-align:center;padding:4px">…${list.length - 20} more in ${mod.name}</div>`;
      }
    }
    html += '<div style="font-size:11px;color:var(--c-text-muted);text-align:center;padding:12px">Tip: textbook search only covers loaded chapters. Open a chapter first to index it.</div>';
    host.innerHTML = html;
  }

    if (key === 'data')       { obj = state.data;  filename = 'data.json'; }

    else if (key === 'tips')  { obj = state.tips;  filename = 'tips-guide.json'; }
    else if (key.startsWith('tb_')) { obj = state.tb[key]; filename = key + '.json'; }
    if (!obj) return;
    const clone = JSON.parse(JSON.stringify(obj));
    delete clone._updated_at;
    const blob = new Blob([JSON.stringify(clone, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js?v=3').then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              el('update-banner').classList.remove('hidden');
            }
          });
        });
      }).catch(err => console.warn('SW registration failed', err));
    });
    let reloadingForUpdate = false;

      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      location.reload();
    });
  }
  el('btn-update-reload').addEventListener('click', () => {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      location.reload();
    });
  });

  /* ======================================================
     ?reset escape hatch
  ====================================================== */
  if (new URLSearchParams(location.search).has('reset')) {
    Promise.all([
      caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))),
      'serviceWorker' in navigator
        ? navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister())))
        : Promise.resolve(),
    ]).finally(() => {
      localStorage.clear();
      location.replace(location.pathname);
    });
  } else {
    gateCheck();
  }

  /* ======================================================
     Boot (after gate passed)
  ====================================================== */
  async function boot() {
    loadFavs();
    try {
      await loadCore();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Load failed</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
      return;
    }
    router();
  }

  </script>
</body>
</html>
