  window.__deleteTipsSub = async function(chapterId, subId) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return;
    const sub = chapter.subsections.find(x => x.id === subId);
    if (!sub) return;
    if (!await showConfirm('Delete "' + titlePlain(sub.title) + '"?', { danger: true, okLabel: 'Delete' })) return;
    deleteWithUndo('tips', 'Deleted: ' + titlePlain(sub.title), () => {
      chapter.subsections = chapter.subsections.filter(x => x.id !== subId);
    });
    navigate('#/tips/s/' + chapterId);
  };

  function renderTipsEdit(chapterId, subId, isNew, accent, insertAfterIdx) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) return renderNotFound();
    let sub;
    if (isNew) {
      sub = { id: 'tg_' + chapterId.replace('tg_', '') + '_' + Date.now(), title: '', markdown: '', _insertAfter: (insertAfterIdx !== undefined ? insertAfterIdx : -1) };
    } else {
      const orig = chapter.subsections.find(x => x.id === subId);
      if (!orig) return renderNotFound();
      sub = JSON.parse(JSON.stringify(orig));
    }
    const migrated = extractInlineImages(sub.markdown || '');
    const cleanMd = migrated.text;
    const allImgs = dedupImages((sub.images || []).concat(migrated.images));
    setHeader(isNew ? 'New subsection' : 'Edit', { label: isNew ? titlePlain(chapter.title) : titlePlain(sub.title || 'Subsection'), href: isNew ? ('#/tips/s/' + chapterId) : ('#/tips/sub/' + chapterId + '/' + sub.id) });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:19px;margin-bottom:12px">${isNew ? 'New in: ' + esc(chapter.title) : 'Edit: ' + esc(sub.title)}</h2>
        <div class="edit-field">
          <label>Subsection title</label>
          <input type="text" id="te-title" value="${escAttr(sub.title)}" placeholder="e.g. Stone 處置流程">
        </div>
        <div class="edit-field">
          <label>Markdown content</label>
          ${mdToolbarHTML()}
          <div class="md-tabs">
            <button class="active" onclick="window.__mdTab('edit')">Edit</button>
            <button onclick="window.__mdTab('preview')">Preview</button>
          </div>
          <div class="md-editor">
            <div class="md-pane" id="mdp-edit">
              <textarea id="te-md" oninput="window.__mdUpdate(); markEditorDirty();">${esc(cleanMd)}</textarea>
            </div>
            <div class="md-pane hidden" id="mdp-preview">
              <div class="md-preview markdown-body" id="te-preview"></div>
            </div>
          </div>
        </div>
        ${editorImageGalleryHTML()}
        <div class="action-bar action-bar-sticky">
          <button class="btn btn-secondary" onclick="window.__cancelEdit()">Cancel</button>
          <button class="btn btn-success" onclick="window.__saveFb(this, () => window.__saveTips('${esc(chapterId)}','${esc(sub.id)}',${isNew},${sub._insertAfter !== undefined ? sub._insertAfter : 'null'}))">Save</button>
        </div>
      </div>
    `;
    setEditorImages(allImgs);
    window.__mdUpdate();
  }

  window.__mdTab = function(which) {
    const ep = el('mdp-edit'), pp = el('mdp-preview');
    const btns = document.querySelectorAll('.md-tabs button');
    if (which === 'edit') {
      ep.classList.remove('hidden'); pp.classList.add('hidden');
      btns[0].classList.add('active'); btns[1].classList.remove('active');
    } else {
      ep.classList.add('hidden'); pp.classList.remove('hidden');
      btns[0].classList.remove('active'); btns[1].classList.add('active');
      window.__mdUpdate();
    }
  };
  window.__mdUpdate = function() {
    // Debounce preview re-render: 300ms after last keystroke. Prevents iOS
    // hang on content with embedded base64 images (each keystroke would
    // otherwise re-parse + re-innerHTML a 500KB+ data URL).
    clearTimeout(window.__mdUpdate._timer);
    window.__mdUpdate._timer = setTimeout(() => {
      const ta = el('te-md');
      const pv = el('te-preview');
      if (!ta || !pv) return;
      // Strip base64 data URLs from PREVIEW rendering — huge strings in
      // innerHTML are what actually causes the hang. View mode (post-save)
      // still renders images fully. Preview shows placeholder.
      const mdLight = ta.value.replace(
        /!\[([^\]]*)\]\(data:[^)]+\)/g,
        '**[📷 $1]** *(image attached)*'
      );
      pv.innerHTML = renderMd(mdLight);
    }, 300);
  };

  window.__saveTips = function(chapterId, subId, isNew, insertAfter) {
    const chapter = state.tips.sections.find(s => s.id === chapterId);
    if (!chapter) { showToast('Chapter not found', 'error'); return false; }
    const title = el('te-title').value.trim();
    const md = el('te-md').value;
    const images = getEditorImages();
    if (!title) { showToast('Title required', 'error'); return false; }
    const snapshot = JSON.parse(JSON.stringify(state.tips));
    try {
      if (isNew) {
        const newSub = { id: subId, title, markdown: md, images };
        if (insertAfter !== null && insertAfter !== undefined && insertAfter >= 0 && insertAfter < chapter.subsections.length) {
          chapter.subsections.splice(insertAfter + 1, 0, newSub);
        } else {
          chapter.subsections.push(newSub);
        }
      } else {
        const s = chapter.subsections.find(x => x.id === subId);
        if (!s) { showToast('Not found', 'error'); return false; }
        s.title = title;
        s.markdown = md;
        s.images = images;
      }
      state.tips.total_subsections = state.tips.sections.reduce((a, s) => a + s.subsections.length, 0);
      markDirty('tips');
    } catch (e) {
      state.tips = snapshot;
      throw e;
    }
    clearEditorDirty();
    showToast('Saved locally ✓', 'success');
    navigate('#/tips/sub/' + chapterId + '/' + subId);
    return true;
  };

  /* ======================================================
     Textbook
  ====================================================== */
  const TB_CHAPTER_IDS = ['tb_01','tb_02','tb_03','tb_04','tb_05','tb_06','tb_07','tb_08','tb_09','tb_10','tb_11','tb_12'];

  async function routeTextbook(parts, query) {
    const accent = '#8e44ad';
    query = query || {};
    if (!parts.length) return renderTextbookHome(accent);
    if (parts[0] === 'c' && parts[1]) {
      await loadChapter(parts[1]);
      if (parts[2] === 's' && parts[3]) return renderTbSection(parts[1], parseInt(parts[3]), accent);
      return renderTbChapter(parts[1], accent);
    }
    if (parts[0] === 't' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      const opts = {
        slideIdx: query.slide !== undefined ? parseInt(query.slide) : 0,
        highlight: query.q || '',
      };
      return renderTbTopic(parts[1], parts[2], accent, opts);
    }
    if (parts[0] === 'edit-notes' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      return renderTbTopicNotesEdit(parts[1], parts[2], accent);
    }
    if (parts[0] === 'edit-ocr' && parts[1] && parts[2] && parts[3] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbOCREdit(parts[1], parts[2], parseInt(parts[3]), accent);
    }
    if (parts[0] === 'new-text' && parts[1] && parts[2] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbNewTextTopic(parts[1], parseInt(parts[2]), accent);
    }
    if (parts[0] === 'edit-text' && parts[1] && parts[2]) {
      await loadChapter(parts[1]);
      return renderTbEditTextTopic(parts[1], parts[2], accent);
    }
    if (parts[0] === 'move' && parts[1] && parts[2] && parts[3] !== undefined) {
      await loadChapter(parts[1]);
      return renderTbMoveSlide(parts[1], parts[2], parseInt(parts[3]), accent);
    }
    renderNotFound();
  }

  function renderTextbookHome(accent) {
    setHeader('Textbook Knowledge', { label: 'Home', href: '#/' });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div class="home-grid" id="tb-grid">
          ${TB_CHAPTER_IDS.map(id => `
            <a class="module-card" style="--accent:${accent}" href="#/textbook/c/${esc(id)}">
              <div class="icon">${TB_CHAPTER_ICONS[id] || ''}</div>
              <div>
                <div class="name" id="tb-name-${esc(id)}">${esc(id)}</div>
                <div class="count" id="tb-count-${esc(id)}">loading…</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `;
    // Lazy-resolve chapter titles
    TB_CHAPTER_IDS.forEach(id => {
      loadChapter(id).then(ch => {
        const nm = el('tb-name-' + id);
        const ct = el('tb-count-' + id);
        if (nm) nm.textContent = ch.title;
        if (ct) {
          const topics = (ch.sections || []).reduce((a, s) => a + (s.topics ? s.topics.length : 0), 0);
          ct.textContent = (ch.sections ? ch.sections.length : 0) + ' sections · ' + topics + ' topics';
        }
      }).catch(() => {
        const ct = el('tb-count-' + id);
        if (ct) ct.textContent = '(load failed)';
      });
    });
  }

  function renderTbChapter(tbId, accent) {
    const ch = state.tb[tbId];
    if (!ch) return renderNotFound();
    // Single-section shortcut: skip the (redundant) section list and render topics directly.
    // Saves a tap for chapters that only have one section anyway.
    if ((ch.sections || []).length === 1) {
      return renderTbSection(tbId, 0, accent);
    }
    setHeader(ch.title, { label: 'Textbook', href: '#/textbook' });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:21px;margin-bottom:12px;display:flex;align-items:center;gap:10px"><span style="color:var(--accent)">${TB_CHAPTER_ICONS[tbId] || ''}</span><span>${esc(ch.number)}. ${esc(ch.title)}</span></h2>
        <div class="list-section">
          ${(ch.sections || []).map((s, i) => `
            <a class="list-card" href="#/textbook/c/${esc(tbId)}/s/${i}">
              <div style="flex:1;min-width:0">
                <div class="title">${esc(s.title)}</div>
                <div class="meta">${(s.topics || []).length} topics · ${s.total_slides || '?'} slides</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderTbSection(tbId, secIdx, accent) {
    const ch = state.tb[tbId];
    const sec = ch && ch.sections && ch.sections[secIdx];
    if (!sec) return renderNotFound();
    // Single-section chapter: parent-link bypasses the (skipped) section list and goes back to the chapter list.
    // Multi-section chapter: parent-link goes to the chapter view's section list.
    const isOnlySection = (ch.sections || []).length === 1;
    const backHref = isOnlySection ? '#/textbook' : '#/textbook/c/' + tbId;
    const backLabel = isOnlySection ? 'Textbook' : ch.title;
    setHeader(sec.title, { label: backLabel, href: backHref });
    const admin = isAdmin();
    const dirty = state.sources.tb[tbId] === 'local';
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:20px;margin-bottom:4px">${esc(sec.title)}</h2>
        ${dirty ? '<div style="color:var(--c-warning);font-size:12px;margin-bottom:8px">⚠ Local changes (unsynced)</div>' : ''}
        <div style="color:var(--c-text-muted);font-size:13px;margin-bottom:12px">${(sec.topics || []).length} topics · from ${esc(sec.source_file || '')}</div>
        <div class="list-section">
          ${(sec.topics || []).map(t => topicListCard(tbId, t, accent)).join('')}
        </div>
        ${admin ? `
          <div class="action-bar">
            <button class="btn btn-success btn-block" onclick="location.hash='#/textbook/new-text/${esc(tbId)}/${secIdx}'">+ New text-only topic in this section</button>
          </div>
        ` : ''}
      </div>
    `;
    bindFavButtons();
  }

  function topicListCard(tbId, t, accent) {
    const fav = isFav('textbook', t.id);
    const isText = t.type === 'text_only';
    const badges = [];
    if (t.has_exam_questions) badges.push('<span class="topic-badge exam">EXAM</span>');
    if (t.has_hjh_content) badges.push('<span class="topic-badge hjh">HJH</span>');
    if (isText) badges.push('<span class="topic-badge text-only">TEXT</span>');
    let meta;
    if (isText) {
      meta = (t.markdown_content || '').length + ' chars';
    } else {
      const all = t.slides || [];
      const hiddenCount = all.filter(s => s.hidden).length;
      meta = all.length + ' slides' + (hiddenCount ? ` · ${hiddenCount}📎 補充` : '');
    }
    const cardClass = t.has_hjh_content ? 'list-card hjh' : 'list-card';

    // Mini thumbnail from first non-hidden slide (fallback to first of any)
    const all = t.slides || [];
    const firstSlide = all.find(s => !s.hidden) || all[0];
    const thumbHTML = (!isText && firstSlide && firstSlide.slide_image)
      ? `<img class="topic-thumb" src="${escAttr(firstSlide.slide_image)}" alt="" loading="lazy">`
      : (isText ? '<div class="topic-thumb" style="display:flex;align-items:center;justify-content:center;color:var(--accent)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 3.5h7L19 8v12a1.5 1.5 0 0 1-1.5 1.5h-10A1.5 1.5 0 0 1 6 20V5A1.5 1.5 0 0 1 7 3.5z"/><path d="M14 3.5V7A1.5 1.5 0 0 0 15.5 8.5H19"/><line x1="9" y1="13" x2="16" y2="13"/><line x1="9" y1="16" x2="14" y2="16"/></svg></div>' : '');

    return `
      <a class="${cardClass}" href="#/textbook/t/${esc(tbId)}/${esc(t.id)}">
        ${thumbHTML}
        <div style="flex:1;min-width:0">
          <div class="title" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${esc(t.title)}${badges.join('')}</div>
          <div class="meta">${meta}</div>
        </div>
        <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(t.id)}" data-fav-title="${escAttr(t.title)}">${fav ? '⭐' : '☆'}</button>
        <span class="chevron">›</span>
      </a>`;
  }

  function findTopic(tbId, topicId) {
    const ch = state.tb[tbId];
    if (!ch) return null;
    for (let si = 0; si < (ch.sections || []).length; si++) {
      const sec = ch.sections[si];
      const ti = (sec.topics || []).findIndex(t => t.id === topicId);
      if (ti >= 0) return { ch, sec, secIdx: si, topic: sec.topics[ti], topicIdx: ti };
    }
    return null;
  }

  function renderTbTopic(tbId, topicId, accent, opts) {
    opts = opts || {};
    const initialSlideIdx = Math.max(0, opts.slideIdx || 0);
    const highlight = opts.highlight || '';
    const found = findTopic(tbId, topicId);
    if (!found) return renderNotFound();
    const { ch, sec, secIdx, topic } = found;
    setHeader(topic.title, { label: sec.title, href: '#/textbook/c/' + tbId + '/s/' + secIdx });
    const fav = isFav('textbook', topicId);
    const admin = isAdmin();

    let content = '';
    // All slides visible (including PPT-hidden, badged as supplementary)
    const visibleSlides = (topic.slides || []);
    if (topic.type === 'text_only') {
      const md = topic.markdown_content || '';
      let rendered = renderMd(md);
      if (highlight) {
        // Naive highlight inside rendered HTML — wrap text matches
        const safe = highlight.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        rendered = rendered.replace(new RegExp('(?![^<]*>)(' + safe + ')', 'gi'), '<mark class="highlight">$1</mark>');
      }
      content = `<div class="markdown-body">${rendered}</div>` + renderAttachments(topic.images);
    } else {
      if (!visibleSlides.length) {
        content = '<div class="placeholder"><div class="big">📄</div><strong>No visible slides</strong></div>';
      } else {
        const startIdx = Math.min(initialSlideIdx, visibleSlides.length - 1);
        content = renderSlideViewerHTML(tbId, topicId, visibleSlides, startIdx, highlight);
      }
    }

    const badges = [];
    if (topic.has_exam_questions) badges.push('<span class="topic-badge exam">📝 Exam</span>');
    if (topic.has_hjh_content)    badges.push('<span class="topic-badge hjh">HJH</span>');
    if (topic.type === 'text_only') badges.push('<span class="topic-badge text-only">📄 Text</span>');

    // HJH slide summary for quick navigation
    const hjhLabels = hjhSlideLabels(visibleSlides);
    const hjhSummary = hjhLabels.length ? `
      <details class="hjh-summary" style="margin-bottom:10px">
        <summary style="padding:8px 12px;background:var(--c-hjh-bg-start);border:1px solid var(--c-hjh-border);border-radius:var(--radius-sm);font-size:13px;color:var(--c-hjh-fg);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between">
          <span><strong>${hjhLabels.length} HJH slide${hjhLabels.length > 1 ? 's' : ''}</strong> in this topic</span>
          <span style="font-size:11px;opacity:.7">tap to show ▸</span>
        </summary>
        <div style="padding:8px 4px;display:flex;flex-wrap:wrap;gap:6px">
          ${visibleSlides.map((s, i) => isHJHSlide(s) ? `<a href="#/textbook/t/${esc(tbId)}/${esc(topicId)}?slide=${i}" style="padding:4px 10px;background:var(--c-hjh-bg-end);color:var(--c-hjh-fg);border-radius:8px;font-weight:700;text-decoration:none;font-size:12px">${esc(String(s.slide_num))}</a>` : '').join('')}
        </div>
      </details>
    ` : '';

    const notesHTML = (topic.notes || (topic.images && topic.images.length && topic.type !== 'text_only')) ? `
      <div class="topic-notes">
        <div class="notes-label">📝 Notes</div>
        ${topic.notes ? `<div class="markdown-body">${renderMd(topic.notes)}</div>` : ''}
        ${topic.type !== 'text_only' ? renderAttachments(topic.images) : ''}
      </div>
    ` : '';

    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <div class="topic-header">
          <div class="title">${esc(topic.title)}</div>
          <div class="badges">${badges.join('')}</div>
          <button class="fav-btn ${fav ? 'active' : ''}" data-fav-module="textbook" data-fav-id="${esc(topicId)}" data-fav-title="${escAttr(topic.title)}" style="font-size:22px">${fav ? '⭐' : '☆'}</button>
        </div>
        ${notesHTML}
        ${hjhSummary}
        <div id="tb-content">${content}</div>
        ${admin ? `
          <div class="action-bar">
            ${topic.type === 'text_only'
              ? `<button class="btn btn-primary" onclick="location.hash='#/textbook/edit-text/${esc(tbId)}/${esc(topicId)}'">Edit content</button>`
              : `<button class="btn btn-secondary" onclick="window.__ocrEditPrompt('${esc(tbId)}','${esc(topicId)}')">Edit OCR</button>`
            }
            <button class="btn btn-primary" onclick="location.hash='#/textbook/edit-notes/${esc(tbId)}/${esc(topicId)}'">Edit notes</button>
            <button class="btn btn-danger" onclick="window.__deleteTopic('${esc(tbId)}','${esc(topicId)}')">Delete topic</button>
          </div>
        ` : ''}
      </div>
    `;

    if (topic.type !== 'text_only') bindSlideViewer(tbId, topicId, initialSlideIdx, highlight);
    bindFavButtons();
  }

  window.__deleteTopic = async function(tbId, topicId) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    if (!await showConfirm('Delete topic "' + found.topic.title + '"?', { danger: true, okLabel: 'Delete' })) return;
    deleteWithUndo(tbId, 'Deleted: ' + found.topic.title, () => {
      found.sec.topics = found.sec.topics.filter(t => t.id !== topicId);
    });
    navigate('#/textbook/c/' + tbId + '/s/' + found.secIdx);
  };

  window.__ocrEditPrompt = function(tbId, topicId) {
    // Show a simple slide picker overlay: for now, navigate to slide 0 editor
    const found = findTopic(tbId, topicId);
    if (!found) return;
    const slides = (found.topic.slides || []).filter(s => !s.hidden);
    if (!slides.length) return;
    // Pick currently-viewing slide from DOM
    const cur = parseInt(el('tb-slide-index') ? el('tb-slide-index').textContent : 1) - 1;
    const idx = Math.max(0, Math.min(slides.length - 1, cur));
    navigate('#/textbook/edit-ocr/' + tbId + '/' + topicId + '/' + idx);
  };

  function renderSlideViewerHTML(tbId, topicId, slides, idx, highlight) {
    const s = slides[idx];
    highlight = highlight || '';
    const textLines = (s.text || []).map(t => highlight ? highlightText(t, highlight) : esc(t)).join('</li><li>');
    const ocrFull = s.ocr_text ? (highlight ? highlightText(s.ocr_text, highlight) : esc(s.ocr_text)) : '';
    const isHJH = isHJHSlide(s);
    const isExam = !!s.has_exam_question;
    const isHidden = !!s.hidden;
    const admin = isAdmin();
    return `
      <div class="slide-viewer" ${isHJH ? 'style="box-shadow:0 0 0 3px var(--c-hjh-accent)"' : ''}>
        <div class="slide-frame" style="position:relative${isHidden ? ';opacity:.82' : ''}">
          <div style="position:absolute;top:8px;left:8px;z-index:2;display:flex;gap:4px;flex-wrap:wrap">
            ${isHJH  ? '<span class="topic-badge hjh"  style="font-size:12px;padding:3px 10px">HJH</span>' : ''}
            ${isExam ? '<span class="topic-badge exam" style="font-size:12px;padding:3px 10px">📝 Exam</span>' : ''}
            ${isHidden ? '<span class="topic-badge" style="font-size:11px;padding:3px 10px;background:rgba(44,62,80,.75);color:#fff">📎 補充 (PPT-hidden)</span>' : ''}
          </div>
          <img src="${escAttr(s.slide_image || '')}" alt="slide ${esc(String(s.slide_num))}" loading="eager" onclick="window.__openLightbox(this.src, 'Slide ${esc(String(s.slide_num))} · ${idx + 1}/${slides.length}')">
        </div>
        ${isHidden ? '<div style="font-size:11px;color:var(--c-text-muted);padding:6px 10px;background:var(--c-surface-alt);border-radius:var(--radius-sm);margin-top:6px;line-height:1.5">📎 這張是原 PPT 隱藏投影片（授課時略過）。內容仍是有效知識，重要性可能較低、屬補充資料。</div>' : ''}
        <div class="slide-controls">
          <button onclick="window.__slidePrev()" ${idx === 0 ? 'disabled' : ''}>← Prev</button>
          <div class="slide-counter">
            <span id="tb-slide-index">${idx + 1}</span> / ${slides.length}
            · <span style="color:${isHJH ? 'var(--c-hjh-fg)' : 'var(--c-text-muted)'};font-weight:${isHJH ? '700' : 'normal'}">#${esc(String(s.slide_num))}</span>
          </div>
          <button onclick="window.__slideNext()" ${idx === slides.length - 1 ? 'disabled' : ''}>Next →</button>
        </div>
        ${admin ? `
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <button class="btn btn-primary" style="flex:1 1 180px;min-height:unset;padding:8px 12px;font-size:13px" onclick="location.hash='#/textbook/move/${esc(tbId)}/${esc(topicId)}/${idx}'">📂 Move to another topic…</button>
            <button class="btn btn-secondary" style="min-height:unset;padding:8px 12px;font-size:13px" onclick="window.__toggleSlideExam('${esc(tbId)}','${esc(topicId)}',${idx})">${isExam ? 'Unmark exam' : 'Mark as exam'}</button>
            <button class="btn btn-ghost" style="min-height:unset;padding:8px 12px;font-size:13px" onclick="window.__toggleSlideHidden('${esc(tbId)}','${esc(topicId)}',${idx})">${isHidden ? '∅ Unmark supplementary' : '📎 Mark supplementary'}</button>
          </div>
        ` : ''}
        ${(s.text && s.text.length) ? `
          <div class="slide-ocr" ${isHJH ? 'style="background:var(--c-hjh-card-bg);border-color:var(--c-hjh-border)"' : ''}>
            <div class="ocr-label">${isHJH ? 'HJH · ' : ''}${isExam ? 'Exam · ' : ''}Captions</div>
            <ul><li>${textLines}</li></ul>
          </div>
        ` : ''}
        ${ocrFull ? `
          <details class="slide-ocr" style="margin-top:8px" ${highlight ? 'open' : ''}>
            <summary class="ocr-label" style="cursor:pointer">Raw OCR (full)${highlight ? ' — matches below' : ''}</summary>
            <div style="white-space:pre-wrap;margin-top:6px;font-size:13px;color:var(--c-text-muted)">${ocrFull}</div>
          </details>
        ` : ''}
      </div>
    `;
  }

  function bindSlideViewer(tbId, topicId, initialIdx, highlight) {
    const found = findTopic(tbId, topicId);
    if (!found) return;
    // All slides visible to everyone; hidden=true slides get a "補充 · PPT-hidden"
    // visual badge so readers know they were skipped in original lecture but still
    // contain knowledge. Filter removed per user policy: knowledge should be
    // accessible, not suppressed.
    const slides = (found.topic.slides || []);
    let idx = Math.max(0, Math.min(initialIdx || 0, slides.length - 1));
    highlight = highlight || '';

    function rerender() {
      el('tb-content').innerHTML = renderSlideViewerHTML(tbId, topicId, slides, idx, highlight);
      // Swipe gesture
      const frame = el('tb-content').querySelector('.slide-frame');
      if (frame) attachSwipe(frame);
    }

    function attachSwipe(node) {
      let x0 = null;
      node.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; });
      node.addEventListener('touchend', e => {
        if (x0 === null) return;
        const x1 = e.changedTouches[0].clientX;
        const dx = x1 - x0;
        if (dx < -40 && idx < slides.length - 1) { idx++; rerender(); }
        else if (dx > 40 && idx > 0) { idx--; rerender(); }
        x0 = null;
      });
    }

    window.__slidePrev = () => { if (idx > 0) { idx--; rerender(); } };
    window.__slideNext = () => { if (idx < slides.length - 1) { idx++; rerender(); } };
    // v3.7.1: use addEventListener + hashchange cleanup instead of onkeydown=
    // assignment (which would wipe other handlers). Listener removes itself
    // when user leaves the slide viewer.
    const slideKeyHandler = (e) => {
      if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
      if (e.key === 'ArrowLeft')  window.__slidePrev();
      else if (e.key === 'ArrowRight') window.__slideNext();
    };
    document.addEventListener('keydown', slideKeyHandler);
    const cleanupKeys = () => {
      document.removeEventListener('keydown', slideKeyHandler);
      window.removeEventListener('hashchange', cleanupKeys);
    };
    window.addEventListener('hashchange', cleanupKeys);
    // Initial render
    const frame = el('tb-content').querySelector('.slide-frame');
    if (frame) attachSwipe(frame);
  }

  function renderTbTopicNotesEdit(tbId, topicId, accent) {
    const found = findTopic(tbId, topicId);
    if (!found) return renderNotFound();
    const { topic } = found;
    const migrated = extractInlineImages(topic.notes || '');
    const cleanNotes = migrated.text;
    const allImgs = dedupImages((topic.images || []).concat(migrated.images));
    setHeader('Edit notes', { label: topic.title, href: '#/textbook/t/' + tbId + '/' + topicId });
    viewEl().innerHTML = `
      <div class="module-view" style="--module-accent:${accent}">
        <div class="module-header-strip" style="--accent:${accent}"></div>
        <h2 style="font-size:19px;margin-bottom:12px">Topic notes · ${esc(topic.title)}</h2>
        <div class="edit-field">
          <label>Notes (Markdown; rendered above primary content)</label>
          ${mdToolbarHTML()}
          <div class="md-tabs">
            <button class="active" onclick="window.__mdTab('edit')">Edit</button>
            <button onclick="window.__mdTab('preview')">Preview</button>
          </div>

            </div>

    const src = findTopic(tbId, topicId);

    if (!src || !target) return showToast('Topic not found', 'error');

  function favHref(f) {
    if (f.module === 'education') return '#/education/a/' + f.id;
    if (f.module === 'notes')     return '#/notes/s/' + f.id;
    if (f.module === 'tips')      {
      for (const s of state.tips.sections) {
        if (s.subsections && s.subsections.some(x => x.id === f.id)) {
          return '#/tips/sub/' + s.id + '/' + f.id;
        }
      }
      return '#/tips';
    }
    if (f.module === 'textbook') {
      // Check cached tbChapter to find topic's chapter (if already loaded)
      for (const tbId of TB_CHAPTER_IDS) {
        if (state.tb[tbId]) {
          const found = findTopic(tbId, f.id);
          if (found) return '#/textbook/t/' + tbId + '/' + f.id;
        }
      }
      // Not loaded yet — delegate to async resolver via javascript: href
      return 'javascript:window.__openFavTextbook(\'' + encodeURIComponent(f.id) + '\')';
    }
    return '#/';
  }

  function renderSearch(q, onlyModule) {
    setHeader('Search', { label: 'Home', href: '#/' });
    const only = onlyModule || '';
    const filterChips = MODULES.map(m => `
      <button class="search-filter-chip ${only === m.id ? 'active' : ''}" style="--chip-accent:${m.accent}" onclick="window.__setSearchFilter('${m.id}')">
        ${m.icon} ${esc(m.name)}
      </button>
    `).join('') + `
      <button class="search-filter-chip ${!only ? 'active' : ''}" style="--chip-accent:var(--c-header)" onclick="window.__setSearchFilter('')">All</button>
    `;

    const unloadedChapters = TB_CHAPTER_IDS.filter(tbId => !state.tb[tbId]);
    const loadAllBar = unloadedChapters.length ? `
      <div style="margin:8px 0;padding:10px 12px;background:var(--c-surface-alt);border:1px solid var(--c-border);border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between">
        <span style="color:var(--c-text-muted)">📦 Textbook: ${TB_CHAPTER_IDS.length - unloadedChapters.length}/${TB_CHAPTER_IDS.length} chapters indexed. Load rest to search all.</span>
        <button class="btn btn-secondary" style="min-height:unset;padding:6px 10px;font-size:12px" onclick="window.__loadAllChapters()">Load all</button>
      </div>
    ` : '';

    viewEl().innerHTML = `
      <div class="search-bar-wrap">
        <input class="search-bar" id="search-input" value="${escAttr(q)}" placeholder="Search all modules… (multi-word = AND)" autocomplete="off" autofocus>
        <button class="search-clear" id="search-clear" type="button" aria-label="Clear search"${q ? '' : ' hidden'}>×</button>
      </div>
      <div class="search-filters">${filterChips}</div>
      ${loadAllBar}
      <div id="search-results"></div>
    `;
    const input = el('search-input');
    const clearBtn = el('search-clear');
    let searchTimer = null;
    const syncQueryAndSearch = (v) => {
      const params = [];
      if (v) params.push('q=' + encodeURIComponent(v));
      if (only) params.push('only=' + only);
      const hash = '#/search' + (params.length ? '?' + params.join('&') : '');
      // Use history.replaceState (does NOT fire hashchange) instead of
      // location.replace (fires hashchange → router → renderSearch → input
      // DOM replaced → focus lost mid-typing). doSearch re-renders only
      // #search-results so the input element stays intact.
      if (location.hash !== hash) {
        history.replaceState(null, '', (location.pathname + location.search + hash));
      }
      doSearch(v, only);
    };
    input.addEventListener('input', () => {
      clearBtn.hidden = !input.value;
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => syncQueryAndSearch(input.value.trim()), 220);
    });
    // Escape key — desktop convention
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        input.value = '';
        clearBtn.hidden = true;
        clearTimeout(searchTimer);
        syncQueryAndSearch('');
      }
    });
    // X button — iOS-style instant clear
    clearBtn.addEventListener('click', () => {
      input.value = '';
      clearBtn.hidden = true;
      clearTimeout(searchTimer);
      syncQueryAndSearch('');
      input.focus();
    });
    doSearch(q, only);
  }

  window.__setSearchFilter = function(moduleId) {
    const qs = new URLSearchParams();
    const cur = new URLSearchParams(location.hash.split('?')[1] || '');
    if (cur.get('q')) qs.set('q', cur.get('q'));
    if (moduleId) qs.set('only', moduleId);
    const suffix = qs.toString();
    location.hash = '#/search' + (suffix ? '?' + suffix : '');
  };

  window.__loadAllChapters = async function() {
    showToast('Loading all chapters…');
    let count = 0;
    for (const tbId of TB_CHAPTER_IDS) {

    showToast('Loaded ' + count + ' chapters', 'success');

  function doSearch(q, onlyModule) {
    const host = el('search-results');
    if (!host) return;
    const only = onlyModule || '';
    if (!q || q.length < 2) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔎</div><strong>Type 2+ characters to search</strong><small>Multi-word query = AND match (all words must appear)</small></div>';
      return;
    }
    const terms = toTerms(q);
    const results = {
      education: [], notes: [], tips: [], textbook: [],
    };

    // Patient Ed — carry query into article page so highlights persist
    // Strip data URLs (from embedded images) from search haystack so base64
    // doesn't pollute matches or preview snippets.
    const stripDataUrls = (s) => (s || '').replace(/!\[[^\]]*\]\(data:[^)]+\)/g, '[image]');
    for (const a of state.data.articles) {
      const textForSearch = stripDataUrls(a.text);
      const hay = a.title + ' ' + textForSearch + ' ' + (a.keywords || []).join(' ');
      if (matchAllTerms(hay, terms)) {
        results.education.push({
          id: a.id,
          title: a.title,
          preview: previewAround(textForSearch, terms),
          href: '#/education/a/' + a.id + '?q=' + encodeURIComponent(q),
        });
      }
    }
    // PPu Notes
    for (const s of state.notes.sections) {
      const notesForSearch = stripDataUrls(s.notes);
      const flat = s.full_title + ' ' + (s.subsections || []).map(sub => sub.title + ' ' + (sub.items || []).join(' ')).join(' ') + ' ' + notesForSearch;
      if (matchAllTerms(flat, terms)) {
        results.notes.push({ id: s.id, title: s.full_title, preview: previewAround(flat, terms), href: '#/notes/s/' + s.id });
      }
    }
    // Tips & Guide
    for (const chapter of state.tips.sections) {
      for (const sub of (chapter.subsections || [])) {
        const subMdForSearch = stripDataUrls(sub.markdown);
        const hay = sub.title + ' ' + subMdForSearch;
        if (matchAllTerms(hay, terms)) {
          results.tips.push({
            id: sub.id, title: chapter.number + '. ' + titlePlain(chapter.title) + ' › ' + titlePlain(sub.title),
            preview: previewAround(subMdForSearch, terms),
            href: '#/tips/sub/' + chapter.id + '/' + sub.id,
          });
        }
      }
    }
    // Textbook (loaded chapters only) — per-slide granularity.
    // 2026-05-07 fix: previously collapsed multiple matching slides in the same
    // topic into ONE result (using the first match only). Now pushes one result
    // PER matching slide so users see all hit locations. Topic-level match
    // (title/notes/markdown only, no slide hits) still pushes a single result.
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          let slideMatchCount = 0;

          if (t.type !== 'text_only') {
            const slidesAll = t.slides || [];
            for (let si = 0; si < slidesAll.length; si++) {
              const s = slidesAll[si];
              const slideHay = (s.text || []).join(' ') + ' ' + (s.ocr_text || '');
              if (!matchAllTerms(slideHay, terms)) continue;
              slideMatchCount++;
              const hjhTag = isHJHSlide(s) ? ' <span class="topic-badge hjh" style="font-size:10px;padding:1px 5px">HJH</span>' : '';
              const hidTag = s.hidden ? ' <span class="topic-badge" style="font-size:10px;padding:1px 5px;background:rgba(44,62,80,.6);color:#fff">📎 補充</span>' : '';
              const title = ch.number + '. ' + ch.title + ' › ' + t.title + ` — slide ${si + 1}${hjhTag}${hidTag}`;
              const preview = previewAround(slideHay, terms);
              const href = '#/textbook/t/' + esc(tbId) + '/' + esc(t.id) + '?slide=' + si + '&q=' + encodeURIComponent(q);
              results.textbook.push({ id: t.id + ':' + si, title, preview, href });
            }
          }

          // Topic-level match (title/notes/markdown_content). Push ONE result
          // only if no slide-level matches were already pushed (avoid duplication).
          if (slideMatchCount === 0) {
            const topicHay = t.title + ' ' + stripDataUrls(t.notes) + ' ' + stripDataUrls(t.markdown_content);
            if (matchAllTerms(topicHay, terms)) {
              const title = ch.number + '. ' + ch.title + ' › ' + t.title;
              const preview = previewAround(topicHay, terms);
              const href = '#/textbook/t/' + esc(tbId) + '/' + esc(t.id) + '?q=' + encodeURIComponent(q);
              results.textbook.push({ id: t.id + ':topic', title, preview, href });
            }
          }
        }
      }
    }

    // Apply module filter
    let visibleModules = MODULES;
    if (only) visibleModules = MODULES.filter(m => m.id === only);
    const visibleIds = visibleModules.map(m => m.id);

    const total = visibleIds.reduce((a, id) => a + results[id].length, 0);
    if (total === 0) {
      host.innerHTML = '<div class="placeholder"><div class="big">🔍</div><strong>No results' + (only ? ' in ' + esc(only) : '') + '</strong><small>for "' + esc(q) + '"</small></div>';
      return;
    }
    let html = '<div style="font-size:13px;color:var(--c-text-muted);margin:8px 0">' + total + ' result' + (total > 1 ? 's' : '') + ' for "' + esc(q) + '"' + (only ? ' in ' + esc(only) : '') + '</div>';
    for (const mod of visibleModules) {
      const list = results[mod.id];
      if (!list.length) continue;
      html += `<div class="result-group-header" style="color:${mod.accent}">${mod.icon} ${esc(mod.name)} (${list.length})</div>`;
      html += list.slice(0, 20).map(r => `
        <a class="list-card" href="${r.href}" style="border-left:4px solid ${mod.accent}">
          <div style="flex:1;min-width:0">
            <div class="title">${highlightText(r.title, q)}</div>
            ${r.preview ? `<div class="meta" style="margin-top:4px">${r.preview}</div>` : ''}
          </div>
        </a>
      `).join('');
      if (list.length > 20) {
        html += `<div style="font-size:12px;color:var(--c-text-muted);text-align:center;padding:4px">…${list.length - 20} more in ${mod.name}</div>`;
      }
    }
    html += '<div style="font-size:11px;color:var(--c-text-muted);text-align:center;padding:12px">Tip: textbook search only covers loaded chapters. Open a chapter first to index it.</div>';
    host.innerHTML = html;
  }

  /* ======================================================
     HJH browse (cross-chapter)
  ====================================================== */
  function renderHJHBrowse() {
    setHeader('💡 HJH · all chapters', { label: 'Home', href: '#/' });
    const unloaded = TB_CHAPTER_IDS.filter(tbId => !state.tb[tbId]);
    const rows = [];
    for (const tbId of Object.keys(state.tb)) {
      const ch = state.tb[tbId];
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          if (t.type === 'text_only') continue;
          const visible = (t.slides || []).filter(s => !s.hidden);
          for (let si = 0; si < visible.length; si++) {
            const s = visible[si];
            if (isHJHSlide(s)) {
              rows.push({
                tbId, ch, topic: t, slide: s, slideIdx: si,
                title: ch.icon + ' ' + ch.title + ' › ' + t.title,
                label: String(s.slide_num),
              });
            }
          }
        }
      }
    }
    rows.sort((a, b) => {
      if (a.tbId !== b.tbId) return a.tbId < b.tbId ? -1 : 1;
      return a.label.localeCompare(b.label);
    });
    viewEl().innerHTML = `
      <div style="padding:12px;background:linear-gradient(135deg,var(--c-hjh-bg-start),var(--c-hjh-bg-end));border-radius:var(--radius);margin-bottom:12px">

        <div style="font-size:13px;color:var(--c-hjh-fg);opacity:.85">${rows.length} HJH slide${rows.length===1?'':'s'} from ${Object.keys(state.tb).length}/${TB_CHAPTER_IDS.length} loaded chapter${Object.keys(state.tb).length===1?'':'s'}</div>
      </div>
      ${unloaded.length ? `
        <div style="margin-bottom:12px;padding:10px 12px;background:var(--c-surface-alt);border:1px solid var(--c-border);border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:center;gap:8px;justify-content:space-between">
          <span style="color:var(--c-text-muted)">${unloaded.length} chapter${unloaded.length===1?'':'s'} not yet loaded — HJH slides there won't appear</span>
          <button class="btn btn-secondary" style="min-height:unset;padding:6px 10px;font-size:12px" onclick="window.__loadAllChapters()">Load all</button>
        </div>
      ` : ''}
      ${rows.length === 0 ? '<div class="placeholder"><div class="big">💡</div><strong>No HJH slides yet</strong><small>Load chapters first (try Load all)</small></div>' : `
        <div class="list-section">
          ${rows.map(r => `
            <a class="list-card hjh" href="#/textbook/t/${esc(r.tbId)}/${esc(r.topic.id)}?slide=${r.slideIdx}">
              ${r.slide.slide_image ? `<img class="topic-thumb" src="${escAttr(r.slide.slide_image)}" alt="" loading="lazy">` : ''}
              <div style="flex:1;min-width:0">
                <div class="title" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${esc(r.title)}</div>
                <div class="meta" style="color:var(--c-hjh-fg);font-weight:600">#${esc(r.label)}</div>
              </div>
              <span class="chevron">›</span>
            </a>
          `).join('')}
        </div>
      `}
    `;
  }

              return `<li><strong>${esc(d.label)}</strong> → <code>${esc(d.path)}</code> <span style="color:var(--c-text-muted)">(${kb})</span></li>`;

  window.__setToken = async function() {
    localStorage.removeItem(LS.TOKEN);
    await ensureToken();
    router();
  };
  window.__clearToken = async function() {
    if (!await showConfirm('Remove GitHub token from this device?', { danger: true, okLabel: 'Remove' })) return;
    localStorage.removeItem(LS.TOKEN);
    showToast('Token removed');
    router();
  };
  window.__syncAll = async function() {
    await syncAll();
  };
  window.__discardLocal = async function() {
    const dirty = dirtyDatasets();
    if (!dirty.length) return;
    if (!await showConfirm('Discard ' + dirty.length + ' local change(s) and reload from server? This cannot be undone.', { danger: true, okLabel: 'Discard' })) return;
    for (const d of dirty) {
      if (d.id === 'data')       { localStorage.removeItem(LS.DATA); state.sources.data = 'server'; }
      else if (d.id === 'notes') { localStorage.removeItem(LS.NOTES); state.sources.notes = 'server'; }
      else if (d.id === 'tips')  { localStorage.removeItem(LS.TIPS); state.sources.tips = 'server'; }
      else if (d.id.startsWith('tb_')) {
        localStorage.removeItem(LS.TB_PREFIX + d.id);
        state.sources.tb[d.id] = 'server';
        delete state.tb[d.id];
      }
    }
    // Reload fresh from server
    try {
      await loadCore();
      showToast('Reloaded from server', 'success');
    } catch (e) {
      showToast('Reload failed: ' + e.message, 'error');
    }
    router();
  };
  /* Kill-switch admin panel: load current status + update UI */
  async function loadKillStatusIntoPanel() {
    const loading = el('kill-status-loading');
    const body = el('kill-status-body');
    if (!loading || !body) return;
    try {
      const resp = await fetch('app-status.json?t=' + Date.now(), { cache: 'no-store' });
      const st = resp.ok ? await resp.json() : { active: true, message: '', updated_at: '—' };
      const current = el('kill-status-current');
      const updated = el('kill-status-updated');
      const msgIn   = el('kill-status-message');
      if (current) {
        current.textContent = st.active === false ? '🔴 LOCKED OUT' : '🟢 ACTIVE';
        current.style.color = st.active === false ? 'var(--c-danger)' : 'var(--c-success)';
      }
      if (updated) updated.textContent = st.updated_at || '—';
      if (msgIn && !msgIn.value) msgIn.value = st.message || '';
      loading.style.display = 'none';
      body.style.display = '';
    } catch (e) {
      loading.textContent = 'Failed to load status: ' + e.message;
    }
  }
  window.__setServiceStatus = async function(active) {
    const messageEl = el('kill-status-message');
    const message = (messageEl ? messageEl.value : '').trim();
    const label = active ? 'ACTIVATE' : 'LOCK OUT';
    if (!await showConfirm('Set service status to ' + label + '?\n\n' +
                 (active ? 'All users regain access on next app open.'
                         : 'All installed PWAs will lock out on next open with the message above.'), { danger: !active, okLabel: label })) return;
    const payload = {
      active: !!active,
      message: message,
      updated_at: new Date().toISOString(),
    };
    try {
      await ghPutFile('app-status.json', payload,
        'Service status: ' + (active ? 'ACTIVATE' : 'LOCKED'));
      showToast('Service status: ' + label + ' ✓', 'success');
      loadKillStatusIntoPanel();
    } catch (e) {
      showToast('Failed: ' + e.message, 'error');
    }
  };

  window.__reloadFromServer = async function() {
    const dirty = dirtyDatasets();
    if (dirty.length && !confirm('You have ' + dirty.length + ' unsynced edit(s). Reload will discard them. Continue?')) return;
    // Clear all local overrides
    localStorage.removeItem(LS.DATA);
    localStorage.removeItem(LS.NOTES);
    localStorage.removeItem(LS.TIPS);
    for (const tbId of TB_CHAPTER_IDS) {
      localStorage.removeItem(LS.TB_PREFIX + tbId);
    }
    // Reset state
    state.sources.data = 'server';
    state.sources.notes = 'server';
    state.sources.tips = 'server';
    state.sources.tb = {};
    state.tb = {};
    // Reload core
    try {
      await loadCore();
      showToast('Reloaded from server ✓', 'success');
    } catch (e) {
      showToast('Reload failed: ' + e.message, 'error');
    }
    router();
  };

  window.__saveSubmissionUrl = function() {
    const url = (el('submission-url-input').value || '').trim();
    if (url && !/^(https?:|mailto:|tel:)/i.test(url)) {
      return showToast('URL must start with http://, https://, mailto:, or tel:', 'error');
    }
    if (url) localStorage.setItem(LS_SUBMISSION_KEY, url);
    else     localStorage.removeItem(LS_SUBMISSION_KEY);
    showToast('Submission URL saved', 'success');
    router();
  };
  window.__resetSubmissionUrl = function() {
    localStorage.removeItem(LS_SUBMISSION_KEY);
    showToast('Reset to built-in default', 'success');
    router();
  };
  window.__clearSubmissionUrl = async function() {
    // Distinct from default: empty string = "explicitly disabled on this device"
    // so Home won't show the link even though the built-in default exists.
    if (!await showConfirm('Hide the Suggest-content link on this device?\n\n(Default is a mailto: to the project admin. Choosing Hide hides it on this device.)', { okLabel: 'Hide' })) return;
    localStorage.setItem(LS_SUBMISSION_KEY, '');
    showToast('Submission link hidden on this device', 'success');
    router();
  };

  window.__downloadAll = async function() {
    const btn = el('btn-download-all');
    const bar = el('dl-progress-bar');
    const box = el('dl-progress');
    const status = el('dl-status');
    btn.disabled = true;
    box.style.display = 'block';
    // Phase 1: Load all chapter JSONs — track failures
    status.textContent = 'Loading chapter metadata…';
    const toLoad = TB_CHAPTER_IDS.filter(id => !state.tb[id]);
    let jsonFail = 0;
    for (let i = 0; i < toLoad.length; i++) {
      try { await loadChapter(toLoad[i]); } catch { jsonFail++; }
      const pct = ((i + 1) / (toLoad.length || 1)) * 20;
      bar.style.width = pct + '%';
    }
    // Phase 2: Collect all slide images
    const images = [];
    for (const tbId of TB_CHAPTER_IDS) {
      const ch = state.tb[tbId];
      if (!ch) continue;
      for (const sec of (ch.sections || [])) {
        for (const t of (sec.topics || [])) {
          for (const s of (t.slides || [])) {
            if (!s.hidden && s.slide_image) images.push(s.slide_image);
          }
        }
      }
    }
    status.textContent = 'Caching ' + images.length + ' slide images…';
    // Phase 3: Parallel fetch in batches — track ok vs fail
    const BATCH = 16;
    let done = 0, imgOk = 0, imgFail = 0;
    for (let i = 0; i < images.length; i += BATCH) {
      const batch = images.slice(i, i + BATCH);
      const results = await Promise.all(batch.map(url =>
        fetch(url).then(r => r.ok ? 'ok' : 'fail').catch(() => 'fail')
      ));
      results.forEach(r => { if (r === 'ok') imgOk++; else imgFail++; });
      done += batch.length;
      const pct = 20 + (done / images.length) * 80;
      bar.style.width = pct + '%';
      status.textContent = 'Cached ' + done + ' / ' + images.length + ' images…';
    }
    bar.style.width = '100%';
    const summary = '✓ ' + imgOk + ' images cached' +
      (imgFail ? ' · ⚠ ' + imgFail + ' failed' : '') +
      (jsonFail ? ' · ⚠ ' + jsonFail + ' chapter JSONs failed' : '');
    status.textContent = summary + '. App offline-ready.';
    if (imgFail + jsonFail === 0) showToast('Offline cache complete', 'success');
    else showToast('Cache partial — ' + (imgFail + jsonFail) + ' failures', 'error', { duration: 4000 });
    btn.disabled = false;
    btn.textContent = '✓ Done — redownload';
  };

  window.__exportJSON = function(key) {
    let obj, filename;
    if (key === 'data')       { obj = state.data;  filename = 'data.json'; }
    else if (key === 'notes') { obj = state.notes; filename = 'teaching-notes.json'; }
    else if (key === 'tips')  { obj = state.tips;  filename = 'tips-guide.json'; }
    else if (key.startsWith('tb_')) { obj = state.tb[key]; filename = key + '.json'; }
    if (!obj) return;
    const clone = JSON.parse(JSON.stringify(obj));
    delete clone._updated_at;
    const blob = new Blob([JSON.stringify(clone, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };

  /* ======================================================
     Service Worker + update banner
  ====================================================== */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js?v=3').then(reg => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              el('update-banner').classList.remove('hidden');
            }
          });
        });
      }).catch(err => console.warn('SW registration failed', err));
    });
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      location.reload();
    });
  }
  el('btn-update-reload').addEventListener('click', () => {
    navigator.serviceWorker.getRegistration().then(reg => {
      if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      location.reload();
    });
  });

  /* ======================================================
     Kill-switch gate — before gateCheck. If locked, page is replaced
     and we skip everything below. Admin can still use ?admin-override=1.
  ====================================================== */
  checkAppStatus().then(ok => {
    if (!ok) return;  // Lockout page already shown; no further boot

    /* ======================================================
       ?reset escape hatch (now inside status-ok branch)
    ====================================================== */
    if (new URLSearchParams(location.search).has('reset')) {
      Promise.all([
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))),
        'serviceWorker' in navigator
          ? navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister())))
          : Promise.resolve(),
      ]).finally(() => {
        localStorage.clear();
        location.replace(location.pathname);
      });
    } else {
      gateCheck();
    }
  });

  /* ======================================================
     Boot (after gate passed)
  ====================================================== */
  async function boot() {
    loadFavs();
    try {
      await loadCore();
    } catch (e) {
      viewEl().innerHTML = '<div class="placeholder"><div class="big">⚠️</div><strong>Load failed</strong><small>' + esc(e.message) + '</small></div>';
      console.error(e);
      return;
    }
    router();
  }

  </script>
</body>
</html>
